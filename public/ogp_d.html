<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;font-family:'Noto Sans JP',sans-serif;background:#0a0e17;color:#fff;overflow:hidden;position:relative}
/* Gradient overlay */
.bg{position:absolute;inset:0;background:
  radial-gradient(ellipse 600px 400px at 15% 50%, rgba(255,185,0,0.08) 0%, transparent 70%),
  radial-gradient(ellipse 500px 500px at 85% 30%, rgba(214,48,49,0.06) 0%, transparent 70%),
  linear-gradient(180deg, #0a0e17 0%, #0f1420 100%)}
/* Grid lines */
.grid{position:absolute;inset:0;background-image:
  linear-gradient(rgba(255,215,0,0.03) 1px, transparent 1px),
  linear-gradient(90deg, rgba(255,215,0,0.03) 1px, transparent 1px);
  background-size:60px 60px}
/* Top gold line */
.topline{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#ffd700,#e8961e,#ffd700)}
.bottomline{position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#ffd700,#e8961e,#ffd700)}
/* Left accent */
.leftbar{position:absolute;left:0;top:3px;bottom:3px;width:4px;background:linear-gradient(180deg,#ffd700 0%,#e8961e 50%,#ffd700 100%)}
.content{position:relative;z-index:1;padding:40px 50px 40px 55px;height:100%;display:flex;flex-direction:column}
.header{display:flex;align-items:center;gap:16px;margin-bottom:6px}
.yt-icon{width:56px;height:56px;border-radius:50%;border:3px solid #e8961e;object-fit:cover}
.fav-icon{width:44px;height:44px;border-radius:8px;image-rendering:pixelated}
.title{font-size:46px;font-weight:900;background:linear-gradient(135deg,#ffd700 0%,#ffed4a 40%,#e8961e 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2;letter-spacing:-1px}
.subtitle{font-size:15px;color:#8a8f9f;margin-left:2px;margin-bottom:20px}
/* Stats row */
.stats{display:flex;gap:40px;margin-bottom:22px}
.stat{display:flex;flex-direction:column}
.stat-num{font-size:52px;font-weight:900;background:linear-gradient(180deg,#ffd700 20%,#cc8800 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1}
.stat-label{font-size:14px;color:#7a7f90;font-weight:400;margin-top:2px}
/* Divider */
.divider{height:1px;background:linear-gradient(90deg,#ffd70040,#ffd70015,transparent);margin-bottom:20px;width:65%}
/* Features */
.features{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:auto}
.feat{padding:6px 14px;border-radius:4px;font-size:13px;font-weight:700;border:1px solid #ffd70035;background:rgba(255,215,0,0.06);color:#ddc860;letter-spacing:0.5px}
/* Bottom */
.bottom{display:flex;align-items:center;justify-content:space-between}
.url{font-size:26px;font-weight:900;color:#ffd700;letter-spacing:1px}
.brand{font-size:13px;color:#6a6f80}
/* Right side: abstract ranking bars */
.right-panel{position:absolute;right:50px;top:50px;bottom:50px;width:340px;display:flex;flex-direction:column;justify-content:center;gap:5px;z-index:1}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{font-size:12px;color:#5a5f70;width:50px;text-align:right;font-weight:700}
.bar-track{flex:1;height:16px;background:rgba(255,255,255,0.03);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px}
.bar-fill.gold{background:linear-gradient(90deg,#ffd700,#e8961e)}
.bar-fill.silver{background:linear-gradient(90deg,#c0c0c0,#8a8a8a)}
.bar-fill.bronze{background:linear-gradient(90deg,#cd7f32,#8b5e3c)}
.bar-fill.blue{background:linear-gradient(90deg,#4a9eff,#2563eb)}
.bar-fill.teal{background:linear-gradient(90deg,#2dd4bf,#0d9488)}
.bar-fill.purple{background:linear-gradient(90deg,#a78bfa,#7c3aed)}
/* Rarity strip */
.rarity-strip{display:flex;gap:3px;margin-top:12px}
.rarity-block{height:22px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#000}
.rarity-block.ur{background:linear-gradient(135deg,#ffd700,#ffed4a);flex:55}
.rarity-block.ult{background:linear-gradient(135deg,#a78bfa,#7c3aed);flex:5;color:#fff}
.rarity-block.ssr{background:linear-gradient(135deg,#e2e8f0,#94a3b8);flex:120}
.rarity-block.sr{background:linear-gradient(135deg,#d4a574,#b8860b);flex:400}
.rarity-block.r{background:linear-gradient(135deg,#a0785a,#8b6914);flex:337}
.section-label{font-size:11px;color:#4a4f60;font-weight:700;margin-bottom:4px;letter-spacing:1px}
</style></head><body>
<div class="bg"></div>
<div class="grid"></div>
<div class="topline"></div>
<div class="bottomline"></div>
<div class="leftbar"></div>
<div class="content">
  <div class="header">
    <img class="yt-icon" src="https://yt3.googleusercontent.com/1fHhbDahgzj20gzAsBkKvdA_N5O7uQQ-xU3R8evoky8Nibz6G46Nif9IdfsP94SWavB0HZFI=s240-c-k-c0x00ffffff-no-rj" alt="">
    <img class="fav-icon" src="https://gget-db.com/favicon.svg" alt="">
    <div class="title">GジェネエターナルDB</div>
  </div>
  <div class="subtitle">by MH GAMES ─ Gジェネ エターナル 全レアリティ対応 総合データベース</div>
  <div class="stats">
    <div class="stat"><div class="stat-num">917</div><div class="stat-label">ユニット</div></div>
    <div class="stat"><div class="stat-num">481</div><div class="stat-label">キャラクター</div></div>
    <div class="stat"><div class="stat-num">70</div><div class="stat-label">サポーター</div></div>
    <div class="stat"><div class="stat-num">338</div><div class="stat-label">アイテム</div></div>
  </div>
  <div class="divider"></div>
  <div class="features">
    <div class="feat">ユニット検索</div>
    <div class="feat">キャラ検索</div>
    <div class="feat">サポーター</div>
    <div class="feat">アイテム</div>
    <div class="feat">ダメージ計算</div>
    <div class="feat">ステータス比較</div>
    <div class="feat">ランキング</div>
    <div class="feat">チーム編成</div>
  </div>
  <div class="bottom">
    <div class="url">gget-db.com</div>
    <div class="brand">個人開発・運営</div>
  </div>
</div>
<div class="right-panel">
  <div class="section-label">STATS OVERVIEW</div>
  <div class="bar-row"><div class="bar-label">HP</div><div class="bar-track"><div class="bar-fill gold" style="width:92%"></div></div></div>
  <div class="bar-row"><div class="bar-label">攻撃力</div><div class="bar-track"><div class="bar-fill blue" style="width:85%"></div></div></div>
  <div class="bar-row"><div class="bar-label">防御力</div><div class="bar-track"><div class="bar-fill teal" style="width:78%"></div></div></div>
  <div class="bar-row"><div class="bar-label">機動力</div><div class="bar-track"><div class="bar-fill purple" style="width:88%"></div></div></div>
  <div class="bar-row"><div class="bar-label">EN</div><div class="bar-track"><div class="bar-fill silver" style="width:65%"></div></div></div>
  <div class="bar-row"><div class="bar-label">命中</div><div class="bar-track"><div class="bar-fill bronze" style="width:72%"></div></div></div>
  <div style="margin-top:16px">
    <div class="section-label">RARITY DISTRIBUTION</div>
    <div class="rarity-strip">
      <div class="rarity-block ur">UR</div>
      <div class="rarity-block ult">ULT</div>
      <div class="rarity-block ssr">SSR</div>
      <div class="rarity-block sr">SR</div>
      <div class="rarity-block r">R</div>
    </div>
  </div>
</div>
</body></html>
