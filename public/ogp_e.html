<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;font-family:'Noto Sans JP',sans-serif;background:#0a0e17;color:#fff;overflow:hidden;position:relative}
.bg{position:absolute;inset:0;background:
  radial-gradient(ellipse 800px 600px at 50% 40%, rgba(255,200,0,0.05) 0%, transparent 70%),
  linear-gradient(180deg, #0c1019 0%, #0a0e17 100%)}
/* Diagonal accent */
.diag{position:absolute;top:0;right:0;width:500px;height:100%;background:linear-gradient(135deg,transparent 0%,rgba(255,215,0,0.02) 50%,transparent 100%);transform:skewX(-12deg);transform-origin:top right}
.topline{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#ffd700,#e8961e 50%,#d63031)}
.content{position:relative;z-index:1;padding:55px 60px;height:100%;display:flex;flex-direction:column;align-items:center;text-align:center}
.icons{display:flex;align-items:center;gap:20px;margin-bottom:18px}
.yt-icon{width:72px;height:72px;border-radius:50%;border:3px solid #e8961e;object-fit:cover;box-shadow:0 0 30px rgba(232,150,30,0.3)}
.fav-icon{width:56px;height:56px;border-radius:10px;image-rendering:pixelated;box-shadow:0 0 20px rgba(255,215,0,0.2)}
.x-shape{width:2px;height:24px;background:#333;transform:rotate(15deg)}
.title{font-size:56px;font-weight:900;background:linear-gradient(135deg,#ffd700 0%,#ffed4a 30%,#ffd700 60%,#e8961e 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.15;letter-spacing:-1px;margin-bottom:4px}
.tagline{font-size:17px;color:#8a8f9f;margin-bottom:28px;letter-spacing:2px}
/* Stats */
.stats{display:flex;gap:0;margin-bottom:28px}
.stat{padding:0 32px;border-right:1px solid #ffffff10;display:flex;flex-direction:column;align-items:center}
.stat:last-child{border-right:none}
.stat-num{font-size:48px;font-weight:900;color:#ffd700;line-height:1.1}
.stat-label{font-size:12px;color:#6a6f80;font-weight:700;letter-spacing:1px;margin-top:2px}
/* Features in a horizontal strip */
.feat-strip{display:flex;gap:6px;margin-bottom:auto;flex-wrap:wrap;justify-content:center}
.feat{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid #ffffff15;background:rgba(255,255,255,0.04);color:#999;letter-spacing:0.5px;backdrop-filter:blur(4px)}
.feat:nth-child(-n+4){border-color:#ffd70030;color:#ddc860;background:rgba(255,215,0,0.05)}
/* Bottom */
.bottom{display:flex;align-items:center;gap:30px;margin-top:8px}
.url{font-size:28px;font-weight:900;background:linear-gradient(90deg,#ffd700,#e8961e);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sep{color:#333;font-size:20px}
.brand{font-size:14px;color:#555}
/* Bottom line */
.bottomline{position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#d63031,#e8961e 50%,#ffd700)}
/* Decorative corner marks */
.corner{position:absolute;width:24px;height:24px;border:2px solid #ffd70020;z-index:2}
.corner.tl{top:12px;left:12px;border-right:none;border-bottom:none}
.corner.tr{top:12px;right:12px;border-left:none;border-bottom:none}
.corner.bl{bottom:12px;left:12px;border-right:none;border-top:none}
.corner.br{bottom:12px;right:12px;border-left:none;border-top:none}
</style></head><body>
<div class="bg"></div>
<div class="diag"></div>
<div class="topline"></div>
<div class="bottomline"></div>
<div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
<div class="content">
  <div class="icons">
    <img class="fav-icon" src="https://gget-db.com/favicon.svg" alt="">
    <div class="x-shape"></div>
    <img class="yt-icon" src="https://yt3.googleusercontent.com/1fHhbDahgzj20gzAsBkKvdA_N5O7uQQ-xU3R8evoky8Nibz6G46Nif9IdfsP94SWavB0HZFI=s240-c-k-c0x00ffffff-no-rj" alt="">
  </div>
  <div class="title">GジェネエターナルDB</div>
  <div class="tagline">全レアリティ対応 総合データベース</div>
  <div class="stats">
    <div class="stat"><div class="stat-num">917</div><div class="stat-label">UNITS</div></div>
    <div class="stat"><div class="stat-num">481</div><div class="stat-label">CHARACTERS</div></div>
    <div class="stat"><div class="stat-num">70</div><div class="stat-label">SUPPORTERS</div></div>
    <div class="stat"><div class="stat-num">338</div><div class="stat-label">ITEMS</div></div>
  </div>
  <div class="feat-strip">
    <div class="feat">ユニット検索</div>
    <div class="feat">キャラ検索</div>
    <div class="feat">サポーター</div>
    <div class="feat">アイテム</div>
    <div class="feat">ダメージ計算</div>
    <div class="feat">ステータス比較</div>
    <div class="feat">ランキング</div>
    <div class="feat">チーム編成</div>
  </div>
  <div class="bottom">
    <div class="url">gget-db.com</div>
    <div class="sep">|</div>
    <div class="brand">by MH GAMES</div>
  </div>
</div>
</body></html>
