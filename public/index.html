    <div style="font-size:.68em;color:var(--card-text2);margin-top:4px">${currentLang==="en"?"Terrain":"地形"}: ${terrStr}</div>
    ${weapons ? `<div class="slot-weapons">${weapons}</div>` : ''}
  </div>`;
}

function renderSlotChara(c, slotIdx) {
  const s = c.stats || {};
  const iconHTML = c.image ? `<img class="slot-img" src="${c.image}" alt="${c.name}" onerror="this.style.display='none'">` : '';
  const skillTags = (c.skills||[]).map(sk => {
    const short = sk.name.replace(/\(SP:\d+\)/, '').replace(/Lv\d+/, '').trim();
    return `<span class="skill-tag" style="font-size:.62em">${short} SP:${sk.sp_cost||'?'}</span>`;
  }).join('');
  const abilHTML = (c.abilities||[]).filter(a => {
    const garbage = ['リセマラ評価','キャラ一覧の関連記事','解放キャラ','スキル','UR','対象ユニット','サポーターの一覧記事','レア度','2×2','SD','支援','攻撃'];
    return !garbage.includes(a.name) && !/^戦闘力[\(（]/.test(a.name) && !/[\(（]SP:\d+[\)）]/.test(a.name);
  }).slice(0, 4).map(a => `<span class="abil-name">${a.name}</span>: ${(a.desc||a.effect||'').substring(0,40)}${(a.desc||a.effect||'').length>40?'...':''}`).join('<br>');

  return `<div class="slot-filled">
    <button class="slot-remove-btn" onclick="removeSlot(${slotIdx},'chara')">✕</button>
    <div class="slot-top-row" style="cursor:pointer" onclick="openTeamPicker('chara',${slotIdx})" title="クリックで変更">
      ${iconHTML}
      <div class="slot-info">
        <div class="slot-name">${c.name}</div>
        <div class="slot-badges">
          <span class="badge ${rarityClass(c.rarity)}" style="font-size:.6em">${c.rarity||'?'}</span>
          ${typeBadgeHTML(c.chara_type)}
        </div>
      </div>
    </div>
    <div class="slot-filled slot-stats">
      <div class="slot-stat"><div class="ss-label">${currentLang==="en"?"SHT":"射撃"}</div><div class="ss-val">${s.shooting||'-'}</div></div>
      <div class="slot-stat"><div class="ss-label">${currentLang==="en"?"MEL":"格闘"}</div><div class="ss-val">${s.melee||'-'}</div></div>
      <div class="slot-stat"><div class="ss-label">${currentLang==="en"?"AWK":"覚醒"}</div><div class="ss-val">${s.awakening||'-'}</div></div>
      <div class="slot-stat"><div class="ss-label">${currentLang==="en"?"DEF":"守備"}</div><div class="ss-val">${s.defense||'-'}</div></div>
      <div class="slot-stat"><div class="ss-label">${currentLang==="en"?"REA":"反応"}</div><div class="ss-val">${s.reaction||'-'}</div></div>
      <div class="slot-stat"><div class="ss-label">SP</div><div class="ss-val">${s.sp||'-'}</div></div>
    </div>
    ${skillTags ? `<div class="slot-skills">${skillTags}</div>` : ''}
    ${abilHTML ? `<div class="slot-abilities">${abilHTML}</div>` : ''}
  </div>`;
}

function renderTeamSupporter() {
  const container = document.getElementById('teamSupporterSection');
  const sup = teamSupporterId ? allSupporters.find(s => s.id === teamSupporterId) : null;

  let pickHTML = '';
  if (sup) {
    pickHTML = `<div style="text-align:center">
      ${sup.image ? `<img src="${sup.image}" alt="${sup.name}" style="width:48px;height:48px;border-radius:8px;object-fit:cover;border:1px solid var(--border);cursor:pointer" onclick="openTeamPicker('supporter',0)" title="クリックで変更" onerror="this.style.display='none'">` : ''}
      <div style="font-size:.82em;font-weight:600;color:var(--card-text);margin-top:4px;cursor:pointer" onclick="openTeamPicker('supporter',0)" title="クリックで変更">${sup.name}</div>
      <div style="font-size:.7em;color:var(--card-text2);margin-top:2px"><span class="badge ${rarityClass(sup.rarity)}" style="font-size:.85em">${sup.rarity}</span> HP:${sup.hp||'-'} ATK:${sup.attack||'-'}</div>
      <div style="margin-top:4px;display:flex;gap:4px;justify-content:center">
        <button class="slot-remove-btn" style="position:static" onclick="teamSupporterId=null;teamLeaderTag='';teamLeaderEffect='';renderTeamSim()">✕</button>
      </div>
    </div>`;
    // Auto-fill leader skill from supporter data
    if (!teamLeaderTag && sup.target_series) teamLeaderTag = sup.target_series;
    if (!teamLeaderEffect && sup.leader_skill) teamLeaderEffect = sup.leader_skill;
  } else {
    pickHTML = `<div class="slot-empty" style="min-height:80px;min-width:120px" onclick="openTeamPicker('supporter',0)">+ ${currentLang==="en"?"Select Supporter":t("サポーター")+"選択"}</div>`;
  }

  // Calculate leader skill match count using helper
  let matchInfo = '';
  if (sup) {
    let t1Count = 0, t2Count = 0;
    teamSlots.forEach((slot, i) => {
      if (!slot.unitId) return;
      const u = allUnits.find(x => x.id === slot.unitId);
      if (!u) return;
      const m = checkLeaderSkillMatch(u);
      if (m) { if (m.tier === 2) t2Count++; else t1Count++; }
    });
    const total = t1Count + t2Count;
    if (total > 0 || sup.target_series) {
      let detail = '';
      if (sup.leader2_target && t2Count > 0) detail += `<span style="color:#22c55e">${sup.leader2_3||sup.leader2_0||''}: ${t2Count}機</span>`;
      if (t1Count > 0) detail += `${detail?' / ':''}<span style="color:#4ade80">${sup.leader_3||sup.leader_0||''}: ${t1Count}機</span>`;
      matchInfo = `<div class="team-leader-match" style="margin-top:6px;font-size:.8em;color:var(--card-text2)"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" style="vertical-align:middle"><path d="M10 2L6 10h3v8l5-10h-3z" fill="#22c55e"/></svg> 適用: ${total}/5機${detail ? ' ('+detail+')' : ''}</div>`;
    }
  }

  container.innerHTML = `
    <div class="team-supporter-pick">${pickHTML}</div>
    <div class="team-supporter-info">
      <div class="leader-skill-label">リーダースキル</div>
      <div class="leader-skill-text">${teamLeaderEffect || '（サポーターを選択してください）'}</div>
      ${teamLeaderTag ? `<div class="leader-tag">TAG: ${teamLeaderTag}</div>` : ''}
      <div style="margin-top:8px">
        <div style="font-size:.7em;color:var(--card-text2);margin-bottom:4px">リーダースキル設定 (手動入力)</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <input type="text" id="leaderTagInput" placeholder="対象タグ (例: エース機)" value="${teamLeaderTag}" style="padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:.8em;width:140px;outline:none" onchange="teamLeaderTag=this.value;renderTeamSim()">
          <input type="text" id="leaderEffectInput" placeholder="効果 (例: 全ステ+44%)" value="${teamLeaderEffect.replace(/"/g,'&quot;')}" style="padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:.8em;width:200px;outline:none" onchange="teamLeaderEffect=this.value;renderTeamSim()">
        </div>
      </div>
      ${matchInfo}
    </div>
  `;
}

function renderTeamStats() {
  const container = document.getElementById('teamStatsSummary');
  const typeCounts = {};
  let filledCount = 0;

  teamSlots.forEach(slot => {
    if (slot.unitId) {
      const u = allUnits.find(x => x.id === slot.unitId);
      if (u) {
        filledCount++;
        const t = u.type || '不明';
        typeCounts[t] = (typeCounts[t] || 0) + 1;
      }
    }
  });

  const typeChips = Object.entries(typeCounts).map(([t, count]) => {
    const icon = TYPE_ICON_MAP[t] ? `<img src="${TYPE_ICON_MAP[t]}" alt="${t}">` : '';
    return `<div class="team-type-chip">${icon}${t} x${count}</div>`;
  }).join('');

  container.innerHTML = `
    <h3>タイプバランス (${filledCount}/5機)</h3>
    <div class="team-type-balance">${typeChips || '<span style="color:var(--card-text2);font-size:.8em">ユニット未選択</span>'}</div>
  `;
}

function renderSavedTeams() {
  const container = document.getElementById('teamSavedList');
  let saved = [];
  try { saved = JSON.parse(localStorage.getItem('ggene_saved_teams') || '[]'); } catch(e) {}
  if (!saved.length) { container.innerHTML = ''; return; }
  const items = saved.map((t, i) => `<div class="team-saved-item" onclick="loadSavedTeam(${i})">
    <span class="saved-name">${t.name||'編成シミュレーター'+(i+1)}</span>
    <span class="saved-cp">${t.slots?.filter(s=>s.unitId).length||0}/5機</span>
    <button class="team-saved-delete" onclick="event.stopPropagation();deleteSavedTeam(${i})">削除</button>
  </div>`).join('');
  container.innerHTML = `<h3>保存済み編成シミュレーター</h3>${items}`;
}

// === PICKER ===
function openTeamPicker(mode, slotIdx) {
  pickerMode = mode;
  pickerSlotIndex = slotIdx;
  const overlay = document.getElementById('teamPickerOverlay');
  const title = document.getElementById('pickerTitle');
  const searchInput = document.getElementById('pickerSearch');
  const filtersDiv = document.getElementById('pickerFilters');
  searchInput.value = '';

  if (mode === 'unit') {
    title.textContent = `ユニット選択 (スロット${slotIdx+1})`;
    const types = ['攻撃','耐久','支援','射撃','格闘','覚醒'];
    const typeButtons = types.map(t => {
      const icon = TYPE_ICON_MAP[t] ? `<img src="${TYPE_ICON_MAP[t]}" style="width:14px;height:14px;vertical-align:middle"> ` : '';
      return `<button class="filter-btn picker-type-btn" data-value="${t}" onclick="this.classList.toggle('active');renderPickerList()">${icon}${t}</button>`;
    }).join('');
    const lsBtn = teamSupporterId ? `<button class="filter-btn" id="pickerLsFilter" onclick="this.classList.toggle('active');renderPickerList()" style="border-color:rgba(34,197,94,.5);color:#22c55e"><svg width="12" height="12" viewBox="0 0 20 20" fill="none" style="vertical-align:middle"><path d="M10 2L6 10h3v8l5-10h-3z" fill="#22c55e"/></svg> LS対象</button>` : '';
    filtersDiv.innerHTML = typeButtons + lsBtn;
  } else if (mode === 'chara') {
    title.textContent = `キャラ選択 (スロット${slotIdx+1})`;
    const types = ['攻撃','支援','耐久'];
    filtersDiv.innerHTML = types.map(t => {
      const icon = TYPE_ICON_MAP[t] ? `<img src="${TYPE_ICON_MAP[t]}" style="width:14px;height:14px;vertical-align:middle"> ` : '';
      return `<button class="filter-btn picker-type-btn" data-value="${t}" onclick="this.classList.toggle('active');renderPickerList()">${icon}${t}</button>`;
    }).join('');
  } else {
    title.textContent = 'サポーター選択';
    // Build tag and skill filter buttons for supporter picker
    const supTagSet = new Set(), supSkillSet = new Set();
    allSupporters.forEach(s => {
      if (s.target_series) s.target_series.split(/(?<![a-zA-Z])or(?![a-zA-Z])/i).map(t => t.trim()).filter(Boolean).forEach(t => {
        if (!/機動|ガンダム|SDガンダム|新機動|SEEDシリーズ|宇宙世紀シリーズ|オルタナティブシリーズ/.test(t)) supTagSet.add(t);
      });
      if (s.leader2_target) s.leader2_target.split(/ and /i).map(t => t.trim()).filter(Boolean).forEach(t => {
        if (!/機動|ガンダム|SDガンダム|新機動|SEEDシリーズ|宇宙世紀シリーズ|オルタナティブシリーズ/.test(t)) supTagSet.add(t);
      });
      if (s.recovery_type) supSkillSet.add(s.recovery_type);
    });
    const skillLabels = { 'HP': 'HP回復', 'EN': 'EN回復', 'HP・EN': 'HP&EN回復' };
    const skBtns = ['HP','EN','HP・EN'].filter(s => supSkillSet.has(s)).map(s =>
      `<button class="filter-btn picker-sup-skill-btn" data-value="${s}" onclick="this.classList.toggle('active');renderPickerList()">${skillLabels[s]}</button>`
    ).join('');
    const tagBtns = [...supTagSet].sort().map(t =>
      `<button class="filter-btn picker-sup-tag-btn" data-value="${t}" onclick="this.classList.toggle('active');renderPickerList()" style="font-size:.75em">${t}</button>`
    ).join('');
    const skillSection = skBtns ? `<div style="margin-bottom:6px"><div style="font-size:.7em;color:var(--card-text2);margin-bottom:4px;display:flex;align-items:center;gap:6px"><span>サポートスキル</span><span style="flex:1;height:1px;background:var(--card-border)"></span></div><div style="display:flex;flex-wrap:wrap;gap:4px">${skBtns}</div></div>` : '';
    const tagSection = tagBtns ? `<div><div style="font-size:.7em;color:var(--card-text2);margin-bottom:4px;display:flex;align-items:center;gap:6px"><span>対象タグ</span><span style="flex:1;height:1px;background:var(--card-border)"></span></div><div style="display:flex;flex-wrap:wrap;gap:4px">${tagBtns}</div></div>` : '';
    filtersDiv.innerHTML = skillSection + tagSection;
  }

  overlay.classList.add('open');
  renderPickerSummary();
  renderPickerList();
  searchInput.focus();
  searchInput.addEventListener('input', renderPickerList);
}

function renderPickerSummary() {
  const container = document.getElementById('pickerTeamSummary');
  let html = '';
  for (let i = 0; i < 5; i++) {
    const slot = teamSlots[i];
    const unit = slot.unitId ? allUnits.find(u => u.id === slot.unitId) : null;
    const chara = slot.charaId ? allCharas.find(c => c.id === slot.charaId) : null;
    const isActive = (pickerMode === 'unit' || pickerMode === 'chara') && pickerSlotIndex === i;
    const filled = unit || chara;
    html += `<div class="picker-summary-slot${isActive ? ' active' : ''}${filled ? ' filled' : ''}" onclick="if(pickerMode==='unit'||pickerMode==='chara'){pickerSlotIndex=${i};renderPickerSummary();renderPickerList();document.getElementById('pickerTitle').textContent=(pickerMode==='unit'?'ユニット':'キャラ')+'選択 (スロット${i+1})';}">
      ${unit && unit.image ? `<img src="${unit.image}" alt="">` : `<div style="width:28px;height:28px;border-radius:4px;background:var(--bg);border:1px dashed var(--border);margin:0 auto 2px"></div>`}
      <span class="pss-name">${unit ? (unit.name.length > 5 ? unit.name.substring(0,5)+'…' : unit.name) : (i < 3 ? '前方'+(i+1) : '後方'+(i-2))}</span>
      <span class="pss-name" style="color:var(--accent);font-size:.9em">${chara ? (chara.name.length > 5 ? chara.name.substring(0,5)+'…' : chara.name) : '-'}</span>
    </div>`;
  }
  // Supporter mini slot
  const sup = teamSupporterId ? allSupporters.find(s => s.id === teamSupporterId) : null;
  const isSupActive = pickerMode === 'supporter';
  html += `<div class="picker-summary-slot${isSupActive ? ' active' : ''}${sup ? ' filled' : ''}" style="border-color:var(--accent);border-style:${sup?'solid':'dashed'}" onclick="pickerMode='supporter';pickerSlotIndex=0;renderPickerSummary();document.getElementById('pickerTitle').textContent='サポーター選択';document.getElementById('pickerFilters').innerHTML='';renderPickerList();">
    <div style="width:28px;height:28px;border-radius:4px;background:rgba(232,150,30,.1);margin:0 auto 2px;display:flex;align-items:center;justify-content:center;font-size:.7em;color:var(--accent)">S</div>
    <span class="pss-name">${sup ? (sup.name.length > 5 ? sup.name.substring(0,5)+'…' : sup.name) : 'サポ'}</span>
  </div>`;
  container.innerHTML = html;
}

function closeTeamPicker() {
  document.getElementById('teamPickerOverlay').classList.remove('open');
}

function renderPickerList() {
  const list = document.getElementById('pickerList');
  const q = (document.getElementById('pickerSearch').value || '').toLowerCase();
  const activeTypes = [...document.querySelectorAll('.picker-type-btn.active')].map(b => b.dataset.value);

  // Collect already-used IDs for duplicate prevention
  const usedUnitIds = new Set(teamSlots.filter((s,i) => s.unitId && i !== pickerSlotIndex).map(s => s.unitId));
  const usedCharaIds = new Set(teamSlots.filter((s,i) => s.charaId && i !== pickerSlotIndex).map(s => s.charaId));

  let items = [];
  if (pickerMode === 'unit') {
    items = allUnits.filter(u => {
      if (q && !u.name.toLowerCase().includes(q)) return false;
      if (activeTypes.length && !activeTypes.includes(u.type)) return false;
      return true;
    });
    // Sort: buff-matched first, then by combat power
    const lsFilterActive = document.getElementById('pickerLsFilter')?.classList.contains('active');
    if (lsFilterActive && teamSupporterId) {
      items = items.filter(u => checkLeaderSkillMatch(u));
    }
    items.sort((a,b) => {
      if (teamSupporterId) {
        const ma = checkLeaderSkillMatch(a);
        const mb = checkLeaderSkillMatch(b);
        if (ma && !mb) return -1;
        if (!ma && mb) return 1;
        if (ma && mb) {
          if (ma.tier !== mb.tier) return mb.tier - ma.tier;
        }
      }
      return (parseInt(b.normal?.combat_power)||0) - (parseInt(a.normal?.combat_power)||0);
    });
    list.innerHTML = items.slice(0, 100).map(u => {
      const s = u.normal?.stats || {};
      const img = u.image ? `<img src="${u.image}" alt="${u.name}" onerror="this.style.display='none'">` : '';
      const used = usedUnitIds.has(u.id);
      const lsM = teamSupporterId ? checkLeaderSkillMatch(u) : null;
      const lsBadge = lsM ? `<span class="picker-buff-badge"><svg width="12" height="12" viewBox="0 0 20 20" fill="none"><path d="M10 2L6 10h3v8l5-10h-3z" fill="#22c55e"/></svg>${lsM.buff}</span>` : '';
      return `<div class="picker-item${used ? ' picker-item-used' : ''}${lsM ? ' ls-target' : ''}" ${used ? '' : `onclick="selectPickerUnit(${u.id})"`}>
        ${img}
        <div class="picker-item-info">
          <div style="display:flex;align-items:center;gap:4px"><span class="picker-item-name" style="flex:1;min-width:0">${u.name}</span>${lsBadge}${used ? '<span style="color:var(--accent);font-size:.75em;flex-shrink:0">選択済</span>' : ''}</div>
          <div class="picker-item-sub"><span class="badge ${rarityClass(u.rarity)}" style="font-size:.6em;padding:1px 4px">${u.rarity}</span> ${typeBadgeHTML(u.type)} ATK:${(parseInt(s.attack)||0).toLocaleString()}</div>
        </div>
      </div>`;
    }).join('');
  } else if (pickerMode === 'chara') {
    items = allCharas.filter(c => {
      if (q && !c.name.toLowerCase().includes(q)) return false;
      if (activeTypes.length && !activeTypes.includes(c.chara_type)) return false;
      return true;
    });
    items.sort((a,b) => (parseInt(b.stats?.combat_power)||0) - (parseInt(a.stats?.combat_power)||0));
    list.innerHTML = items.slice(0, 100).map(c => {
      const s = c.stats || {};
      const img = c.image ? `<img src="${c.image}" alt="${c.name}" onerror="this.style.display='none'">` : '';
      const used = usedCharaIds.has(c.id);
      return `<div class="picker-item${used ? ' picker-item-used' : ''}" ${used ? '' : `onclick="selectPickerChara(${c.id})"`}>
        ${img}
        <div class="picker-item-info">
          <div class="picker-item-name">${c.name}${used ? ' <span style="color:var(--accent);font-size:.75em">選択済</span>' : ''}</div>
          <div class="picker-item-sub"><span class="badge ${rarityClass(c.rarity)}" style="font-size:.6em;padding:1px 4px">${c.rarity}</span> ${typeBadgeHTML(c.chara_type)} 射:${s.shooting||'-'} 格:${s.melee||'-'} 覚:${s.awakening||'-'}</div>
        </div>
      </div>`;
    }).join('');
  } else {
    // Supporter picker — use allSupporters with tag/skill filters
    const activePickerSkills = [...document.querySelectorAll('.picker-sup-skill-btn.active')].map(b => b.dataset.value);
    const activePickerTags = [...document.querySelectorAll('.picker-sup-tag-btn.active')].map(b => b.dataset.value);
    items = allSupporters.filter(s => {
      if (q && !s.name.toLowerCase().includes(q) && !(currentLang==='en' && tData(s.name,'supporters').toLowerCase().includes(q))) return false;
      if (activePickerSkills.length > 0 && !activePickerSkills.includes(s.recovery_type)) return false;
      if (activePickerTags.length > 0) {
        const supAllTags = [];
        if (s.target_series) s.target_series.split(/(?<![a-zA-Z])or(?![a-zA-Z])/i).map(t => t.trim()).filter(Boolean).forEach(t => supAllTags.push(t));
        if (s.leader2_target) s.leader2_target.split(/ and /i).map(t => t.trim()).filter(Boolean).forEach(t => supAllTags.push(t));
        const hasTag = activePickerTags.some(ft => supAllTags.some(st => st.includes(ft) || ft.includes(st)));
        if (!hasTag) return false;
      }
      return true;
    });
    items.sort((a,b) => (parseInt(b.hp)||0) - (parseInt(a.hp)||0));
    list.innerHTML = items.slice(0, 100).map(s => {
      const maxLS = s.leader2_3||s.leader2_2||s.leader2_1||s.leader2_0||s.leader_3||s.leader_2||s.leader_1||s.leader_0||'';
      const lsBadge = maxLS ? `<span style="display:inline-flex;align-items:center;gap:2px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.35);border-radius:3px;padding:1px 5px;font-size:.7em;font-weight:700;color:#22c55e;white-space:nowrap;margin-left:4px;flex-shrink:0">LS ${maxLS}</span>` : '';
      return `<div class="picker-item" onclick="selectPickerSupporter(${s.id})">
        ${s.image ? `<img src="${s.image}" alt="${s.name}" onerror="this.style.display='none'" loading="lazy">` : ''}
        <div class="picker-item-info">
          <div style="display:flex;align-items:center;gap:4px"><span class="picker-item-name" style="flex:1;min-width:0">${s.name}</span>${lsBadge}</div>
          <div class="picker-item-sub"><span class="badge ${rarityClass(s.rarity)}" style="font-size:.6em;padding:1px 4px">${s.rarity}</span> HP:${s.hp||'-'} ATK:${s.attack||'-'} ${s.target_series ? '<span class="tag" style="font-size:.7em">'+s.target_series+'</span>' : ''}</div>
        </div>
      </div>`;
    }).join('');
  }

  if (!list.innerHTML) list.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text2)">該当なし</div>';
}

function selectPickerUnit(id) {
  teamSlots[pickerSlotIndex].unitId = id;
  closeTeamPicker();
  renderTeamSim();
}
function selectPickerChara(id) {
  teamSlots[pickerSlotIndex].charaId = id;
  closeTeamPicker();
  renderTeamSim();
}
function selectPickerSupporter(id) {
  teamSupporterId = id;
  // Auto-fill leader skill from supporter data
  const sup = allSupporters.find(s => s.id === id);
  if (sup) {
    teamLeaderTag = sup.target_series || '';
    teamLeaderEffect = sup.leader_skill || '';
  }
  closeTeamPicker();
  renderTeamSim();
}

function removeSlot(idx, type) {
  if (type === 'unit') teamSlots[idx].unitId = null;
  else teamSlots[idx].charaId = null;
  renderTeamSim();
}

function clearTeam() {
  teamSlots = teamSlots.map(() => ({ unitId: null, charaId: null }));
  teamSupporterId = null;
  teamLeaderTag = '';
  teamLeaderEffect = '';
  document.getElementById('teamNameInput').value = '編成タイトル';
  renderTeamSim();
}

// === SAVE / LOAD / SHARE ===
function saveTeam() {
  const name = document.getElementById('teamNameInput').value || '編成タイトル';
  const data = {
    name,
    slots: teamSlots.map(s => ({ u: s.unitId, c: s.charaId })),
    supporter: teamSupporterId,
    leaderTag: teamLeaderTag,
    leaderEffect: teamLeaderEffect
  };
  let saved = [];
  try { saved = JSON.parse(localStorage.getItem('ggene_saved_teams') || '[]'); } catch(e) {}
  saved.push(data);
  localStorage.setItem('ggene_saved_teams', JSON.stringify(saved));
  renderSavedTeams();
  showToast('編成を保存しました');
}

function loadSavedTeam(idx) {
  let saved = [];
  try { saved = JSON.parse(localStorage.getItem('ggene_saved_teams') || '[]'); } catch(e) {}
  const data = saved[idx];
  if (!data) return;
  document.getElementById('teamNameInput').value = data.name || '編成タイトル';
  teamSlots = (data.slots || []).map(s => ({ unitId: s.u || null, charaId: s.c || null }));
  while (teamSlots.length < 5) teamSlots.push({ unitId: null, charaId: null });
  teamSupporterId = data.supporter || null;
  teamLeaderTag = data.leaderTag || '';
  teamLeaderEffect = data.leaderEffect || '';
  renderTeamSim();
  showToast(`「${data.name}」を読み込みました`);
}

function deleteSavedTeam(idx) {
  let saved = [];
  try { saved = JSON.parse(localStorage.getItem('ggene_saved_teams') || '[]'); } catch(e) {}
  saved.splice(idx, 1);
  localStorage.setItem('ggene_saved_teams', JSON.stringify(saved));
  renderSavedTeams();
}

function shareTeamURL() {
  const name = document.getElementById('teamNameInput').value || '';
  const parts = teamSlots.map(s => `${s.unitId||0},${s.charaId||0}`);
  const params = new URLSearchParams();
  params.set('tab', 'team');
  params.set('team', parts.join('|'));
  if (teamSupporterId) params.set('sup', teamSupporterId);
  if (name) params.set('tn', name);
  if (teamLeaderTag) params.set('lt', teamLeaderTag);
  if (teamLeaderEffect) params.set('le', teamLeaderEffect);
  const url = window.location.origin + window.location.pathname + '?' + params.toString();
  navigator.clipboard.writeText(url).then(() => {
    showToast('URLをコピーしました');
  }).catch(() => {
    prompt('以下のURLをコピーしてください:', url);
  });
}

async function shareTeamImage() {
  function loadImg(src) {
    return new Promise(resolve => {
      if (!src) return resolve(null);
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => resolve(img);
      img.onerror = () => resolve(null);
      img.src = src;
    });
  }
  // Helper: draw text clipped to maxWidth
  function drawClipped(ctx, text, x, y, maxW) {
    let t = text;
    while (ctx.measureText(t).width > maxW && t.length > 1) {
      t = t.substring(0, t.length - 1);
    }
    if (t.length < text.length) t += '…';
    ctx.fillText(t, x, y);
  }

  const imgPromises = [];
  for (let i = 0; i < 5; i++) {
    const slot = teamSlots[i];
    const unit = slot.unitId ? allUnits.find(u => u.id === slot.unitId) : null;
    const chara = slot.charaId ? allCharas.find(c => c.id === slot.charaId) : null;
    imgPromises.push(loadImg(unit?.image));
    imgPromises.push(loadImg(chara?.image));
  }
  const sup = teamSupporterId ? allSupporters.find(s => s.id === teamSupporterId) : null;
  imgPromises.push(loadImg(sup?.image));
  // Type icons + branding
  const typeNames = ['攻撃','耐久','支援','射撃','格闘','覚醒'];
  typeNames.forEach(t => imgPromises.push(loadImg(TYPE_ICON_MAP[t])));
  const ytIconUrl = 'https://yt3.googleusercontent.com/1fHhbDahgzj20gzAsBkKvdA_N5O7uQQ-xU3R8evoky8Nibz6G46Nif9IdfsP94SWavB0HZFI=s240-c-k-c0x00ffffff-no-rj';
  imgPromises.push(loadImg(ytIconUrl));
  const loadedImgs = await Promise.all(imgPromises);
  const supImg = loadedImgs[10];
  const typeIcons = {};
  typeNames.forEach((t, ti) => { typeIcons[t] = loadedImgs[11 + ti]; });
  const ytIcon = loadedImgs[17];

  // --- Gather slot data ---
  const slotData = [];
  const garbageNames = ['リセマラ評価','キャラ一覧の関連記事','解放キャラ','スキル','UR','対象ユニット','サポーターの一覧記事','レア度','2×2','SD','支援','攻撃'];
  for (let i = 0; i < 5; i++) {
    const slot = teamSlots[i];
    const unit = slot.unitId ? allUnits.find(u => u.id === slot.unitId) : null;
    const chara = slot.charaId ? allCharas.find(c => c.id === slot.charaId) : null;
    const unitAbils = unit ? (unit.normal?.abilities || []) : [];
    const charaSkills = chara ? (chara.skills || []) : [];
    const charaAbils = chara ? (chara.abilities || []).filter(a =>
      !garbageNames.includes(a.name) && !/^戦闘力[\(（]/.test(a.name) && !/[\(（]SP:\d+[\)）]/.test(a.name)
    ) : [];
    slotData.push({ unit, chara, unitAbils, charaSkills, charaAbils });
  }

  // --- Layout constants (larger canvas) ---
  const LINE_H = 14;
  const LABEL_H = 17;
  const slotW = 186;
  const slotGap = 8;
  const slotPadX = 10;
  const textMaxW = slotW - slotPadX * 2; // max text width inside a slot card

  // Calculate dynamic heights
  let maxUnitH = 220;
  let maxCharaH = 150;
  for (const sd of slotData) {
    // Unit: header(22) + imageRow(54) + buffBadge?(20:0) + stats(6*15=90) + terrain(28) + abilities(label+n*line) + pad(10)
    let uh = 22 + 54 + 90 + 28 + 10;
    const lsM = sd.unit ? checkLeaderSkillMatch(sd.unit) : null;
    if (lsM) uh += 20;
    if (sd.unitAbils.length > 0) uh += LABEL_H + sd.unitAbils.length * LINE_H;
    if (uh > maxUnitH) maxUnitH = uh;

    // Chara: imageRow(48) + stats(5*15=75) + skills(label+n*line) + abilities(label+n*line) + pad(10)
    let ch = 48 + 75 + 10;
    if (sd.charaSkills.length > 0) ch += LABEL_H + sd.charaSkills.length * LINE_H;
    if (sd.charaAbils.length > 0) ch += LABEL_H + sd.charaAbils.length * LINE_H;
    if (ch > maxCharaH) maxCharaH = ch;
  }

  const supSectionH = 62;
  const headerH = 76;
  const slotH = maxUnitH + maxCharaH + 6;
  const typeSectionH = 36;
  const ctaBarH = 48;
  const W = slotW * 5 + slotGap * 4 + 24;
  const H = headerH + supSectionH + 14 + slotH + typeSectionH + ctaBarH + 24;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#0d1117'; ctx.fillRect(0, 0, W, H);

  // Accent line
  const grad = ctx.createLinearGradient(0, 0, W, 0);
  grad.addColorStop(0, '#e8961e'); grad.addColorStop(1, '#0066ff');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, 4);

  // Title
  const teamName = document.getElementById('teamNameInput').value || '編成タイトル';
  ctx.fillStyle = '#e6edf3'; ctx.font = 'bold 24px sans-serif';
  ctx.fillText(teamName, 24, 42);
  const filledCount = teamSlots.filter(s => s.unitId).length;
  ctx.fillStyle = '#8b949e'; ctx.font = '14px sans-serif';
  ctx.fillText(`${filledCount}/5${currentLang==='en'?' Units':'機'}`, 24, 64);
  // --- Branding area (top right) ---
  ctx.textAlign = 'right';
  // Site name
  ctx.fillStyle = '#e6edf3'; ctx.font = 'bold 13px sans-serif';
  ctx.fillText('GジェネエターナルDB', W - 24, 34);
  // by MH GAMES with YT icon
  if (ytIcon) {
    const iconSize = 18;
    ctx.drawImage(ytIcon, W - 24 - ctx.measureText('MH GAMES').width - iconSize - 6, 42, iconSize, iconSize);
  }
  ctx.fillStyle = '#ff0000'; ctx.font = 'bold 12px sans-serif';
  ctx.fillText('MH GAMES', W - 24, 56);
  ctx.fillStyle = '#8b949e'; ctx.font = '11px sans-serif';
  ctx.fillText(window.location.origin, W - 24, 72);
  ctx.textAlign = 'left';

  // --- Supporter ---
  const supY = headerH;
  ctx.fillStyle = '#161b22'; ctx.beginPath();
  roundRect(ctx, 12, supY, W - 24, supSectionH, 8); ctx.fill();
  ctx.strokeStyle = '#30363d'; ctx.lineWidth = 1; ctx.beginPath();
  roundRect(ctx, 12, supY, W - 24, supSectionH, 8); ctx.stroke();
  ctx.fillStyle = '#e8961e'; ctx.font = 'bold 12px sans-serif';
  ctx.fillText('サポーター', 20, supY + 18);
  if (sup) {
    if (supImg) {
      ctx.save(); ctx.beginPath();
      roundRect(ctx, 100, supY + 7, 46, 46, 6); ctx.clip();
      ctx.drawImage(supImg, 100, supY + 7, 46, 46);
      ctx.restore();
      ctx.strokeStyle = '#30363d'; ctx.lineWidth = 1; ctx.beginPath();
      roundRect(ctx, 100, supY + 7, 46, 46, 6); ctx.stroke();
    }
    const rarCol = sup.rarity === 'UR' ? '#ff6b6b' : sup.rarity === 'ULT' ? '#ff44ff' : sup.rarity === 'SSR' ? '#ffd93d' : '#b388ff';
    ctx.fillStyle = rarCol; ctx.font = 'bold 11px sans-serif';
    ctx.fillText(sup.rarity || '', 154, supY + 20);
    ctx.fillStyle = '#e6edf3'; ctx.font = 'bold 14px sans-serif';
    ctx.fillText(sup.name, 178, supY + 20);
    const maxLS1 = sup.leader_3||sup.leader_2||sup.leader_1||sup.leader_0||'';
    const maxLS2 = sup.leader2_3||sup.leader2_2||sup.leader2_1||sup.leader2_0||'';
    const target1 = sup.target_series||'';
    const target2 = sup.leader2_target||'';
    let lsText = '';
    if (target1) lsText += `[${target1}] ${maxLS1}`;
    if (target2) lsText += `  /  [${target2.replace(/ and /g,' & ')}] ${maxLS2}`;
    ctx.fillStyle = '#8b949e'; ctx.font = '11px sans-serif';
    drawClipped(ctx, 'LS: ' + lsText, 154, supY + 36, W - 154 - 120);
    ctx.fillText('サポスキ: ' + (sup.support_skill||'-'), 154, supY + 52);
    // Match count badge
    let matchCount = 0;
    teamSlots.forEach(slot => {
      if (!slot.unitId) return;
      const u = allUnits.find(x => x.id === slot.unitId);
      if (u && checkLeaderSkillMatch(u)) matchCount++;
    });
    if (matchCount > 0) {
      const badgeX = W - 110;
      ctx.fillStyle = 'rgba(34,197,94,.15)'; ctx.beginPath();
      roundRect(ctx, badgeX, supY + 8, 84, 24, 4); ctx.fill();
      ctx.strokeStyle = 'rgba(34,197,94,.4)'; ctx.lineWidth = 1; ctx.beginPath();
      roundRect(ctx, badgeX, supY + 8, 84, 24, 4); ctx.stroke();
      ctx.fillStyle = '#22c55e'; ctx.font = 'bold 12px sans-serif';
      ctx.fillText(`⚡ ${currentLang==='en'?'Applied':'適用'} ${matchCount}/5`, badgeX + 10, supY + 24);
    }
  } else {
    ctx.fillStyle = '#484f58'; ctx.font = '13px sans-serif';
    ctx.fillText('未選択', 110, supY + 36);
  }

  // --- Slot cards ---
  const startX = 12, startY = supY + supSectionH + 14;
  for (let i = 0; i < 5; i++) {
    const x = startX + i * (slotW + slotGap);
    const sd = slotData[i];
    const unit = sd.unit;
    const chara = sd.chara;
    const unitImg = loadedImgs[i * 2];
    const charaImg = loadedImgs[i * 2 + 1];
    const lsMatch = unit ? checkLeaderSkillMatch(unit) : null;

    // Card bg
    ctx.fillStyle = '#161b22'; ctx.beginPath();
    roundRect(ctx, x, startY, slotW, slotH, 8); ctx.fill();
    ctx.strokeStyle = lsMatch ? 'rgba(34,197,94,.5)' : '#30363d';
    ctx.lineWidth = lsMatch ? 2 : 1;
    ctx.beginPath(); roundRect(ctx, x, startY, slotW, slotH, 8); ctx.stroke();

    // Position label
    const posLabel = i < 3 ? '前方' : '後方';
    ctx.fillStyle = '#484f58'; ctx.font = '12px sans-serif';
    ctx.fillText(`${i+1}. ${posLabel}`, x + slotPadX, startY + 18);

    let curY = startY + 28;

    if (unit) {
      // Rarity
      const rarCol = unit.rarity === 'UR' ? '#ff6b6b' : unit.rarity === 'ULT' ? '#ff44ff' : unit.rarity === 'SSR' ? '#ffd93d' : unit.rarity === 'SR' ? '#b388ff' : '#aaa';
      ctx.fillStyle = rarCol; ctx.font = 'bold 12px sans-serif';
      ctx.fillText(unit.rarity||'?', x + slotW - 34, startY + 18);

      // Unit image (48x48)
      const imgSize = 48;
      if (unitImg) {
        ctx.save(); ctx.beginPath();
        roundRect(ctx, x + slotPadX, curY, imgSize, imgSize, 6); ctx.clip();
        ctx.drawImage(unitImg, x + slotPadX, curY, imgSize, imgSize);
        ctx.restore();
        ctx.strokeStyle = '#30363d'; ctx.lineWidth = 1; ctx.beginPath();
        roundRect(ctx, x + slotPadX, curY, imgSize, imgSize, 6); ctx.stroke();
      }
      // Name next to image
      const nameX = x + slotPadX + imgSize + 6;
      const nameMaxW = slotW - slotPadX - imgSize - 12;
      ctx.fillStyle = '#e6edf3'; ctx.font = 'bold 12px sans-serif';
      drawClipped(ctx, unit.name, nameX, curY + 18, nameMaxW);

      // LS buff badge below name
      if (lsMatch) {
        ctx.fillStyle = 'rgba(34,197,94,.15)'; ctx.beginPath();
        roundRect(ctx, nameX, curY + 24, 56, 17, 3); ctx.fill();
        ctx.strokeStyle = 'rgba(34,197,94,.4)'; ctx.lineWidth = 1; ctx.beginPath();
        roundRect(ctx, nameX, curY + 24, 56, 17, 3); ctx.stroke();
        ctx.fillStyle = '#22c55e'; ctx.font = 'bold 11px sans-serif';
        ctx.fillText('⚡' + lsMatch.buff, nameX + 4, curY + 37);
      }

      curY += imgSize + 8; // Clear below image

      // Stats
      const us = unit.normal?.stats || {};
      const stats = [
        ['ATK', (parseInt(us.attack)||0).toLocaleString()],
        ['HP', (parseInt(us.hp)||0).toLocaleString()],
        ['DEF', (parseInt(us.defense)||0).toLocaleString()],
        ['EN', (parseInt(us.en)||0).toLocaleString()],
        ['機動', us.agility||'-'],
        ['移動', us.mobility||'-']
      ];
      stats.forEach(([label, val]) => {
        ctx.fillStyle = '#8b949e'; ctx.font = '11px sans-serif'; ctx.fillText(label, x + slotPadX, curY);
        ctx.fillStyle = '#e6edf3'; ctx.font = 'bold 11px sans-serif'; ctx.fillText(val, x + slotPadX + 42, curY);
        curY += 15;
      });

      // Terrain
      curY += 2;
      const terr = unit.normal?.terrain || {};
      ['宇宙','空中','地上','水上','水中'].forEach((tk, ti) => {
        const tx = x + slotPadX + ti * 33;
        const tv = terr[tk] || '-';
        ctx.fillStyle = tv === '◯' ? '#3fb950' : tv === '△' ? '#d29922' : '#484f58';
        ctx.font = '11px sans-serif'; ctx.fillText(tv, tx + 8, curY);
        ctx.fillStyle = '#8b949e'; ctx.font = '10px sans-serif'; ctx.fillText(tk[0], tx + 6, curY + 13);
      });
      curY += 28;

      // Unit abilities
      if (sd.unitAbils.length > 0) {
        ctx.fillStyle = '#e8961e'; ctx.font = 'bold 10px sans-serif';
        ctx.fillText(currentLang==='en'?'Abilities':t('アビリティ'), x + slotPadX, curY);
        curY += LABEL_H - 2;
        sd.unitAbils.forEach(a => {
          ctx.fillStyle = '#c9d1d9'; ctx.font = '10px sans-serif';
          drawClipped(ctx, a.name, x + slotPadX, curY, textMaxW);
          curY += LINE_H;
        });
      }
    } else {
      ctx.fillStyle = '#484f58'; ctx.font = '13px sans-serif';
      ctx.fillText('未選択', x + slotW/2 - 16, startY + 90);
    }

    // --- Chara section ---
    const charaY = startY + maxUnitH;
    ctx.strokeStyle = '#30363d'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x + 4, charaY); ctx.lineTo(x + slotW - 4, charaY); ctx.stroke();
    ctx.fillStyle = '#21262d'; ctx.beginPath();
    roundRect(ctx, x + 1, charaY + 1, slotW - 2, maxCharaH + 4, 0); ctx.fill();

    let cY = charaY + 8;

    if (chara) {
      // Chara image (40x40)
      const cImgSize = 40;
      if (charaImg) {
        ctx.save(); ctx.beginPath();
        roundRect(ctx, x + slotPadX, cY, cImgSize, cImgSize, 6); ctx.clip();
        ctx.drawImage(charaImg, x + slotPadX, cY, cImgSize, cImgSize);
        ctx.restore();
        ctx.strokeStyle = '#30363d'; ctx.lineWidth = 1; ctx.beginPath();
        roundRect(ctx, x + slotPadX, cY, cImgSize, cImgSize, 6); ctx.stroke();
      }
      const cNameX = x + slotPadX + cImgSize + 6;
      const cNameMaxW = slotW - slotPadX - cImgSize - 12;
      ctx.fillStyle = '#e6edf3'; ctx.font = 'bold 12px sans-serif';
      drawClipped(ctx, chara.name, cNameX, cY + 18, cNameMaxW);
      const cRarCol = chara.rarity === 'UR' ? '#ff6b6b' : chara.rarity === 'ULT' ? '#ff44ff' : chara.rarity === 'SSR' ? '#ffd93d' : '#b388ff';
      ctx.fillStyle = cRarCol; ctx.font = 'bold 10px sans-serif';
      ctx.fillText(chara.rarity||'', cNameX, cY + 34);

      cY += cImgSize + 8; // Clear below image

      // Stats
      const cs = chara.stats || {};
      [['射撃',cs.shooting],['格闘',cs.melee],['覚醒',cs.awakening],['守備',cs.defense],['反応',cs.reaction]].forEach(([cl,cv]) => {
        ctx.fillStyle = '#8b949e'; ctx.font = '11px sans-serif'; ctx.fillText(cl, x + slotPadX, cY);
        ctx.fillStyle = '#e6edf3'; ctx.font = 'bold 11px sans-serif'; ctx.fillText(String(cv||'-'), x + slotPadX + 38, cY);
        cY += 15;
      });

      // Skills
      if (sd.charaSkills.length > 0) {
        cY += 3;
        ctx.fillStyle = '#58a6ff'; ctx.font = 'bold 10px sans-serif';
        ctx.fillText(currentLang==='en'?'Skills':t('スキル'), x + slotPadX, cY);
        cY += LABEL_H - 2;
        sd.charaSkills.forEach(sk => {
          ctx.fillStyle = '#58a6ff'; ctx.font = '10px sans-serif';
          const skName = sk.name.replace(/\(SP:\d+\)/,'').replace(/Lv\d+/,'').trim();
          const spCost = sk.sp_cost ? ` SP:${sk.sp_cost}` : '';
          drawClipped(ctx, skName + spCost, x + slotPadX, cY, textMaxW);
          cY += LINE_H;
        });
      }

      // Abilities
      if (sd.charaAbils.length > 0) {
        cY += 3;
        ctx.fillStyle = '#d2a8ff'; ctx.font = 'bold 10px sans-serif';
        ctx.fillText(currentLang==='en'?'Abilities':t('アビリティ'), x + slotPadX, cY);
        cY += LABEL_H - 2;
        sd.charaAbils.forEach(a => {
          ctx.fillStyle = '#c9d1d9'; ctx.font = '10px sans-serif';
          drawClipped(ctx, a.name, x + slotPadX, cY, textMaxW);
          cY += LINE_H;
        });
      }
    } else {
      ctx.fillStyle = '#484f58'; ctx.font = '12px sans-serif';
      ctx.fillText('キャラ未選択', x + slotW/2 - 30, charaY + 50);
    }
  }

  // --- Type balance bar ---
  const typeColorMap = { '攻撃':'#ff6b6b', '耐久':'#4dabf7', '支援':'#69db7c', '射撃':'#ffd43b', '格闘':'#ff922b', '覚醒':'#da77f2' };
  const typeCounts = {};
  teamSlots.forEach(slot => {
    if (!slot.unitId) return;
    const u = allUnits.find(x => x.id === slot.unitId);
    if (u && u.type) typeCounts[u.type] = (typeCounts[u.type] || 0) + 1;
  });
  const typeBarY = startY + slotH + 8;
  ctx.fillStyle = '#161b22'; ctx.beginPath();
  roundRect(ctx, 12, typeBarY, W - 24, 30, 6); ctx.fill();
  ctx.strokeStyle = '#30363d'; ctx.lineWidth = 1; ctx.beginPath();
  roundRect(ctx, 12, typeBarY, W - 24, 30, 6); ctx.stroke();
  ctx.fillStyle = '#8b949e'; ctx.font = 'bold 11px sans-serif';
  ctx.fillText(currentLang==='en'?'Type Balance':t('タイプバランス'), 22, typeBarY + 20);
  let typeX = 120;
  Object.entries(typeCounts).forEach(([typeName, count]) => {
    const iconImg = typeIcons[typeName];
    if (iconImg) {
      ctx.drawImage(iconImg, typeX, typeBarY + 6, 18, 18);
      typeX += 22;
    }
    ctx.fillStyle = typeColorMap[typeName] || '#e6edf3';
    ctx.font = 'bold 12px sans-serif';
    ctx.fillText(`${typeName} x${count}`, typeX, typeBarY + 20);
    typeX += ctx.measureText(`${typeName} x${count}`).width + 18;
  });
  if (Object.keys(typeCounts).length === 0) {
    ctx.fillStyle = '#484f58'; ctx.font = '11px sans-serif';
    ctx.fillText('ユニット未選択', 120, typeBarY + 20);
  }

  // --- Footer CTA bar ---
  const ctaY = typeBarY + 38;
  // Background bar
  ctx.fillStyle = '#161b22'; ctx.beginPath();
  roundRect(ctx, 12, ctaY, W - 24, 44, 6); ctx.fill();
  ctx.strokeStyle = '#30363d'; ctx.lineWidth = 1; ctx.beginPath();
  roundRect(ctx, 12, ctaY, W - 24, 44, 6); ctx.stroke();

  // YT icon large
  if (ytIcon) {
    ctx.save(); ctx.beginPath();
    roundRect(ctx, 22, ctaY + 6, 32, 32, 6); ctx.clip();
    ctx.drawImage(ytIcon, 22, ctaY + 6, 32, 32);
    ctx.restore();
  }

  // Channel info
  ctx.fillStyle = '#ff0000'; ctx.font = 'bold 13px sans-serif';
  ctx.fillText('▶ MH GAMES', 62, ctaY + 20);
  ctx.fillStyle = '#8b949e'; ctx.font = '11px sans-serif';
  ctx.fillText('YouTube: @MH_GAMES_JP', 62, ctaY + 36);

  // CTA text
  ctx.textAlign = 'right';
  ctx.fillStyle = '#e8961e'; ctx.font = 'bold 12px sans-serif';

  // Export

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
}

function loadTeamFromURL() {
  const params = new URLSearchParams(window.location.search);
  const teamStr = params.get('team');
  if (!teamStr) return false;
  const parts = teamStr.split('|');
  teamSlots = parts.map(p => {
    const [u, c] = p.split(',').map(Number);
    return { unitId: u || null, charaId: c || null };
  });
  while (teamSlots.length < 5) teamSlots.push({ unitId: null, charaId: null });
  teamSupporterId = parseInt(params.get('sup')) || null;
  document.getElementById('teamNameInput').value = params.get('tn') || 'Shared Team';
  teamLeaderTag = params.get('lt') || '';
  teamLeaderEffect = params.get('le') || '';
  return true;
}

function showToast(msg) {
  const toast = document.getElementById('teamToast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// === URL STATE SYNC ===
function syncURL() {
  const params = new URLSearchParams();

  // Tab
  if (currentTab !== 'unit') params.set('tab', currentTab);

  // Team tab has its own params — don't mix
  if (currentTab === 'team') {
    // Keep existing team params if any
    const existing = new URLSearchParams(window.location.search);
    ['team','sup','tn','lt','le'].forEach(k => { if (existing.get(k)) params.set(k, existing.get(k)); });
    history.replaceState(null, '', params.toString() ? '?' + params.toString() : window.location.pathname);
    return;
  }

  // Tag lookup — always early-return (don't read filter DOM)
  if (currentTab === 'taglookup') {
    if (activeTagLookup) params.set('ltag', activeTagLookup);
    const tagQ = document.getElementById('tagSearchInput')?.value || '';
    if (tagQ) params.set('tq', tagQ);
    history.replaceState(null, '', params.toString() ? '?' + params.toString() : window.location.pathname);
    return;
  }

  // Search
  const q = document.getElementById('searchInput')?.value || '';
  if (q) params.set('q', q);

  // View mode
  if (currentView !== 'card') params.set('view', currentView);

  // Sort
  if (currentSort !== 'atk') params.set('sort', currentSort);
  if (currentDir !== -1) params.set('dir', currentDir > 0 ? 'asc' : 'desc');

  // Rarity filter
  const activeRarities = [...document.querySelectorAll('#filterRarityButtons .filter-btn.active')].map(b => b.dataset.value);
  if (activeRarities.length) params.set('rarity', activeRarities.join(','));

  if (currentTab === 'unit') {
    const activeTypes = [...document.querySelectorAll('#filterTypeButtons .filter-btn.active')].map(b => b.dataset.value);
    if (activeTypes.length) params.set('type', activeTypes.join(','));
    const series = document.getElementById('filterSeries')?.value || '';
    if (series) params.set('series', series);
    const tag = document.getElementById('filterTag')?.value || '';
    if (tag) params.set('tag', tag);
    const activeTerrainsBtns = [...document.querySelectorAll('#filterTerrainButtons .filter-btn.active')].map(b => b.dataset.value);
    if (activeTerrainsBtns.length) params.set('terrain', activeTerrainsBtns.join(','));
    if (activeDebuffKey) params.set('debuff', activeDebuffKey);
    if (debuffMinRate > 0) params.set('drate', debuffMinRate);
    if (activeSpecialKey) params.set('special', activeSpecialKey);
  } else if (currentTab === 'chara') {
    const activeCharaTypes = [...document.querySelectorAll('#charaTypeButtons .filter-btn.active')].map(b => b.dataset.value);
    if (activeCharaTypes.length) params.set('ctype', activeCharaTypes.join(','));
    const series = document.getElementById('filterSeries')?.value || '';
    if (series) params.set('series', series);
    const tag = document.getElementById('filterTag')?.value || '';
    if (tag) params.set('tag', tag);
  }

  const url = params.toString() ? '?' + params.toString() : window.location.pathname;
  history.replaceState(null, '', url);
}

function restoreFromURL() {
  const params = new URLSearchParams(window.location.search);
  if (!params.toString()) return false;

  // Team tab handled separately
  if (params.get('team')) return false; // let loadTeamFromURL handle it

  const tab = params.get('tab') || 'unit';
  const q = params.get('q') || '';
  const view = params.get('view') || 'card';
  const sort = params.get('sort') || 'atk';
  const dir = params.get('dir') === 'asc' ? 1 : -1;
  const rarities = (params.get('rarity') || '').split(',').filter(Boolean);
  const types = (params.get('type') || '').split(',').filter(Boolean);
  const series = params.get('series') || '';
  const tag = params.get('tag') || '';
  const terrain = params.get('terrain') || '';
  const debuff = params.get('debuff') || '';
  const drate = parseInt(params.get('drate')) || 0;
  const special = params.get('special') || '';
  const charaTypes = (params.get('ctype') || '').split(',').filter(Boolean);
  const lookupTag = params.get('ltag') || '';
  const tagQ = params.get('tq') || '';

  // Set global state
  currentTab = tab;
  currentSort = sort;
  currentDir = dir;
  currentView = view;

  // Activate correct tab button
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const tabBtn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
  if (tabBtn) tabBtn.classList.add('active');

  // View mode
  document.querySelectorAll('.view-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === currentView);
  });

  // Show/hide sections
  const isTagLookup = tab === 'taglookup';
  const isTeam = tab === 'team';
  const isSpecial = isTagLookup || isTeam;
  document.querySelector('.controls').style.display = isSpecial ? 'none' : '';
  document.getElementById('mainGrid').style.display = isSpecial ? 'none' : '';
  document.getElementById('tableWrap').style.display = isSpecial ? 'none' : (currentView === 'table' ? '' : 'none');
  document.getElementById('tagLookupContainer').style.display = isTagLookup ? '' : 'none';
  document.getElementById('teamSimContainer').style.display = isTeam ? '' : 'none';

  if (isTagLookup) {
    if (tagQ) document.getElementById('tagSearchInput').value = tagQ;
    activeTagLookup = lookupTag;
    renderTagLookup();
    return true;
  }

  if (isTeam) {
    renderTeamSim();
    return true;
  }

  // Build filters first so DOM elements exist
  buildFilters();
  updateUI();

  // Set search
  document.getElementById('searchInput').value = q;

  // Set rarity buttons
  if (rarities.length) {
    document.querySelectorAll('#filterRarityButtons .filter-btn').forEach(b => {
      if (rarities.includes(b.dataset.value)) b.classList.add('active');
    });
  }

  if (tab === 'unit') {
    // Type buttons
    if (types.length) {
      document.querySelectorAll('#filterTypeButtons .filter-btn').forEach(b => {
        if (types.includes(b.dataset.value)) b.classList.add('active');
      });
    }
    if (series) document.getElementById('filterSeries').value = series;
    if (tag) document.getElementById('filterTag').value = tag;
    if (terrain) terrain.split(',').forEach(v => { document.querySelectorAll('#filterTerrainButtons .filter-btn').forEach(b => { if (b.dataset.value === v) b.classList.add('active'); }); });
    if (debuff) {
      activeDebuffKey = debuff;
      document.querySelectorAll('#debuffCategoryButtons .filter-btn').forEach(b => {
        if (b.dataset.key === debuff) b.classList.add('active');
      });
      // Trigger rate dropdown build
      const cat = DEBUFF_CATEGORIES.find(d => d.key === debuff);
      if (cat) {
        document.getElementById('debuffRateWrap').style.display = '';
        const rates = new Set();
        allUnits.forEach(u => {
          (u.normal_weapons||[]).concat(u.transformed_weapons||[]).forEach(w => {
            const m = (w.effect||'').match(cat.pattern);
            if (m) rates.add(parseInt(m[1]));
          });
        });
        const sortedRates = [...rates].sort((a,b)=>a-b);
        const rateSel = document.getElementById('debuffMinRate');
        rateSel.innerHTML = '<option value="">すべて</option>' + sortedRates.map(r => `<option value="${r}">${r}%以上</option>`).join('');
        if (drate) { rateSel.value = drate; debuffMinRate = drate; }
      }
    }
    if (special) {
      activeSpecialKey = special;
      document.querySelectorAll('#specialEffectButtons .filter-btn').forEach(b => {
        if (b.dataset.key === special) b.classList.add('active');
      });
    }
  } else if (tab === 'chara') {
    if (charaTypes.length) {
      document.querySelectorAll('#charaTypeButtons .filter-btn').forEach(b => {
        if (charaTypes.includes(b.dataset.value)) b.classList.add('active');
      });
    }
    if (series) document.getElementById('filterSeries').value = series;
    if (tag) document.getElementById('filterTag').value = tag;
  }

  // Set sort button active
  document.querySelectorAll('.sort-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.sort === currentSort);
  });

  render();
  return true;
}

function clearAllFilters() {
  resetFilters();
  buildFilters();
  updateUI();
  render();
  syncURL();
}

function updateClearButton() {
  const q = document.getElementById('searchInput')?.value || '';
  const activeRarities = [...document.querySelectorAll('#filterRarityButtons .filter-btn.active')].length;
  let hasFilter = q || activeRarities > 0 || activeDebuffKey || activeSpecialKey;
  if (!hasFilter && currentTab === 'unit') {
    const activeTypes = [...document.querySelectorAll('#filterTypeButtons .filter-btn.active')].length;
    const series = document.getElementById('filterSeries')?.value || '';
    const tag = document.getElementById('filterTag')?.value || '';
    const activeTerrainsBtns = [...document.querySelectorAll('#filterTerrainButtons .filter-btn.active')].map(b => b.dataset.value);
    const mapActive = document.getElementById('filterMapBtn')?.classList.contains('active');
    const rangeVal = document.getElementById('filterRange')?.value || '';
    hasFilter = activeTypes > 0 || series || tag || activeTerrainsBtns.length > 0 || mapActive || rangeVal;
  }
  if (!hasFilter && currentTab === 'chara') {
    const activeCharaTypes = [...document.querySelectorAll('#charaTypeButtons .filter-btn.active')].length;
    const series = document.getElementById('filterSeries')?.value || '';
    const tag = document.getElementById('filterTag')?.value || '';
    hasFilter = activeCharaTypes > 0 || series || tag;
  } else if (currentTab === 'supporter') {
    const target = document.getElementById('filterTarget').value;
    const activeSupTags = document.querySelectorAll('#filterSupTagButtons .filter-btn.active').length;
    const activeSupSkills = document.querySelectorAll('#filterSupSkillButtons .filter-btn.active').length;
    hasFilter = activeRarities > 0 || target || activeSupTags > 0 || activeSupSkills > 0;
  }
  const cb = document.getElementById('clearFiltersBtn'); if (cb) cb.style.display = hasFilter ? '' : 'none';
}

// Event listeners
document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('filterSeries').addEventListener('change', render);
document.getElementById('filterTag').addEventListener('change', render);
document.getElementById('filterCharaType')?.addEventListener('change', render);
document.getElementById('filterTarget').addEventListener('change', render);
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeTeamPicker(); } });
document.getElementById('teamPickerOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeTeamPicker(); });
document.getElementById('tagSearchInput')?.addEventListener('input', () => { renderTagLookup(); syncURL(); });

bindSortButtons();
init();
</script>
