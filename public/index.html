<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gジェネエターナル DB</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--card:#131a2b;--card-hover:#1a2540;--border:#2a3655;--accent:#00d4ff;--accent2:#ff6b35;--text:#e0e8f0;--text2:#8899aa;--gold:#ffd700;--ur:#ff4466}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* Header */
.header{background:linear-gradient(135deg,#0d1525,#1a2844);border-bottom:2px solid transparent;border-image:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent) 1;padding:14px 20px 0;text-align:center;position:sticky;top:0;z-index:100}
.header-brand{display:flex;align-items:center;justify-content:center;gap:10px}
.header-icon{width:36px;height:36px;border-radius:50%;border:2px solid var(--accent);flex-shrink:0}
.header h1{font-size:1.4em;letter-spacing:2px;background:linear-gradient(90deg,var(--accent),#80e0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{font-size:.75em;color:var(--text2);margin-top:2px}
.header .yt-link{display:inline-block;margin-top:5px;font-size:.7em;color:var(--accent2);border:1px solid var(--accent2);padding:2px 10px;border-radius:12px}
.header .yt-cta{margin-top:4px;font-size:.65em;color:var(--text2);letter-spacing:.02em}.yt-cta a{color:#ff6b35;font-weight:bold;text-decoration:underline}

/* Accent line */
.accent-line{height:3px;background:linear-gradient(90deg,transparent 5%,var(--accent) 20%,var(--accent2) 50%,var(--accent) 80%,transparent 95%);opacity:.4;margin:0}

/* Tabs */
.tab-bar{display:flex;justify-content:center;gap:0;margin-top:10px;background:linear-gradient(135deg,#0d1525,#1a2844);position:sticky;top:0;z-index:100}
.tab-btn{padding:10px 28px;font-size:.9em;font-weight:600;color:var(--text2);background:transparent;border:none;border-bottom:3px solid transparent;cursor:pointer;transition:all .2s;letter-spacing:1px}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn .tab-count{font-size:.7em;font-weight:400;margin-left:4px;opacity:.7}

/* Controls */
.controls{max-width:1200px;margin:16px auto;padding:0 16px}
.search-box{display:flex;gap:8px;margin-bottom:12px}
.search-box input{flex:1;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:1em;outline:none}
.search-box input:focus{border-color:var(--accent)}
.search-box input::placeholder{color:var(--text2)}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.filter-group{display:flex;align-items:center;gap:4px}
.filter-group label{font-size:.75em;color:var(--text2);white-space:nowrap}
.filter-group select{padding:6px 10px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.85em;outline:none}
.filter-group select:focus{border-color:var(--accent)}
.stats-bar{display:flex;justify-content:space-between;align-items:center;font-size:.8em;color:var(--text2);padding:4px 0;border-bottom:1px solid var(--border);margin-bottom:12px}
.sort-btns{display:flex;gap:4px;flex-wrap:wrap}
.sort-btn{padding:3px 8px;background:var(--card);border:1px solid var(--border);border-radius:4px;color:var(--text2);cursor:pointer;font-size:.75em}
.sort-btn.active{border-color:var(--accent);color:var(--accent)}

/* Grid */
.grid{max-width:1200px;margin:0 auto;padding:0 16px 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}

/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .2s}
.card:hover{background:var(--card-hover);border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,212,255,.1)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px}
.card-icon{width:48px;height:48px;border-radius:6px;border:1px solid var(--border);object-fit:cover;flex-shrink:0;background:var(--bg)}
.card-name{font-size:1.05em;font-weight:700;color:#fff;flex:1;min-width:0}
.card-badges{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap}
.badge{padding:2px 8px;border-radius:4px;font-size:.65em;font-weight:700;letter-spacing:.5px}
.badge-ur{background:linear-gradient(135deg,#9b30ff,#bf5fff);color:#fff}
.badge-ssr{background:linear-gradient(135deg,#daa520,#ffd700);color:#1a1a1a}
.badge-sr{background:linear-gradient(135deg,#a0a0a0,#c0c0c0);color:#1a1a1a}
.badge-r{background:linear-gradient(135deg,#b87333,#cd853f);color:#fff}
.badge-n{background:linear-gradient(135deg,#555,#777);color:#fff}
.badge-type{background:var(--bg);border:1px solid var(--border);color:var(--text2)}
.badge-atk{border-color:#ff4444;color:#ff6666}
.badge-def{border-color:#4488ff;color:#6699ff}
.badge-sup{border-color:#daa520;color:#ffd700}
.badge-ex{background:linear-gradient(135deg,var(--accent2),#ff8844);color:#fff}
.badge-icon{display:inline-flex;align-items:center;gap:3px}
.badge-icon img{width:16px;height:16px;vertical-align:middle;filter:drop-shadow(0 0 2px rgba(0,0,0,.5))}
.map-icon{width:18px;height:18px;vertical-align:middle;filter:drop-shadow(0 0 3px rgba(255,68,102,.4))}
.weapon-attr-icon{width:14px;height:14px;vertical-align:middle;margin-right:2px;filter:drop-shadow(0 0 1px rgba(0,0,0,.5))}

.card-series{font-size:.7em;color:var(--text2);margin-bottom:8px}
.card-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:8px}
.card-stats-sub{grid-template-columns:repeat(4,1fr);margin-bottom:8px;margin-top:-4px}
.stat{text-align:center;padding:4px;background:var(--bg);border-radius:4px}
.stat-label{font-size:.6em;color:var(--text2);text-transform:uppercase}
.stat-val{font-size:.9em;font-weight:700}
.cp-val{color:var(--gold)}
.card-terrain{display:flex;gap:6px;font-size:.7em;margin-bottom:8px}
.terrain-item{display:flex;align-items:center;gap:2px}
.terrain-ok{color:#44cc44}
.terrain-tri{color:#ffaa00}
.terrain-no{color:#555}
.card-weapons{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.weapon-tag{padding:2px 6px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.2);border-radius:3px;font-size:.65em;color:var(--accent)}
.weapon-tag.ex{background:rgba(255,107,53,.15);border-color:rgba(255,107,53,.3);color:var(--accent2)}
.weapon-tag.map{background:rgba(255,68,102,.15);border-color:rgba(255,68,102,.3);color:#ff6688}
.card-tags{display:flex;flex-wrap:wrap;gap:3px}
.tag{padding:1px 5px;background:rgba(255,255,255,.05);border-radius:3px;font-size:.6em;color:var(--text2)}

/* Transform Toggle */
.transform-toggle{display:flex;gap:0;margin-bottom:8px;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.transform-btn{flex:1;padding:4px 8px;font-size:.7em;font-weight:600;background:var(--bg);color:var(--text2);border:none;cursor:pointer;transition:all .2s;text-align:center}
.transform-btn.active{background:linear-gradient(135deg,rgba(0,212,255,.2),rgba(0,212,255,.1));color:var(--accent);border-bottom:2px solid var(--accent)}
.transform-btn:hover:not(.active){color:var(--text)}

/* Character card specifics */
.card-skills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.skill-tag{padding:2px 6px;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.2);border-radius:3px;font-size:.65em;color:var(--gold)}
.card-abilities-count{font-size:.7em;color:var(--text2)}

/* Supporter card specifics */
.supporter-info{font-size:.75em;color:var(--text2);margin-bottom:6px;line-height:1.5}
.supporter-info strong{color:var(--text);font-weight:600}
.supporter-stat{display:inline-block;padding:2px 8px;background:var(--bg);border-radius:4px;font-size:.75em;margin-right:6px;margin-bottom:4px}
.supporter-stat .sv{font-weight:700;color:var(--text)}

/* Detail Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:flex-start;padding:20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--accent);border-radius:12px;max-width:700px;width:100%;padding:24px;position:relative}
.modal-close{position:absolute;top:12px;right:16px;font-size:1.5em;color:var(--text2);cursor:pointer;background:none;border:none}
.modal-close:hover{color:#fff}
.modal-header-row{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.modal-icon{width:64px;height:64px;border-radius:8px;border:1px solid var(--border);object-fit:cover;flex-shrink:0;background:var(--bg)}
.modal h2{font-size:1.3em;margin-bottom:4px;color:#fff}
.modal .detail-badges{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.modal .detail-section{margin-bottom:16px}
.modal .detail-section h3{font-size:.85em;color:var(--accent);border-bottom:1px solid var(--border);padding-bottom:4px;margin-bottom:8px}
.modal .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.modal .stat-box{text-align:center;padding:8px;background:var(--bg);border-radius:6px;border:1px solid var(--border)}
.modal .stat-box .label{font-size:.65em;color:var(--text2)}
.modal .stat-box .val{font-size:1.1em;font-weight:700}
.modal .weapon-detail{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:6px}
.modal .weapon-name{font-weight:700;font-size:.9em;margin-bottom:4px}
.modal .weapon-name .ex-badge{color:var(--accent2);font-size:.7em;margin-left:4px}
.modal .weapon-name .map-badge{display:inline-block;background:linear-gradient(135deg,#ff4466,#ff8844);color:#fff;font-size:.6em;font-weight:700;padding:1px 6px;border-radius:3px;margin-right:6px;vertical-align:middle}
.modal .mechanism-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;margin-bottom:4px;font-size:.8em}
.modal .mechanism-name{font-weight:600;color:var(--accent)}
.modal .mechanism-effect{color:var(--text2);font-size:.9em}
.modal .weapon-info{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:4px;font-size:.75em}
.modal .weapon-info span{color:var(--text2)}
.modal .weapon-info strong{color:var(--text)}
.modal .weapon-effect{font-size:.7em;color:var(--text2);margin-top:4px;font-style:italic}
.modal .ability-item{padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.8em}
.modal .ability-item:last-child{border:none}
.modal .ability-name{font-weight:600;color:#fff}
.modal .ability-effect{color:var(--text2);font-size:.85em}
.modal .skill-item{padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;margin-bottom:4px}
.modal .skill-name{font-weight:600;font-size:.85em;color:var(--gold)}
.modal .skill-effect{color:var(--text2);font-size:.8em;margin-top:2px}
.terrain-grid{display:flex;gap:12px;font-size:.85em}

/* Supporter modal */
.modal .supporter-detail-block{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:8px}
.modal .supporter-detail-block .sd-label{font-size:.7em;color:var(--accent);font-weight:600;margin-bottom:4px}
.modal .supporter-detail-block .sd-text{font-size:.85em;color:var(--text);line-height:1.5}

/* View Toggle */
.view-toggle{display:flex;gap:2px;margin-left:12px}
.view-btn{padding:3px 10px;background:var(--card);border:1px solid var(--border);border-radius:4px;color:var(--text2);cursor:pointer;font-size:.75em;display:flex;align-items:center;gap:3px}
.view-btn.active{border-color:var(--accent);color:var(--accent)}
.view-btn svg{width:14px;height:14px;fill:currentColor}

/* Table View */
.data-table-wrap{max-width:1200px;margin:0 auto;padding:0 16px 40px;overflow-x:auto}
.data-table{width:100%;border-collapse:collapse;font-size:.8em}
.data-table th{position:sticky;top:0;background:var(--card);color:var(--accent);font-weight:600;padding:8px 10px;text-align:left;border-bottom:2px solid var(--accent);white-space:nowrap;font-size:.85em;cursor:pointer;user-select:none}
.data-table th:hover{color:#fff}
.data-table td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap}
.data-table tr{cursor:pointer;transition:background .15s}
.data-table tr:hover{background:var(--card-hover)}
.data-table .cell-name{font-weight:600;color:#fff;white-space:normal;max-width:200px}
.data-table .cell-icon{width:32px;height:32px;border-radius:4px;vertical-align:middle;margin-right:6px;border:1px solid var(--border)}
.data-table .cell-num{text-align:right;font-variant-numeric:tabular-nums}
.data-table .cell-center{text-align:center}

@media(max-width:600px){
  .grid{grid-template-columns:1fr}
  .filters{flex-direction:column}
  .card-stats{grid-template-columns:repeat(2,1fr)}
  .card-stats-sub{grid-template-columns:repeat(2,1fr)}
  .modal .stats-grid{grid-template-columns:repeat(2,1fr)}
  .modal .mechanism-item{flex-direction:column;align-items:flex-start}
  .modal .weapon-info{grid-template-columns:repeat(2,1fr)}
  .tab-btn{padding:10px 16px;font-size:.8em}
  .data-table{font-size:.7em}
  .data-table td,.data-table th{padding:5px 6px}
  .view-toggle{margin-left:6px}
  .header-brand{gap:6px}
  .header-icon{width:28px;height:28px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <img class="header-icon" src="https://yt3.googleusercontent.com/1fHhbDahgzj20gzAsBkKvdA_N5O7uQQ-xU3R8evoky8Nibz6G46Nif9IdfsP94SWavB0HZFI=s240-c-k-c0x00ffffff-no-rj" alt="MH GAMES">
    <h1>Gジェネエターナル DB</h1>
  </div>
  <div class="sub">全レアリティ対応データベース ・ 検索＆フィルタ</div>
  <a class="yt-link" href="https://www.youtube.com/@MH_GAMES_JP" target="_blank">▶ MH GAMES YouTube</a>
  <div class="yt-cta">このサイトをもっと充実させてほしいと思ったら<a href="https://www.youtube.com/@MH_GAMES_JP?sub_confirmation=1" target="_blank">チャンネル登録</a>で応援！</div>
  <div class="accent-line"></div>
  <div class="tab-bar" id="tabBar">
    <button class="tab-btn active" data-tab="unit">ユニット<span class="tab-count" id="unitTabCount"></span></button>
    <button class="tab-btn" data-tab="chara">キャラ<span class="tab-count" id="charaTabCount"></span></button>
    <button class="tab-btn" data-tab="supporter">サポーター<span class="tab-count" id="supporterTabCount"></span></button>
  </div>
</div>

<div class="controls">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="ユニット名で検索...（例: サザビー、ガンダム）">
  </div>
  <div class="filters" id="filtersContainer">
    <div class="filter-group">
      <label>タイプ</label>
      <select id="filterType"><option value="">すべて</option></select>
    </div>
    <div class="filter-group" id="filterSeriesGroup">
      <label>シリーズ</label>
      <select id="filterSeries"><option value="">すべて</option></select>
    </div>
    <div class="filter-group" id="filterTagGroup">
      <label>タグ</label>
      <select id="filterTag"><option value="">すべて</option></select>
    </div>
    <div class="filter-group" id="filterTerrainGroup">
      <label>地形</label>
      <select id="filterTerrain">
        <option value="">すべて</option>
        <option value="space">宇宙◯</option>
        <option value="air">空中◯</option>
        <option value="ground">地上◯</option>
        <option value="surface">水上◯</option>
        <option value="water">水中◯</option>
      </select>
    </div>
    <div class="filter-group" id="filterRarityGroup">
      <label>レア</label>
      <select id="filterRarity"><option value="">すべて</option></select>
    </div>
    <div class="filter-group" id="filterCharaTypeGroup" style="display:none">
      <label>キャラタイプ</label>
      <select id="filterCharaType"><option value="">すべて</option></select>
    </div>
    <div class="filter-group" id="filterTargetGroup" style="display:none">
      <label>対象</label>
      <select id="filterTarget"><option value="">すべて</option></select>
    </div>
  </div>
  <div class="stats-bar">
    <span id="resultCount">読込中...</span>
    <div style="display:flex;align-items:center">
      <div class="sort-btns" id="sortBtns">
        <button class="sort-btn active" data-sort="atk">攻撃力順</button>
        <button class="sort-btn" data-sort="hp">HP順</button>
        <button class="sort-btn" data-sort="def">防御力順</button>
        <button class="sort-btn" data-sort="en">EN順</button>
        <button class="sort-btn" data-sort="name">名前順</button>
      </div>
      <div class="view-toggle" id="viewToggle">
        <button class="view-btn active" data-view="card" title="カード表示"><svg viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg></button>
        <button class="view-btn" data-view="table" title="テーブル表示"><svg viewBox="0 0 16 16"><rect x="1" y="1" width="14" height="3" rx=".5"/><rect x="1" y="6" width="14" height="3" rx=".5"/><rect x="1" y="11" width="14" height="3" rx=".5"/></svg></button>
      </div>
    </div>
  </div>
</div>

<div class="grid" id="mainGrid"></div>
<div class="data-table-wrap" id="tableWrap" style="display:none"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script>
let allUnits = [], allCharas = [], allSupporters = [];
let currentTab = 'unit';
let currentSort = 'atk';
let currentDir = -1;
let currentView = 'card';

async function init() {
  const [uResp, cResp, sResp] = await Promise.all([
    fetch('/units.json'), fetch('/characters.json'), fetch('/supporters.json')
  ]);
  allUnits = await uResp.json();
  allCharas = await cResp.json();
  allSupporters = await sResp.json();

  document.getElementById('unitTabCount').textContent = `(${allUnits.length})`;
  document.getElementById('charaTabCount').textContent = `(${allCharas.length})`;
  document.getElementById('supporterTabCount').textContent = `(${allSupporters.length})`;

  setupTabs();
  setupViewToggle();
  buildFilters();
  render();
}

function setupTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentTab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      resetFilters();
      buildFilters();
      updateUI();
      render();
    });
  });
}

function setupViewToggle() {
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentView = btn.dataset.view;
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterType').innerHTML = '<option value="">すべて</option>';
  document.getElementById('filterSeries').innerHTML = '<option value="">すべて</option>';
  document.getElementById('filterTag').innerHTML = '<option value="">すべて</option>';
  document.getElementById('filterTerrain').value = '';
  document.getElementById('filterRarity').innerHTML = '<option value="">すべて</option>';
  document.getElementById('filterCharaType').innerHTML = '<option value="">すべて</option>';
  document.getElementById('filterTarget').innerHTML = '<option value="">すべて</option>';
}

function updateUI() {
  const isUnit = currentTab === 'unit';
  const isChara = currentTab === 'chara';
  const isSupporter = currentTab === 'supporter';

  const placeholders = {
    unit: 'ユニット名で検索...（例: サザビー、ガンダム）',
    chara: 'キャラ名で検索...（例: アムロ、シャア）',
    supporter: 'サポーター名で検索...（例: ブライト、ホワイトベース）'
  };
  document.getElementById('searchInput').placeholder = placeholders[currentTab];

  document.getElementById('filterSeriesGroup').style.display = isUnit || isChara ? '' : 'none';
  document.getElementById('filterTagGroup').style.display = isUnit ? '' : 'none';
  document.getElementById('filterTerrainGroup').style.display = isUnit ? '' : 'none';
  document.getElementById('filterRarityGroup').style.display = '';
  document.getElementById('filterCharaTypeGroup').style.display = isChara ? '' : 'none';
  document.getElementById('filterTargetGroup').style.display = isSupporter ? '' : 'none';
  document.querySelector('#filterType').parentElement.style.display = isUnit ? '' : 'none';

  const sortContainer = document.getElementById('sortBtns');
  if (isUnit) {
    sortContainer.innerHTML = `
      <button class="sort-btn active" data-sort="atk">攻撃力順</button>
      <button class="sort-btn" data-sort="hp">HP順</button>
      <button class="sort-btn" data-sort="def">防御力順</button>
      <button class="sort-btn" data-sort="en">EN順</button>
      <button class="sort-btn" data-sort="name">名前順</button>`;
    currentSort = 'atk'; currentDir = -1;
  } else if (isChara) {
    sortContainer.innerHTML = `
      <button class="sort-btn active" data-sort="cp">戦闘力順</button>
      <button class="sort-btn" data-sort="shoot">射撃値順</button>
      <button class="sort-btn" data-sort="react">反応値順</button>
      <button class="sort-btn" data-sort="name">名前順</button>`;
    currentSort = 'cp'; currentDir = -1;
  } else {
    sortContainer.innerHTML = `
      <button class="sort-btn active" data-sort="hp">HP順</button>
      <button class="sort-btn" data-sort="atk">攻撃力順</button>
      <button class="sort-btn" data-sort="name">名前順</button>`;
    currentSort = 'hp'; currentDir = -1;
  }
  bindSortButtons();
}

function bindSortButtons() {
  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const sort = btn.dataset.sort;
      if (currentSort === sort) currentDir *= -1;
      else { currentSort = sort; currentDir = sort === 'name' ? 1 : -1; }
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });
}

function buildFilters() {
  if (currentTab === 'unit') {
    const types = new Set(), series = new Set(), tags = new Set(), rarities = new Set();
    allUnits.forEach(u => {
      if (u.unit_type) types.add(u.unit_type);
      if (u.rarity) rarities.add(u.rarity);
      (u.series||[]).forEach(s => series.add(s));
      (u.tags||[]).forEach(t => tags.add(t));
    });
    fillSelect('filterType', [...types].sort());
    fillSelect('filterSeries', [...series].sort());
    fillSelect('filterTag', [...tags].sort());
    const rarityOrder = ['UR','SSR','SR','R','N'];
    fillSelect('filterRarity', rarityOrder.filter(r => rarities.has(r)));
  } else if (currentTab === 'chara') {
    const rarities = new Set(), types = new Set(), series = new Set();
    allCharas.forEach(c => {
      if (c.rarity) rarities.add(c.rarity);
      if (c.chara_type) types.add(c.chara_type);
      if (c.series) series.add(c.series);
    });
    fillSelect('filterRarity', [...rarities].sort());
    fillSelect('filterCharaType', [...types].sort());
    fillSelect('filterSeries', [...series].sort());
  } else {
    const rarities = new Set(), targets = new Set();
    allSupporters.forEach(s => {
      if (s.rarity) rarities.add(s.rarity);
      if (s.target_series) targets.add(s.target_series);
    });
    fillSelect('filterRarity', [...rarities].sort());
    fillSelect('filterTarget', [...targets].sort());
  }
}

function fillSelect(id, opts) {
  const sel = document.getElementById(id);
  opts.forEach(o => { const op = document.createElement('option'); op.value = o; op.textContent = o; sel.appendChild(op); });
}

function getData() {
  if (currentTab === 'unit') return allUnits;
  if (currentTab === 'chara') return allCharas;
  return allSupporters;
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const data = getData();
  const rarity = document.getElementById('filterRarity').value;

  if (currentTab === 'unit') {
    const type = document.getElementById('filterType').value;
    const series = document.getElementById('filterSeries').value;
    const tag = document.getElementById('filterTag').value;
    const terrain = document.getElementById('filterTerrain').value;
    return data.filter(u => {
      if (q && !u.name.toLowerCase().includes(q)) return false;
      if (type && u.unit_type !== type) return false;
      if (rarity && u.rarity !== rarity) return false;
      if (series && !(u.series||[]).includes(series)) return false;
      if (tag && !(u.tags||[]).includes(tag)) return false;
      if (terrain && (!u.terrain || u.terrain[terrain] !== '◯')) return false;
      return true;
    });
  } else if (currentTab === 'chara') {
    const cType = document.getElementById('filterCharaType').value;
    const series = document.getElementById('filterSeries').value;
    return data.filter(c => {
      if (q && !c.name.toLowerCase().includes(q)) return false;
      if (rarity && c.rarity !== rarity) return false;
      if (cType && c.chara_type !== cType) return false;
      if (series && c.series !== series) return false;
      return true;
    });
  } else {
    const target = document.getElementById('filterTarget').value;
    return data.filter(s => {
      if (q && !s.name.toLowerCase().includes(q)) return false;
      if (rarity && s.rarity !== rarity) return false;
      if (target && s.target_series !== target) return false;
      return true;
    });
  }
}

function sortItems(items) {
  const dir = currentDir;
  return [...items].sort((a, b) => {
    let va, vb;
    switch(currentSort) {
      case 'cp':
        if (currentTab === 'unit') { va = parseInt(a.combat_power)||0; vb = parseInt(b.combat_power)||0; }
        else { va = a.stats?.combat_power||0; vb = b.stats?.combat_power||0; }
        break;
      case 'atk':
        if (currentTab === 'unit') { va = parseInt(a.stats?.attack)||0; vb = parseInt(b.stats?.attack)||0; }
        else { va = parseInt(a.attack)||0; vb = parseInt(b.attack)||0; }
        break;
      case 'hp':
        if (currentTab === 'unit') { va = parseInt(a.stats?.hp)||0; vb = parseInt(b.stats?.hp)||0; }
        else { va = parseInt(a.hp)||0; vb = parseInt(b.hp)||0; }
        break;
      case 'def':
        va = parseInt(a.stats?.defense)||0; vb = parseInt(b.stats?.defense)||0; break;
      case 'en':
        va = parseInt(a.stats?.en)||0; vb = parseInt(b.stats?.en)||0; break;
      case 'shoot': va = a.stats?.shooting||0; vb = b.stats?.shooting||0; break;
      case 'react': va = a.stats?.reaction||0; vb = b.stats?.reaction||0; break;
      case 'name': return dir * a.name.localeCompare(b.name, 'ja');
    }
    return dir * (va - vb);
  });
}

function render() {
  const filtered = sortItems(getFiltered());
  const data = getData();
  const labels = { unit: 'ユニット', chara: 'キャラ', supporter: 'サポーター' };
  document.getElementById('resultCount').textContent = `${filtered.length} / ${data.length} ${labels[currentTab]}`;
  const grid = document.getElementById('mainGrid');
  const tableWrap = document.getElementById('tableWrap');

  if (currentView === 'card') {
    grid.style.display = '';
    tableWrap.style.display = 'none';
    if (currentTab === 'unit') {
      grid.innerHTML = filtered.map(u => unitCardHTML(u)).join('');
    } else if (currentTab === 'chara') {
      grid.innerHTML = filtered.map(c => charaCardHTML(c)).join('');
    } else {
      grid.innerHTML = filtered.map(s => supporterCardHTML(s)).join('');
    }
  } else {
    grid.style.display = 'none';
    tableWrap.style.display = '';
    if (currentTab === 'unit') {
      tableWrap.innerHTML = unitTableHTML(filtered);
    } else if (currentTab === 'chara') {
      tableWrap.innerHTML = charaTableHTML(filtered);
    } else {
      tableWrap.innerHTML = supporterTableHTML(filtered);
    }
  }
}

// === Type utilities ===
const TYPE_ICON_MAP = {
  '攻撃': '/assets/type_icons/UI_Common_TypeIcon_Attack_S.png',
  '耐久': '/assets/type_icons/UI_Common_TypeIcon_Defense_S.png',
  '支援': '/assets/type_icons/UI_Common_TypeIcon_Support_S.png',
  '射撃': '/assets/type_icons/UI_Common_TypeIcon_Ranged_S.png',
  '格闘': '/assets/type_icons/UI_Common_TypeIcon_Melee_S.png',
  '覚醒': '/assets/type_icons/UI_Common_TypeIcon_Awaken_S.png',
  'なし': '/assets/type_icons/UI_Common_TypeIcon_None_S.png'
};
const MAP_WEAPON_ICON = '/assets/map_weapon/UI_Battle_MapUI_MapWeapon_Icon_Red.png';
const MAP_WEAPON_ICON_BLUE = '/assets/map_weapon/UI_Battle_MapUI_MapWeapon_Icon_Blue.png';
const WEAPON_MAP_ICON = '/assets/weapon_icons/UI_Common_WeaponIcon_map.png';

function typeIconHTML(t) {
  const src = TYPE_ICON_MAP[t];
  if (!src) return '';
  return `<img src="${src}" alt="${t}" style="width:16px;height:16px;vertical-align:middle;filter:drop-shadow(0 0 2px rgba(0,0,0,.5))">`;
}

function typeBadgeHTML(t) {
  const icon = typeIconHTML(t);
  if (icon) return `<span class="badge badge-type badge-icon ${typeClass(t)}">${icon}${t}</span>`;
  return t ? `<span class="badge badge-type ${typeClass(t)}">${t}</span>` : '';
}

function typeClass(t) {
  if (t === '攻撃') return 'badge-atk';
  if (t === '耐久') return 'badge-def';
  if (t === '支援') return 'badge-sup';
  return '';
}

function rarityClass(r) {
  if (r === 'UR') return 'badge-ur';
  if (r === 'SSR') return 'badge-ssr';
  if (r === 'SR') return 'badge-sr';
  if (r === 'R') return 'badge-r';
  if (r === 'N') return 'badge-n';
  return 'badge-type';
}

function terrainIcon(val) {
  if (val === '◯') return '<span class="terrain-ok">◯</span>';
  if (val === '△') return '<span class="terrain-tri">△</span>';
  return '<span class="terrain-no">-</span>';
}

function isEXChara(c) {
  return c.name.includes('(EX)') || c.name.includes('（EX）');
}

function rangeDisplay(w) {
  if (w.is_map) return 'MAP';
  if (w.range_min === w.range_max) return w.range_min;
  return `${w.range_min}-${w.range_max}`;
}

// === UNIT CARD ===

    if (w.is_map) label += ` [${w.use_count != null ? w.use_count + '回' : '-回'}]`;
    return `<span class="weapon-tag${w.is_ex?' ex':''}${w.is_map?' map':''}">${mapIcon}${label}</span>`;
  }).join('');
  const topTags = (u.tags||[]).slice(0,4).map(t => `<span class="tag">${t}</span>`).join('');

  return `<div class="card" onclick="showUnitDetail('${u.name.replace(/'/g,"\\'")}')">

      ${iconHTML}
      <div class="card-name">${u.name}</div>

        <span class="badge ${rarityClass(u.rarity)}">${u.rarity||'?'}</span>

    <div class="card-stats">
      <div class="stat"><div class="stat-label">攻撃力</div><div class="stat-val">${(parseInt(s.attack)||0).toLocaleString()}</div></div>
      <div class="stat"><div class="stat-label">HP</div><div class="stat-val">${(parseInt(s.hp)||0).toLocaleString()}</div></div>
      <div class="stat"><div class="stat-label">防御力</div><div class="stat-val">${(parseInt(s.defense)||0).toLocaleString()}</div></div>
    </div>
    <div class="card-stats card-stats-sub">
      <div class="stat"><div class="stat-label">EN</div><div class="stat-val">${(parseInt(s.en)||0).toLocaleString()}</div></div>
      <div class="stat"><div class="stat-label">運動性</div><div class="stat-val">${(parseInt(s.agility)||0).toLocaleString()}</div></div>

    </div>
    <div class="card-terrain">
      <span class="terrain-item">宇${terrainIcon(t.space)}</span>
      <span class="terrain-item">空${terrainIcon(t.air)}</span>
      <span class="terrain-item">地${terrainIcon(t.ground)}</span>
      <span class="terrain-item">水上${terrainIcon(t.surface)}</span>
      <span class="terrain-item">水中${terrainIcon(t.water)}</span>
    </div>

// === UNIT DETAIL (with transform toggle) ===
function showUnitDetail(name) {
  const u = allUnits.find(x => x.name === name);
  if (!u) return;
  window._currentDetailUnit = u;
  window._currentDetailForm = 'base';
  renderUnitDetail(u, 'base');
  openModal();
}

  const isTransform = form === 'transform' && u.transform_form;

      <button class="transform-btn ${form==='transform'?'active':''}" onclick="switchForm('transform')">${formName}</button>
    </div>`;
  }

  const weaponsHTML = weapons.map(w => `
    <div class="weapon-detail">
      <div class="weapon-name">${w.is_map?`<span class="map-badge"><img src="${MAP_WEAPON_ICON}" class="map-icon" alt="MAP">MAP兵器</span>`:''}${w.name}${w.is_ex?'<span class="ex-badge">EX</span>':''}${w.is_map ? ` <span style="color:var(--accent2);font-size:.75em">[${w.use_count != null ? w.use_count + '回' : '-回'}]</span>` : ''}</div>

        <div><span>威力:</span> <strong>${w.power||'-'}</strong></div>
        <div><span>EN:</span> <strong>${w.en||'-'}</strong></div>
        <div><span>命中:</span> <strong>${w.hit||'-'}</strong></div>
        <div><span>クリ:</span> <strong>${w.critical||'-'}</strong></div>
      </div>
      ${w.weapon_effect && w.weapon_effect !== 'なし' ? `<div class="weapon-effect">効果: ${w.weapon_effect}</div>` : ''}
      ${w.use_limit && w.use_limit !== 'なし' ? `<div class="weapon-effect">制限: ${w.use_limit}</div>` : ''}
    </div>
  `).join('');

  const pureAbilities = u.abilities||[];
  const allMechanisms = u.mechanisms||[];

  const abHTML = pureAbilities.map(a => `
    <div class="ability-item"><span class="ability-name">${a.name}</span><br><span class="ability-effect">${a.effect}</span></div>
  `).join('');

  const mechHTML = allMechanisms.map(m => `
    <div class="mechanism-item"><span class="mechanism-name">${m.name}</span><span class="mechanism-effect">${m.effect||''}</span></div>
  `).join('');

  const modalIconHTML = u.icon_url ? `<img class="modal-icon" src="${u.icon_url}" alt="" onerror="this.style.display='none'">` : '';

  document.getElementById('modalContent').innerHTML = `
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-header-row">
      ${modalIconHTML}
      <div>
        <h2>${u.name}</h2>
        <div class="detail-badges">
          <span class="badge ${rarityClass(u.rarity)}">${u.rarity||'?'}</span>
          ${typeBadgeHTML(u.unit_type)}
          <span class="badge badge-type">${u.obtain_method||''}</span>
        </div>
      </div>
    </div>
    ${transformToggle}
    <div class="detail-section">
      <div style="font-size:.8em;color:var(--text2);margin-bottom:4px">${(u.series||[]).join(' / ')}</div>
      <div class="card-tags">${(u.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    </div>
    <div class="detail-section">
      <h3>ステータス${isTransform ? ' ('+u.transform_form.form_name+')' : ''}</h3>
      <div class="stats-grid">
        <div class="stat-box"><div class="label">HP</div><div class="val">${(parseInt(s.hp)||0).toLocaleString()}</div></div>
        <div class="stat-box"><div class="label">EN</div><div class="val">${s.en||'-'}</div></div>
        <div class="stat-box"><div class="label">攻撃力</div><div class="val">${(parseInt(s.attack)||0).toLocaleString()}</div></div>
        <div class="stat-box"><div class="label">防御力</div><div class="val">${(parseInt(s.defense)||0).toLocaleString()}</div></div>
        <div class="stat-box"><div class="label">運動性</div><div class="val">${(parseInt(s.agility)||0).toLocaleString()}</div></div>
        <div class="stat-box"><div class="label">機動力</div><div class="val">${s.mobility||'-'}</div></div>
      </div>
    </div>
    <div class="detail-section">
      <h3>地形適性</h3>
      <div class="terrain-grid">
        <span>宇宙${terrainIcon(t.space)}</span>
        <span>空中${terrainIcon(t.air)}</span>
        <span>地上${terrainIcon(t.ground)}</span>
        <span>水上${terrainIcon(t.surface)}</span>
        <span>水中${terrainIcon(t.water)}</span>
      </div>
    </div>
    <div class="detail-section">
      <h3>武装 (${weapons.length})</h3>
      ${weaponsHTML}
    </div>
    ${pureAbilities.length ? `<div class="detail-section"><h3>アビリティ (${pureAbilities.length})</h3>${abHTML}</div>` : ''}
    ${allMechanisms.length ? `<div class="detail-section"><h3>機構 (${allMechanisms.length})</h3>${mechHTML}</div>` : ''}
  `;
}

function switchForm(form) {
  if (!window._currentDetailUnit) return;
  window._currentDetailForm = form;
  renderUnitDetail(window._currentDetailUnit, form);
}

// === CHARA DETAIL ===
function showCharaDetail(name) {
  const c = allCharas.find(x => x.name === name);
  if (!c) return;
  const s = c.stats || {};
  const ex = isEXChara(c);
  const hasStats = Object.keys(s).length > 0;

  let statsHTML = '';
  if (hasStats) {
    statsHTML = `<div class="detail-section">
      <h3>ステータス</h3>
      <div class="stats-grid">
        <div class="stat-box"><div class="label">戦闘力</div><div class="val" style="color:var(--gold)">${(s.combat_power||0).toLocaleString()}</div></div>
        <div class="stat-box"><div class="label">射撃値</div><div class="val">${s.shooting||'-'}</div></div>
        <div class="stat-box"><div class="label">格闘値</div><div class="val">${s.melee||'-'}</div></div>
        <div class="stat-box"><div class="label">覚醒値</div><div class="val">${s.awakening||'-'}</div></div>
        <div class="stat-box"><div class="label">守備力</div><div class="val">${s.defense||'-'}</div></div>
        <div class="stat-box"><div class="label">反応値</div><div class="val">${s.reaction||'-'}</div></div>
      </div>
    </div>`;
  }

  const skillsHTML = (c.skills||[]).map(sk => `
    <div class="skill-item">
      <div class="skill-name">${sk.name}</div>
      <div class="skill-effect">${sk.effect}</div>
    </div>
  `).join('');

  const garbageNames = ['リセマラ評価','キャラ一覧の関連記事','解放キャラ','スキル','UR','EXキャラアビリティ','対象ユニット','サポーターの一覧記事','レア度','2×2','SD','支援','攻撃'];
  const isGarbage = (n) => garbageNames.includes(n) || /^戦闘力[\(（]/.test(n) || /[\(（]SP:\d+[\)）]/.test(n);
  const cleanAbilities = (c.abilities||[]).filter(a => !isGarbage(a.name));

  const abHTML = cleanAbilities.map(a => `
    <div class="ability-item"><span class="ability-name">${a.name}</span><br><span class="ability-effect">${a.effect}</span></div>
  `).join('');

  document.getElementById('modalContent').innerHTML = `
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h2>${c.name}</h2>
    <div class="detail-badges">
      <span class="badge ${rarityClass(c.rarity)}">${c.rarity||'?'}</span>
      ${typeBadgeHTML(c.chara_type)}
      ${ex ? '<span class="badge badge-ex">EX</span>' : ''}
      ${c.obtain_method ? `<span class="badge badge-type">${c.obtain_method}</span>` : ''}
    </div>
    ${c.series ? `<div class="detail-section"><div style="font-size:.8em;color:var(--text2)">${c.series}</div></div>` : ''}
    ${statsHTML}
    ${(c.skills||[]).length ? `<div class="detail-section"><h3>スキル (${c.skills.length})</h3>${skillsHTML}</div>` : ''}
    ${cleanAbilities.length ? `<div class="detail-section"><h3>アビリティ (${cleanAbilities.length})</h3>${abHTML}</div>` : ''}
  `;
  openModal();
}

// === SUPPORTER DETAIL ===
function showSupporterDetail(name) {
  const s = allSupporters.find(x => x.name === name);
  if (!s) return;

  document.getElementById('modalContent').innerHTML = `
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h2>${s.name}</h2>
    <div class="detail-badges">
      <span class="badge ${rarityClass(s.rarity)}">${s.rarity||'?'}</span>
      ${s.target_series ? `<span class="badge badge-type">${s.target_series}</span>` : ''}
    </div>
    <div class="detail-section">
      <h3>基本ステータス</h3>
      <div class="stats-grid" style="grid-template-columns:repeat(2,1fr)">
        <div class="stat-box"><div class="label">HP</div><div class="val">${s.hp||'-'}</div></div>
        <div class="stat-box"><div class="label">攻撃力</div><div class="val">${s.attack||'-'}</div></div>
      </div>
    </div>
    ${s.leader_skill ? `<div class="detail-section">
      <h3>リーダースキル</h3>
      <div class="supporter-detail-block">
        <div class="sd-text">${s.leader_skill}</div>
      </div>
    </div>` : ''}
    ${s.support_skill ? `<div class="detail-section">
      <h3>サポートスキル</h3>
      <div class="supporter-detail-block">
        <div class="sd-text">${s.support_skill}</div>
      </div>
    </div>` : ''}
  `;
  openModal();
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

// Event listeners
document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('filterType').addEventListener('change', render);
document.getElementById('filterSeries').addEventListener('change', render);
document.getElementById('filterTag').addEventListener('change', render);
document.getElementById('filterTerrain').addEventListener('change', render);
document.getElementById('filterRarity').addEventListener('change', render);
document.getElementById('filterCharaType').addEventListener('change', render);
document.getElementById('filterTarget').addEventListener('change', render);
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

bindSortButtons();
init();
</script>
</body>
</html>
