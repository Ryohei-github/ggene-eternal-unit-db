.team-picker{background:var(--card);border-left:2px solid var(--accent);position:absolute;right:0;top:0;width:66vw;max-width:800px;height:100%;display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.5)}
.picker-item-used{opacity:.35;cursor:not-allowed;pointer-events:none;position:relative}
.team-picker-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.team-picker-header h3{font-size:.9em;color:var(--accent);white-space:nowrap}
.team-picker-header input{flex:1;min-width:120px;padding:7px 10px;background:rgba(0,0,0,.2);border:1px solid var(--card-border);border-radius:6px;color:var(--card-text);font-size:.85em;outline:none}
.team-picker-header input:focus{border-color:var(--accent)}
.team-picker-close{font-size:1.3em;color:var(--card-text2);cursor:pointer;background:none;border:none;padding:4px 8px}
.team-picker-close:hover{color:#fff}
.team-picker-filters{padding:6px 14px;border-bottom:1px solid var(--border);display:flex;gap:4px;flex-wrap:wrap}
.team-picker-team-summary{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg);display:flex;gap:6px;align-items:center;overflow-x:auto;flex-shrink:0}
.picker-summary-slot{min-width:56px;text-align:center;padding:4px;border-radius:6px;border:1px solid var(--card-border);background:var(--card);font-size:.6em;color:var(--card-text2);position:relative}
.picker-summary-slot.active{border-color:var(--accent);box-shadow:0 0 8px rgba(232,150,30,.3)}
.picker-summary-slot.filled{color:var(--card-text)}
.picker-summary-slot img{width:28px;height:28px;border-radius:4px;object-fit:cover;display:block;margin:0 auto 2px}
.picker-summary-slot .pss-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:54px;display:block}
.team-picker-list{flex:1;overflow-y:auto;padding:8px;display:grid;grid-template-columns:1fr;gap:6px}
.picker-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 10px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px}
.picker-item:hover{border-color:var(--accent);background:rgba(232,150,30,.12)}
.picker-item img{width:36px;height:36px;border-radius:6px;object-fit:cover;border:1px solid var(--border);flex-shrink:0}
.picker-item-info{flex:1;min-width:0}
.picker-item-name{font-size:.82em;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.picker-item-sub{font-size:.65em;color:var(--text2)}
.team-saved-list{margin-top:16px}
.team-saved-list h3{font-size:.85em;color:var(--text2);margin-bottom:8px}
.team-saved-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;margin-bottom:4px;cursor:pointer;transition:all .15s}
.team-saved-item:hover{border-color:var(--accent);background:rgba(232,150,30,.05)}
.team-saved-item .saved-name{flex:1;font-size:.85em;font-weight:600;color:var(--text)}
.team-saved-item .saved-cp{font-size:.8em;color:var(--gold)}
.team-saved-delete{font-size:.75em;color:var(--text2);background:none;border:none;cursor:pointer;padding:2px 6px}
.team-saved-delete:hover{color:#ff4466}
.team-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;padding:10px 24px;border-radius:8px;font-size:.85em;font-weight:600;z-index:400;opacity:0;transition:opacity .3s;pointer-events:none}
.team-toast.show{opacity:1}

/* Grid */
.grid{max-width:1800px;margin:0 auto;padding:0 16px 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}

/* Card */
.card{background:var(--card);border:none;border-radius:0;padding:10px;cursor:pointer;transition:all .2s;color:var(--card-text);clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);position:relative}
.card:hover{background:var(--card-hover);transform:translateY(-2px)}
.card::before{content:'';position:absolute;inset:0;clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px,1px 11px,1px calc(100% - 1px),calc(100% - 11px) calc(100% - 1px),calc(100% - 1px) calc(100% - 11px),calc(100% - 1px) 1px,11px 1px,1px 11px);background:transparent;pointer-events:none;transition:background .2s}
.card:hover::before{background:linear-gradient(135deg,#ffd700,#ffaa00)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;gap:6px}
.card-icon{width:40px;height:40px;border-radius:5px;border:1px solid var(--border);object-fit:cover;flex-shrink:0;background:var(--bg)}
.card-name{font-size:.95em;font-weight:700;color:#fff;flex:1;min-width:0}
.card-badges{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap}
.badge{padding:2px 8px;border-radius:4px;font-size:.65em;font-weight:700;letter-spacing:.5px}
.badge-ur{background:linear-gradient(90deg,#ff0000,#ff8800,#eecc00,#00bb00,#0088ff,#8800ff);color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.badge-ult{background:linear-gradient(135deg,#4a00e0,#7c4dff);color:#fff}
.badge-ssr{background:linear-gradient(135deg,#daa520,#ffd700);color:#1a1a1a}
.badge-sr{background:linear-gradient(135deg,#a0a0a0,#c0c0c0);color:#1a1a1a}
.badge-r{background:linear-gradient(135deg,#b87333,#cd853f);color:#fff}
.badge-n{background:linear-gradient(135deg,#555,#777);color:#fff}
.badge-type{background:var(--bg);border:1px solid var(--border);color:var(--text2)}
.badge-atk{border-color:#ff4444;color:#ff6666}
.badge-def{border-color:#4488ff;color:#6699ff}
.badge-sup{border-color:#daa520;color:#ffd700}
.badge-ex{background:linear-gradient(135deg,var(--accent2),#ff8844);color:#fff}
.badge-icon{display:inline-flex;align-items:center;gap:3px}
.badge-icon img{width:16px;height:16px;vertical-align:middle;filter:drop-shadow(0 0 2px rgba(0,0,0,.5))}
.map-icon{width:18px;height:18px;vertical-align:middle;filter:drop-shadow(0 0 3px rgba(255,68,102,.4))}
.weapon-attr-icon{width:14px;height:14px;vertical-align:middle;margin-right:2px;filter:drop-shadow(0 0 1px rgba(0,0,0,.5))}

.card-series{font-size:.65em;color:var(--card-text2);margin-bottom:4px}
.card-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-bottom:4px}
.card-stats-sub{grid-template-columns:repeat(4,1fr);margin-bottom:4px;margin-top:-2px}
.stat{text-align:center;padding:2px 4px;background:rgba(0,0,0,.2);border-radius:4px}
.stat-label{font-size:.55em;color:var(--card-text2);text-transform:uppercase;line-height:1.2}
.stat-val{font-size:.8em;font-weight:700;line-height:1.2}
.cp-val{color:var(--gold)}
.card-terrain{display:flex;gap:5px;font-size:.65em;margin-bottom:4px}
.terrain-item{display:flex;align-items:center;gap:2px}
.terrain-ok{color:#44cc44}
.terrain-tri{color:#ffaa00}
.terrain-no{color:#555}
.card-weapons{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px}
.weapon-tag{padding:1px 5px;background:rgba(232,150,30,.1);border:1px solid rgba(232,150,30,.2);border-radius:3px;font-size:.6em;color:var(--accent)}
.weapon-tag.ex{background:rgba(255,107,53,.15);border-color:rgba(255,107,53,.3);color:var(--accent2)}
.weapon-tag.map{background:rgba(255,68,102,.15);border-color:rgba(255,68,102,.3);color:#ff6688}
.card-tags{display:flex;flex-wrap:wrap;gap:3px}
.tag{padding:1px 5px;background:rgba(255,255,255,.08);border-radius:3px;font-size:.6em;color:var(--card-text2)}
.leader-tag-clickable:hover{filter:brightness(1.3);box-shadow:0 0 6px rgba(232,150,30,.4)}
.chara-link-tag{background:rgba(232,150,30,.12);border:1px solid rgba(232,150,30,.25);color:var(--accent);cursor:pointer;transition:all .2s}
.chara-link-tag:hover{background:rgba(232,150,30,.25);box-shadow:0 0 6px rgba(232,150,30,.3)}
.target-units-popup-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:400;overflow:auto;padding:40px 16px}
.target-units-popup{background:var(--card);border:1px solid var(--accent);border-radius:12px;max-width:560px;margin:0 auto;padding:16px;max-height:80vh;display:flex;flex-direction:column}
.target-units-popup h3{margin:0 0 10px;font-size:.95em;color:var(--accent);display:flex;align-items:center;justify-content:space-between}
.target-units-popup .close-btn{background:none;border:none;color:var(--text2);font-size:1.2em;cursor:pointer;padding:4px 8px}
.target-units-popup .close-btn:hover{color:var(--text)}
.target-units-list{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:4px}
.target-unit-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;background:rgba(255,255,255,.03);cursor:pointer;transition:background .15s}
.target-unit-item:hover{background:rgba(232,150,30,.1)}
.target-unit-item img{width:36px;height:36px;border-radius:4px;object-fit:cover;border:1px solid var(--border);flex-shrink:0}
.target-unit-item .tui-name{font-size:.82em;font-weight:600;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.target-unit-item .tui-meta{font-size:.7em;color:var(--text2);white-space:nowrap}
.clickable-tag{cursor:pointer;transition:background .15s,color .15s}.clickable-tag:hover{background:var(--accent);color:#fff}

/* Transform Toggle */
.transform-toggle{display:flex;gap:0;margin-bottom:8px;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.transform-btn{flex:1;padding:4px 8px;font-size:.7em;font-weight:600;background:var(--bg);color:var(--text2);border:none;cursor:pointer;transition:all .2s;text-align:center}
.transform-btn.active{background:linear-gradient(135deg,rgba(232,150,30,.2),rgba(232,150,30,.1));color:var(--accent);border-bottom:2px solid var(--accent)}
.transform-btn:hover:not(.active){color:var(--text)}

/* Character card specifics */
.card-skills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.skill-tag{padding:2px 6px;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.2);border-radius:3px;font-size:.65em;color:var(--gold)}
.card-abilities-count{font-size:.7em;color:var(--card-text2)}

/* Supporter card specifics */
.supporter-info{font-size:.75em;color:var(--card-text2);margin-bottom:6px;line-height:1.5}
.supporter-info strong{color:var(--card-text);font-weight:600}
.supporter-stat{display:inline-block;padding:2px 8px;background:rgba(0,0,0,.2);border:1px solid var(--card-border);border-radius:4px;font-size:.75em;margin-right:6px;margin-bottom:4px}
.supporter-stat .sv{font-weight:700;color:var(--card-text)}

/* Detail Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:flex-start;padding:20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--accent);border-radius:12px;max-width:700px;width:100%;padding:24px;position:relative;color:var(--card-text)}
.modal-close{position:absolute;top:12px;right:16px;font-size:1.5em;color:var(--card-text2);cursor:pointer;background:none;border:none}
.modal-close:hover{color:#fff}
.modal-header-row{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.modal-icon{width:64px;height:64px;border-radius:8px;border:1px solid var(--card-border);object-fit:cover;flex-shrink:0;background:rgba(0,0,0,.2)}
.modal h2{font-size:1.3em;margin-bottom:4px;color:#fff}
.modal .detail-badges{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.modal .detail-section{margin-bottom:16px}
.modal .detail-section h3{font-size:.85em;color:var(--accent);border-bottom:1px solid var(--border);padding-bottom:4px;margin-bottom:8px}
.modal .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.modal .stat-box{text-align:center;padding:8px;background:rgba(0,0,0,.2);border-radius:6px;border:1px solid var(--card-border)}
.modal .stat-box .label{font-size:.65em;color:var(--card-text2)}
.modal .stat-box .val{font-size:1.1em;font-weight:700}
.modal .stat-box{position:relative}
.rank-badge{display:block;font-size:.6em;font-weight:700;color:var(--accent);margin-top:1px;line-height:1}
.rank-badge.top3{color:#ffd700}
.card-stats .rank-badge{font-size:.45em}
.lb-table{width:100%;border-collapse:collapse;font-size:.75em;margin-top:6px}
.lb-table th,.lb-table td{padding:4px 6px;border:1px solid var(--card-border);text-align:center}
.lb-table th{background:rgba(0,0,0,.15);color:var(--card-text2);font-weight:600}
.lb-table td{color:var(--card-text)}
.lb-table .lb-max{background:rgba(255,215,0,.1);color:var(--gold);font-weight:700}
.lb-table .lb-sp{background:rgba(180,100,255,.12);font-weight:600}
.lb-table .lb-sp td{color:#c084fc}
.sp-label{font-size:.85em;line-height:1.2;color:#c084fc;font-weight:700}
.ssp-label{font-size:.85em;line-height:1.2;color:#f472b6;font-weight:700}
.lb-table .lb-sp:last-child{background:rgba(244,114,182,.12)}
.lb-table .lb-sp:last-child td{color:#f472b6}
.limit-break-details summary:hover{text-decoration:underline}
.modal .weapon-detail{background:rgba(0,0,0,.15);border:1px solid var(--card-border);border-radius:6px;padding:10px;margin-bottom:6px}
.modal .weapon-name{font-weight:700;font-size:.9em;margin-bottom:4px}
.modal .weapon-name .ex-badge{color:var(--accent2);font-size:.7em;margin-left:4px}
.modal .weapon-name .map-badge{display:inline-block;background:linear-gradient(135deg,#ff4466,#ff8844);color:#fff;font-size:.6em;font-weight:700;padding:1px 6px;border-radius:3px;margin-right:6px;vertical-align:middle}
.modal .mechanism-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(0,0,0,.2);border:1px solid var(--card-border);border-radius:6px;margin-bottom:4px;font-size:.8em}
.modal .mechanism-name{font-weight:600;color:var(--accent)}
.modal .mechanism-effect{color:var(--card-text2);font-size:.9em}
.modal .weapon-info{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:4px;font-size:.75em}
.modal .weapon-info span{color:var(--card-text2)}
.modal .weapon-info strong{color:var(--card-text)}
.modal .weapon-effect{font-size:.7em;color:var(--card-text2);margin-top:4px;font-style:italic}
.modal .ability-item{padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.8em}
.modal .ability-item:last-child{border:none}
.modal .ability-name{font-weight:600;color:#fff}
.modal .ability-effect{color:var(--card-text2);font-size:.85em}
.modal .skill-item{padding:8px 10px;background:rgba(0,0,0,.2);border:1px solid var(--card-border);border-radius:6px;margin-bottom:4px}
.modal .skill-name{font-weight:600;font-size:.85em;color:var(--gold)}
.modal .skill-effect{color:var(--card-text2);font-size:.8em;margin-top:2px}
.terrain-grid{display:flex;gap:12px;font-size:.85em}
.combat-power-display{font-size:.9em;color:var(--text2);margin-bottom:6px;text-align:center}
.rarity-note{font-size:.75em;color:var(--gold);font-weight:normal}
.card-combat-power{font-size:.65em;color:var(--gold);text-align:center;margin:2px 0 1px;font-weight:600}
.card-rarity-note{font-size:.55em;color:var(--text2);text-align:center;margin-bottom:1px;font-style:italic}
.card-mechanism{font-size:.6em;color:var(--text2);padding:3px 6px;margin-top:3px;border-top:1px solid var(--border);line-height:1.3}
.card-mechanism .mechanism-label{color:var(--accent);font-weight:600}

/* Supporter modal */
.modal .supporter-detail-block{background:rgba(0,0,0,.2);border:1px solid var(--card-border);border-radius:6px;padding:12px;margin-bottom:8px}
.modal .supporter-detail-block .sd-label{font-size:.7em;color:var(--accent);font-weight:600;margin-bottom:4px}
.modal .supporter-detail-block .sd-text{font-size:.85em;color:var(--card-text);line-height:1.5}

/* View Toggle */
.view-toggle{display:flex;gap:2px;margin-left:12px}
.view-btn{padding:3px 10px;background:var(--card);border:1px solid var(--border);border-radius:4px;color:var(--text2);cursor:pointer;font-size:.75em;display:flex;align-items:center;gap:3px}
.view-btn.active{border-color:var(--accent);color:var(--accent)}
.view-btn svg{width:14px;height:14px;fill:currentColor}

/* Table View */
.data-table-wrap{max-width:1800px;margin:0 auto;padding:0 16px 40px;overflow-x:auto}
.data-table{width:100%;border-collapse:collapse;font-size:.8em}
.data-table th{position:sticky;top:0;background:var(--card);color:var(--accent);font-weight:600;padding:8px 10px;text-align:left;border-bottom:2px solid var(--accent);white-space:nowrap;font-size:.85em;cursor:pointer;user-select:none}
.data-table th:hover{color:#fff}
.data-table td{padding:7px 10px;border-bottom:1px solid var(--card-border);vertical-align:middle;white-space:nowrap;color:var(--card-text)}
.data-table tr{cursor:pointer;transition:background .15s;background:var(--card)}
.data-table tr:hover{background:var(--card-hover)}
.data-table .cell-name{font-weight:600;color:#fff;white-space:normal;max-width:200px}
.data-table .cell-icon{width:32px;height:32px;border-radius:4px;vertical-align:middle;margin-right:6px;border:1px solid var(--card-border)}
.data-table .cell-num{text-align:right;font-variant-numeric:tabular-nums;color:var(--card-text)}
.data-table .cell-center{text-align:center;color:var(--card-text)}

/* Tablet: 2 columns */
@media(max-width:1024px) and (min-width:601px){
  .grid{grid-template-columns:repeat(2,1fr)}
}

  .filters{flex-direction:column;gap:6px}

  .filter-group label{font-size:.7em;min-width:auto}

  .filter-group-wide{flex-basis:auto}
  .debuff-filter-row{flex-wrap:wrap}

<script>
let allUnits = [], allCharas = [], allSupporters = [];

// ============================================
// i18n Internationalization System
// ============================================
let currentLang = localStorage.getItem('ggenedb_lang') || 'ja';
let translationsEN = null;

async function loadTranslations() {
  try {
    const res = await fetch('/translations_en.json');
    translationsEN = await res.json();
  } catch(e) {
    console.warn('Failed to load translations:', e);
    translationsEN = {};
  }
}

// Translate UI label
function t(jaText) {
  if (currentLang === 'ja' || !translationsEN) return jaText;
  return translationsEN.ui?.[jaText] || jaText;
}

// Translate game data (series, tags, characters, supporters, abilities, skills)
function tData(jaText, category) {
  if (currentLang === 'ja' || !translationsEN) return jaText;
  if (category) {
    return translationsEN[category]?.[jaText] || jaText;
  }
  // Auto-detect category
  return translationsEN.series?.[jaText]
    || translationsEN.tags?.[jaText]
    || translationsEN.characters?.[jaText]
    || translationsEN.supporters?.[jaText]
    || translationsEN.abilities?.[jaText]
    || translationsEN.skills?.[jaText]
    || translationsEN.ui?.[jaText]
    || jaText;
}

// Translate type names
function tType(jaType) {
  if (currentLang === 'ja' || !translationsEN) return jaType;
  const map = {'攻撃':'Attacker','耐久':'Defender','支援':'Supporter'};
  return map[jaType] || jaType;
}

// Translate terrain
function tTerrain(jaTerrain) {
  if (currentLang === 'ja' || !translationsEN) return jaTerrain;
  const map = {'宇宙':'Space','空中':'Aerial','地上':'Ground','水上':'Surface','水中':'Underwater'};
  return map[jaTerrain] || jaTerrain;
}

// Translate mechanism
function tMechanism(jaMech) {
  if (currentLang === 'ja' || !translationsEN) return jaMech;
  const map = {'シールド':'Shield','変形':'Transform','大型':'Large','脱出':'Escape','SD':'SD',
    'シールド・変形':'Shield/Transform','シールド・脱出':'Shield/Escape',
    '大型・脱出':'Large/Escape','シールド・SD':'Shield/SD'};
  return map[jaMech] || jaMech;
}

// Switch language and re-render everything
function switchLang(lang) {
  currentLang = lang;
  localStorage.setItem('ggenedb_lang', lang);
  document.querySelectorAll('#langToggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  document.documentElement.lang = lang === 'en' ? 'en' : 'ja';
  applyStaticTranslations();
  buildFilters();
  updateUI();
  if (currentTab === 'taglookup') renderTagLookup();
  else if (currentTab === 'team') renderTeamSim();
  else render();
}

// Apply translations to static HTML elements
function applyStaticTranslations() {
  // Update select default options
  document.querySelectorAll('#filtersContainer select').forEach(sel => {
    if (sel.options[0]) sel.options[0].textContent = t('すべて');
  });
  // Update terrain filter buttons
  const terrainLabels = {宇宙:{ja:'宇宙◯',en:'Space◯'},空中:{ja:'空中◯',en:'Aerial◯'},地上:{ja:'地上◯',en:'Ground◯'},水上:{ja:'水上◯',en:'Surface◯'},水中:{ja:'水中◯',en:'Underwater◯'}};
  document.querySelectorAll('#filterTerrainButtons .filter-btn').forEach(btn => {
    const lb = terrainLabels[btn.dataset.value];
    if (lb) btn.textContent = currentLang === 'en' ? lb.en : lb.ja;
  });
  // Header
  const h1 = document.querySelector('.header h1');
  if (h1) {
    h1.childNodes[0].textContent = currentLang === 'en' ? 'G Gen Eternal DB ' : 'GジェネエターナルDB ';
  }
  const sub = document.querySelector('.header .sub');
  if (sub) sub.textContent = t('Gジェネ エターナル 全レアリティ対応データベース ・ ユニット/キャラ/サポーター検索＆フィルタ');
  
  // Tab labels
  const tabLabels = {
    'unit': t('ユニット'), 'chara': t('キャラ'), 'supporter': t('サポ'),
    'taglookup': t('タグ検索'), 'team': t('チーム編成')
  };
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const tab = btn.dataset.tab;
    const label = btn.querySelector('.tab-label');
    if (label && tabLabels[tab]) { if (tab === 'team') label.innerHTML = t('チーム') + '<br>' + t('編成'); else label.textContent = tabLabels[tab]; }
  });
  
  // Search placeholder
  const searchInput = document.getElementById('searchInput');
  if (searchInput) {
    if (currentTab === 'chara') searchInput.placeholder = t('キャラ名で検索...');
    else if (currentTab === 'supporter') searchInput.placeholder = t('サポーター名で検索...');
    else searchInput.placeholder = t('ユニット名で検索...（例: サザビー、ガンダム）');
  }
  
  // Filter labels
  const filterLabels = {
    'filterTypeGroup': t('タイプ'), 'filterRarityGroup': t('レア'),
    'filterSeriesGroup': t('シリーズ'), 'filterTagGroup': t('タグ'),
    'filterTerrainGroup': t('地形'), 'filterDebuffGroup': t('デバフ効果'),
    'filterCharaTypeGroup': t('キャラタイプ'), 'filterTargetGroup': t('対象シリーズ')
  };
  for (const [id, text] of Object.entries(filterLabels)) {
    const el = document.getElementById(id);
    if (el) {
      const label = el.querySelector('label');
      if (label && !label.querySelector('span')) label.textContent = text;
    }
  }
  
  // Sort buttons
  const sortMap = {
    'cp': t('戦闘力順'), 'atk': t('攻撃力順'), 'hp': t('HP順'),
    'def': t('防御力順'), 'en': t('EN順'), 'agi': t('機動力順'), 'name': t('名前順')
  };
  document.querySelectorAll('.sort-btn').forEach(btn => {
    const sort = btn.dataset.sort;
    if (sortMap[sort]) btn.textContent = sortMap[sort];
  });
  
  // Clear filters button
  const clearBtn = document.getElementById('clearFiltersBtn');
  if (clearBtn) clearBtn.textContent = t('✕ フィルタークリア');
  
  // YT CTA
  const ytCta = document.querySelector('.yt-cta');
  if (ytCta && currentLang === 'en') {
    ytCta.innerHTML = 'Help us grow! <a href="https://www.youtube.com/@MH_GAMES_JP?sub_confirmation=1" target="_blank" rel="noopener">Subscribe & Support</a> us!';
  } else if (ytCta && currentLang === 'ja') {

let currentTab = 'unit';
let currentSort = 'atk';
let currentDir = -1;
let currentView = 'card';
let activeTagLookup = '';  // currently selected tag in tag lookup
let allTagData = {};       // {tagName: {units:[], charas:[], total:N}}

// === TEAM SIMULATOR STATE ===
let teamSlots = [
  { unitId: null, charaId: null },
  { unitId: null, charaId: null },
  { unitId: null, charaId: null },
  { unitId: null, charaId: null },
  { unitId: null, charaId: null }
];
let teamSupporterId = null;
let teamLeaderTag = '';
let teamLeaderEffect = '';
let pickerMode = null;  // 'unit' | 'chara' | 'supporter'
let pickerSlotIndex = -1;

async function init() {
  await loadTranslations();
  initLangToggle();
  const uResp = await fetch('/units.json');
  const allData = await uResp.json();
  // ユニット: キャラタグを持たないエントリ（MSなど）
  allUnits = allData.filter(u => {
    const tags = u.tags || [];
    if (tags.includes('キャラ')) return false;
    const s = u.normal?.stats;
    return s && (s.hp > 0 || s.attack > 0 || s.defense > 0 || s.en > 0);
  });
  // キャラデータ: タグに「キャラ」を持つエントリ
  allCharas = allData.filter(u => (u.tags || []).includes('キャラ')).map(u => {
    const n = u.normal || {};
    const stats = n.stats || {};
    // スキル: skills配列から取得（SP付き）
    const skills = (n.skills || []).map(sk => ({
      name: sk.name,
      effect: sk.effect || sk.desc || '',
      sp_cost: sk.sp_cost || 0
    }));
    // アビリティ: abilities配列から取得
    const charaAbilities = (n.abilities || []).map(a => ({
      name: a.name, desc: a.desc || a.effect || '', condition: a.condition || ''
    }));
    return {
      id: u.id,
      name: u.name,
      image: u.image,
      rarity: u.rarity,
      chara_type: u.type,
      obtain_method: u.obtain || '',
      series: (u.series || []).join(' / '),
      seriesArr: u.series || [],
      tags: (u.tags || []).filter(t => t !== 'キャラ'),
      stats: {
        combat_power: n.combat_power || 0,
        shooting: stats.shooting || 0,
        melee: stats.melee || 0,
        awakening: stats.awakening || 0,
        defense: stats.defense || 0,
        reaction: stats.reaction || 0,
        sp: stats.sp || 0
      },
      skills: skills,
      abilities: charaAbilities
    };
  });
  // サポーターデータ読み込み
  try {
    const sResp = await fetch('/supporters.json');
    const sData = await sResp.json();
    allSupporters = sData.map((s, idx) => ({ ...s, id: idx + 1 }));
  } catch(e) { allSupporters = []; }

  document.getElementById('unitTabCount').textContent = `(${allUnits.length})`;
  document.getElementById('charaTabCount').textContent = `(${allCharas.length})`;
  document.getElementById('supporterTabCount').textContent = `(${allSupporters.length})`;

  buildTagData();
  // Pre-compute stat rankings (top 10)
  window._unitRanks = {};
  const unitStatKeys = ['hp','en','attack','defense','agility','mobility'];
  unitStatKeys.forEach(key => {
    const sorted = allUnits.map(u => ({id:u.id, val:parseInt((u.normal?.stats||{})[key])||0})).sort((a,b)=>b.val-a.val);
    const ranks = {};
    sorted.forEach((item,i) => { if(i < 10 && item.val > 0) ranks[item.id] = i+1; });
    window._unitRanks[key] = ranks;
  });
  window._charaRanks = {};
  const charaStatKeys = ['shooting','melee','awakening','defense','reaction'];
  charaStatKeys.forEach(key => {
    const sorted = allCharas.map(c => ({id:c.id, val:parseInt((c.stats||{})[key])||0})).sort((a,b)=>b.val-a.val);
    const ranks = {};
    sorted.forEach((item,i) => { if(i < 10 && item.val > 0) ranks[item.id] = i+1; });
    window._charaRanks[key] = ranks;
  });
  setupTabs();
  setupViewToggle();
  buildFilters();
  applyStaticTranslations();

  // Check for team data in URL params FIRST (before render/syncURL can wipe them)
  if (loadTeamFromURL()) {
    document.querySelector('.tab-btn[data-tab="team"]').click();
  } else if (!restoreFromURL()) {
    render();
  }
}

function buildFilters() {
  if (currentTab === 'unit') {
    const types = new Set(), series = new Set(), tags = new Set(), rarities = new Set();
    allUnits.forEach(u => {
      if (u.type) types.add(u.type);
      if (u.rarity) rarities.add(u.rarity);
      (u.series||[]).forEach(s => series.add(s));
      (u.tags||[]).forEach(t => tags.add(t));
    });
    // Type buttons
    const typeOrder = ['攻撃','耐久','支援','射撃','格闘','覚醒'];
    const typeBtns = typeOrder.filter(t => types.has(t)).map(t => {
      const icon = TYPE_ICON_MAP[t] ? `<img src="${TYPE_ICON_MAP[t]}" alt="${t}">` : '';
      return `<button class="filter-btn" data-value="${t}">${icon}${tType(t)}</button>`;
    }).join('');
    document.getElementById('filterTypeButtons').innerHTML = typeBtns;
    document.querySelectorAll('#filterTypeButtons .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => { btn.classList.toggle('active'); render(); });
    });
    // Rarity buttons
    const rarityOrder = ['UR','ULT','SSR','SR','R','N'];
    const rarBtns = rarityOrder.filter(r => rarities.has(r)).map(r =>
      `<button class="filter-btn filter-btn-${r.toLowerCase()}" data-value="${r}">${r}</button>`
    ).join('');
    document.getElementById('filterRarityButtons').innerHTML = rarBtns;
    document.querySelectorAll('#filterRarityButtons .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => { btn.classList.toggle('active'); render(); });
    });
    fillSelect('filterSeries', [...series].sort());
    fillSelect('filterTag', [...tags].sort());
    // Debuff category buttons
    const debuffBtns = DEBUFF_CATEGORIES.map(d =>
      `<button class="filter-btn" data-debuff="${d.key}">${d.label}</button>`
    ).join('');
    document.getElementById('debuffCategoryButtons').innerHTML = debuffBtns;
    document.querySelectorAll('#debuffCategoryButtons .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.debuff;
        if (activeDebuffKey === key) {
          activeDebuffKey = ''; btn.classList.remove('active');
          document.getElementById('debuffRateWrap').style.display = 'none';
          debuffMinRate = 0;
        } else {
          activeDebuffKey = key; activeSpecialKey = '';
          document.querySelectorAll('#debuffCategoryButtons .filter-btn, #specialEffectButtons .filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const cat = DEBUFF_CATEGORIES.find(d => d.key === key);
          const rateSel = document.getElementById('debuffMinRate');
          rateSel.innerHTML = '<option value="">すべて</option>';
          (cat.rates||[]).forEach(r => { const op = document.createElement('option'); op.value = r; op.textContent = r + '%以上'; rateSel.appendChild(op); });
          document.getElementById('debuffRateWrap').style.display = '';
          debuffMinRate = 0;
        }
        render();
      });
    });
    // Special effect buttons
    const specBtns = SPECIAL_EFFECTS.map(s =>
      `<button class="filter-btn" data-special="${s.key}">${s.label}</button>`
    ).join('');
    document.getElementById('specialEffectButtons').innerHTML = specBtns;
    document.querySelectorAll('#specialEffectButtons .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.special;
        if (activeSpecialKey === key) {
          activeSpecialKey = ''; btn.classList.remove('active');
        } else {
          activeSpecialKey = key; activeDebuffKey = ''; debuffMinRate = 0;
          document.querySelectorAll('#debuffCategoryButtons .filter-btn, #specialEffectButtons .filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('debuffRateWrap').style.display = 'none';
        }
        render();
      });
    });
    document.getElementById('debuffMinRate').addEventListener('change', (e) => {
      debuffMinRate = parseInt(e.target.value) || 0;
      render();
    });
  } else if (currentTab === 'chara') {
    const rarities = new Set(), types = new Set(), series = new Set(), tags = new Set();
    allCharas.forEach(c => {
      if (c.rarity) rarities.add(c.rarity);
      if (c.chara_type) types.add(c.chara_type);
      if (c.series) series.add(c.series);
      (c.tags||[]).forEach(t => tags.add(t));
    });
    // Type buttons for chara
    const charaTypeOrder = ['攻撃','支援','耐久'];
    const ctBtns = charaTypeOrder.filter(t => types.has(t)).map(t => {
      const icon = TYPE_ICON_MAP[t] ? `<img src="${TYPE_ICON_MAP[t]}" alt="${t}">` : '';
      return `<button class="filter-btn" data-value="${t}">${icon}${t}</button>`;
    }).join('');
    document.getElementById('filterCharaType').parentElement.innerHTML = '<label>タイプ</label><div class="filter-btn-group" id="charaTypeButtons">' + ctBtns + '</div>';
    document.querySelectorAll('#charaTypeButtons .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => { btn.classList.toggle('active'); render(); });
    });
    const rarityOrder = ['UR','ULT','SSR','SR','R','N'];
    const rarBtns = rarityOrder.filter(r => rarities.has(r)).map(r =>
      `<button class="filter-btn filter-btn-${r.toLowerCase()}" data-value="${r}">${r}</button>`
    ).join('');
    document.getElementById('filterRarityButtons').innerHTML = rarBtns;
    document.querySelectorAll('#filterRarityButtons .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => { btn.classList.toggle('active'); render(); });
    });
    fillSelect('filterSeries', [...series].sort());
    // Show tag filter for chara too
    document.getElementById('filterTagGroup').style.display = '';
    fillSelect('filterTag', [...tags].sort());
  } else {
    const rarities = new Set(), targets = new Set();
    const tagSet = new Set();
    const skillSet = new Set();
    allSupporters.forEach(s => {
      if (s.rarity) rarities.add(s.rarity);
      if (s.target_series) targets.add(s.target_series);
      // Extract individual tags from target_series (split by "or")
      if (s.target_series) {
        s.target_series.split(/(?<![a-zA-Z])or(?![a-zA-Z])/i).map(t => t.trim()).filter(Boolean).forEach(t => {
          // Categorize: if it's a series name (contains ガンダム or known series), skip for tag filter
          // Otherwise it's a tag
          if (!/機動|ガンダム|SDガンダム|新機動|SEEDシリーズ|宇宙世紀シリーズ|オルタナティブシリーズ/.test(t)) {
            tagSet.add(t);
          }
        });
      }
      // Also check leader2_target for tags
      if (s.leader2_target) {
        s.leader2_target.split(/ and /i).map(t => t.trim()).filter(Boolean).forEach(t => {
          if (!/機動|ガンダム|SDガンダム|新機動|SEEDシリーズ|宇宙世紀シリーズ|オルタナティブシリーズ/.test(t)) {
            tagSet.add(t);
          }
        });
      }
      if (s.recovery_type) skillSet.add(s.recovery_type);
    });
    const rarityOrder = ['UR','ULT','SSR','SR','R','N'];
    const rarBtns = rarityOrder.filter(r => rarities.has(r)).map(r =>
      `<button class="filter-btn filter-btn-${r.toLowerCase()}" data-value="${r}">${r}</button>`
    ).join('');
    document.getElementById('filterRarityButtons').innerHTML = rarBtns;
    document.querySelectorAll('#filterRarityButtons .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => { btn.classList.toggle('active'); render(); });
    });
    fillSelect('filterTarget', [...targets].sort());
    // Tag filter buttons
    const tagBtns = [...tagSet].sort().map(t =>
      `<button class="filter-btn" data-value="${t}">${t}</button>`
    ).join('');
    document.getElementById('filterSupTagButtons').innerHTML = tagBtns;
    document.querySelectorAll('#filterSupTagButtons .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => { btn.classList.toggle('active'); render(); });
    });
    // Support skill filter buttons (HP / EN / HP・EN)
    const skillOrder = ['HP', 'EN', 'HP・EN'];
    const skillLabels = { 'HP': 'HP回復', 'EN': 'EN回復', 'HP・EN': 'HP&EN回復' };
    const skBtns = skillOrder.filter(s => skillSet.has(s)).map(s =>
      `<button class="filter-btn" data-value="${s}">${skillLabels[s]||s}</button>`
    ).join('');
    document.getElementById('filterSupSkillButtons').innerHTML = skBtns;
    document.querySelectorAll('#filterSupSkillButtons .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => { btn.classList.toggle('active'); render(); });
    });
  }
}

function fillSelect(id, opts) {
  const sel = document.getElementById(id);
  const isSeriesOrTag = id === 'filterSeries' || id === 'filterTag' || id === 'filterTarget';
  opts.forEach(o => {
    const op = document.createElement('option');
    op.value = o;
    op.textContent = isSeriesOrTag ? tData(o) : o;
    sel.appendChild(op);
  });
}

function getData() {
  if (currentTab === 'unit') return allUnits;
  if (currentTab === 'chara') return allCharas;
  return allSupporters;
}

function getActiveTypes() {
  return [...document.querySelectorAll('#filterTypeButtons .filter-btn.active')].map(b => b.dataset.value);
}
function getActiveRarities() {
  return [...document.querySelectorAll('#filterRarityButtons .filter-btn.active')].map(b => b.dataset.value);
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const data = getData();
  const activeRarities = getActiveRarities();

  if (currentTab === 'unit') {
    const activeTypes = getActiveTypes();
    const series = document.getElementById('filterSeries').value;
    const tag = document.getElementById('filterTag').value;
    const activeTerrains = [...document.querySelectorAll('#filterTerrainButtons .filter-btn.active')].map(b => b.dataset.value);
    const mapFilterActive = document.getElementById('filterMapBtn')?.classList.contains('active');
    const rangeMin = parseInt(document.getElementById('filterRange')?.value) || 0;
    return data.filter(u => {
      if (q) {
        const nameMatch = u.name.toLowerCase().includes(q) || (currentLang==='en' && tData(u.name).toLowerCase().includes(q));
        const weaponMatch = (u.normal_weapons||[]).concat(u.transformed_weapons||[]).some(w =>
          (w.name||'').toLowerCase().includes(q) || (w.effect||'').toLowerCase().includes(q) || (w.attribute||'').toLowerCase().includes(q) || (w.weapon_type||'').toLowerCase().includes(q)
        );
        if (!nameMatch && !weaponMatch) return false;
      }
      if (activeTypes.length > 0 && !activeTypes.includes(u.type)) return false;
      if (activeRarities.length > 0 && !activeRarities.includes(u.rarity)) return false;
      if (series && !(u.series||[]).includes(series)) return false;
      if (tag && !(u.tags||[]).includes(tag)) return false;
      if (activeTerrains.length > 0 && !activeTerrains.every(t => u.normal?.terrain?.[t] === '◯')) return false;
      // MAP weapon filter
      if (mapFilterActive) {
        const allW = (u.normal_weapons||[]).concat(u.transformed_weapons||[]);
        if (!allW.some(w => w.range === 'MAP')) return false;
      }
      // Range filter (max range)
      if (rangeMin > 0) {
        const allW = (u.normal_weapons||[]).concat(u.transformed_weapons||[]);
        const maxRange = Math.max(...allW.map(w => {
          if (!w.range || w.range === 'MAP') return 0;
          const parts = w.range.split('-');
          return parseInt(parts[parts.length - 1]) || 0;
        }));
        if (maxRange < rangeMin) return false;
      }
      // Debuff category filter with min rate
      if (activeDebuffKey) {
        const cat = DEBUFF_CATEGORIES.find(d => d.key === activeDebuffKey);
        if (cat) {
          const allWeapons = (u.normal_weapons||[]).concat(u.transformed_weapons||[]);
          const hasDebuff = allWeapons.some(w => {
            const eff = w.effect || '';
            if (!cat.pattern.test(eff)) return false;
            if (debuffMinRate > 0) {
              const maxRate = getMaxDebuffRate(eff, cat.pattern);
              return maxRate >= debuffMinRate;
            }
            return true;
          });
          if (!hasDebuff) return false;
        }
      }
      // Special effect filter
      if (activeSpecialKey) {
        const spec = SPECIAL_EFFECTS.find(s => s.key === activeSpecialKey);
        if (spec) {
          const allWeapons = (u.normal_weapons||[]).concat(u.transformed_weapons||[]);
          const hasEffect = allWeapons.some(w => spec.pattern.test(w.effect||''));
          if (!hasEffect) return false;
        }
      }
      return true;
    });
  } else if (currentTab === 'chara') {
    const activeCharaTypes = [...document.querySelectorAll('#charaTypeButtons .filter-btn.active')].map(b => b.dataset.value);
    const series = document.getElementById('filterSeries').value;
    const tag = document.getElementById('filterTag').value;
    return data.filter(c => {
      if (q) {
        const nameMatch = c.name.toLowerCase().includes(q) || (currentLang==='en' && tData(c.name).toLowerCase().includes(q));
        const skillMatch = (c.skills||[]).some(sk => (sk.name||'').toLowerCase().includes(q) || (sk.effect||'').toLowerCase().includes(q));
        const abilMatch = (c.abilities||[]).some(a => (a.name||'').toLowerCase().includes(q) || (a.desc||'').toLowerCase().includes(q));
        if (!nameMatch && !skillMatch && !abilMatch) return false;
      }
      if (activeRarities.length > 0 && !activeRarities.includes(c.rarity)) return false;
      if (activeCharaTypes.length > 0 && !activeCharaTypes.includes(c.chara_type)) return false;
      if (series && c.series !== series) return false;
      if (tag && !(c.tags||[]).includes(tag)) return false;
      return true;
    });
  } else {
    const target = document.getElementById('filterTarget').value;
    const activeSupTags = [...document.querySelectorAll('#filterSupTagButtons .filter-btn.active')].map(b => b.dataset.value);
    const activeSupSkills = [...document.querySelectorAll('#filterSupSkillButtons .filter-btn.active')].map(b => b.dataset.value);
    return data.filter(s => {
      if (q && !s.name.toLowerCase().includes(q) && !(currentLang==='en' && tData(s.name,'supporters').toLowerCase().includes(q))) return false;
      if (activeRarities.length > 0 && !activeRarities.includes(s.rarity)) return false;
      if (target && s.target_series !== target) return false;
      // Tag filter: check if any of the supporter's target tags match active tag filters
      if (activeSupTags.length > 0) {
        const supAllTags = [];
        if (s.target_series) s.target_series.split(/(?<![a-zA-Z])or(?![a-zA-Z])/i).map(t => t.trim()).filter(Boolean).forEach(t => supAllTags.push(t));
        if (s.leader2_target) s.leader2_target.split(/ and /i).map(t => t.trim()).filter(Boolean).forEach(t => supAllTags.push(t));
        const hasTag = activeSupTags.some(ft => supAllTags.some(st => st.includes(ft) || ft.includes(st)));
        if (!hasTag) return false;
      }
      // Support skill filter
      if (activeSupSkills.length > 0 && !activeSupSkills.includes(s.recovery_type)) return false;
      return true;
    });
  }
}

function sortItems(items) {
  const dir = currentDir;
  const isChara = currentTab === 'chara';
  const isSupporter = currentTab === 'supporter';
  return [...items].sort((a, b) => {
    let va, vb;
    switch(currentSort) {
      case 'cp':
        if (isChara) { va = parseInt(a.stats?.combat_power)||0; vb = parseInt(b.stats?.combat_power)||0; }
        else { va = parseInt(a.normal?.combat_power)||0; vb = parseInt(b.normal?.combat_power)||0; }
        break;
      case 'atk':
        if (isSupporter) { va = parseInt(a.attack)||0; vb = parseInt(b.attack)||0; }
        else if (isChara) { va = parseInt(a.stats?.shooting)||0; vb = parseInt(b.stats?.shooting)||0; }
        else { va = parseInt(a.normal?.stats?.attack)||0; vb = parseInt(b.normal?.stats?.attack)||0; }
        break;
      case 'hp':
        if (isSupporter) { va = parseInt(a.hp)||0; vb = parseInt(b.hp)||0; }
        else if (isChara) { va = parseInt(a.stats?.defense)||0; vb = parseInt(b.stats?.defense)||0; }
        else { va = parseInt(a.normal?.stats?.hp)||0; vb = parseInt(b.normal?.stats?.hp)||0; }
        break;
      case 'def':
        va = parseInt(a.normal?.stats?.defense)||0; vb = parseInt(b.normal?.stats?.defense)||0; break;
      case 'en':
        va = parseInt(a.normal?.stats?.en)||0; vb = parseInt(b.normal?.stats?.en)||0; break;
      case 'agi':
        va = parseInt(a.normal?.stats?.agility)||0; vb = parseInt(b.normal?.stats?.agility)||0; break;
      case 'shoot':
        va = parseInt(a.stats?.shooting)||0; vb = parseInt(b.stats?.shooting)||0; break;
      case 'react':
        va = parseInt(a.stats?.reaction)||0; vb = parseInt(b.stats?.reaction)||0; break;
      case 'melee':
        va = parseInt(a.stats?.melee)||0; vb = parseInt(b.stats?.melee)||0; break;
      case 'awaken':
        va = parseInt(a.stats?.awakening)||0; vb = parseInt(b.stats?.awakening)||0; break;
      case 'ls':
        if (isSupporter) {
          const parseLS = s => {
            const t2 = s.leader2_3||s.leader2_2||s.leader2_1||s.leader2_0||'';
            const t1 = s.leader_3||s.leader_2||s.leader_1||s.leader_0||'';
            const src = t2 || t1 || '0';
            const m = src.match(/\d+/); return m ? parseInt(m[0]) : 0;
          };
          va = parseLS(a); vb = parseLS(b);
        } else { va = 0; vb = 0; }
        break;
      case 'name': return dir * a.name.localeCompare(b.name, 'ja');
    }
    return dir * (va - vb);
  });
}

function render() {
  const filtered = sortItems(getFiltered());
  const data = getData();
  const labels = { unit: t('ユニット'), chara: t('キャラ'), supporter: t('サポーター') };
  document.getElementById('resultCount').textContent = `${filtered.length} / ${data.length} ${labels[currentTab]}`;
  const grid = document.getElementById('mainGrid');
  const tableWrap = document.getElementById('tableWrap');

  if (currentView === 'card') {
    grid.style.display = '';
    tableWrap.style.display = 'none';
    if (currentTab === 'unit') {
      grid.innerHTML = filtered.map(u => unitCardHTML(u)).join('');
    } else if (currentTab === 'chara') {
      grid.innerHTML = filtered.map(c => charaCardHTML(c)).join('');
    } else {
      grid.innerHTML = filtered.map(s => supporterCardHTML(s)).join('');
    }
  } else {
    grid.style.display = 'none';
    tableWrap.style.display = '';
    if (currentTab === 'unit') {
      tableWrap.innerHTML = unitTableHTML(filtered);
    } else if (currentTab === 'chara') {
      tableWrap.innerHTML = charaTableHTML(filtered);
    } else {
      tableWrap.innerHTML = supporterTableHTML(filtered);
    }
  }
  syncURL();
  updateClearButton();
}

  { key:'atkDown', label:'攻撃力↓', pattern:/攻撃力(\d+)(?:~(\d+))?%減少/, rates:[15,20,25,30,35] },
  { key:'defDown', label:'防御力↓', pattern:/防御力(\d+)(?:~(\d+))?%減少/, rates:[20,25,30,35] },
  { key:'mobDown', label:'機動力↓', pattern:/機動力(\d+)(?:~(\d+))?%減少/, rates:[20,25,30] },
  { key:'hitDown', label:'命中率↓', pattern:/命中率(\d+)(?:~(\d+))?%減少/, rates:[5,10,12,15,17] },
  { key:'beamDmgUp', label:'ビーム被ダメ↑', pattern:/ビーム武装による被ダメ[ーージ]*(\d+)(?:~(\d+))?%上昇/, rates:[20,25,30,35] },

  { key:'physPwDown', label:'物理PW↓', pattern:/物理武装POWER(\d+)(?:~(\d+))?%減少/, rates:[20,25,30,35] },

];
const SPECIAL_EFFECTS = [
  { key:'absHit', label:'絶対命中', pattern:/絶対命中/ },
  { key:'noReduce', label:'属性軽減無効', pattern:/属性軽減無効/ },
  { key:'preempt', label:'先制攻撃', pattern:/先制攻撃/ },
  { key:'crit', label:'クリティカル↑', pattern:/クリティカルダメージ.*上昇/ },
  { key:'heal', label:'回復', pattern:/回復/ },
];
let activeDebuffKey = '';
let activeSpecialKey = '';
let debuffMinRate = 0;

function getMaxDebuffRate(effectText, pattern) {
  const m = effectText.match(pattern);
  if (!m) return 0;
  const base = parseInt(m[2] || m[1]) || 0;
  const bonusMatch = effectText.match(/さらに[^\d]*(\d+)%/);
  return base + (bonusMatch ? parseInt(bonusMatch[1]) : 0);
}

// === TARGET UNITS POPUP ===
function showTargetUnits(targetSeries) {
  if (!targetSeries || targetSeries === '-') return;
  // Parse target: may contain "or" separating multiple series
  const seriesList = targetSeries.split(/(?<![a-zA-Z])or(?![a-zA-Z])/i).map(s => s.trim()).filter(Boolean);
  // Find matching units
  const matched = allUnits.filter(u => {
    const uSeries = u.seriesArr || [];
    return seriesList.some(ts => uSeries.some(us => us.includes(ts) || ts.includes(us)));
  });
  // Also check tags
  const matchedByTag = allUnits.filter(u => {
    if (matched.includes(u)) return false;
    const tags = u.tags || [];
    return seriesList.some(ts => tags.some(t => t.includes(ts) || ts.includes(t)));
  });
  const all = [...matched, ...matchedByTag];
  // Build popup
  let overlay = document.getElementById('targetUnitsOverlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'targetUnitsOverlay';
    overlay.className = 'target-units-popup-overlay';
    overlay.onclick = e => { if (e.target === overlay) overlay.style.display = 'none'; };
    document.body.appendChild(overlay);
  }
  const listHTML = all.length
    ? all.map(u => `<div class="target-unit-item" onclick="document.getElementById('targetUnitsOverlay').style.display='none';showUnitDetail(${u.id})">
        ${u.image ? `<img src="${u.image}" alt="${u.name}" onerror="this.style.display='none'" loading="lazy">` : '<div style="width:36px;height:36px;border-radius:4px;background:var(--border)"></div>'}
        <span class="tui-name">${u.name}</span>
        <span class="badge ${rarityClass(u.rarity)}" style="font-size:.6em">${u.rarity||'?'}</span>
        <span class="tui-meta">${u.type||''}</span>
      </div>`).join('')
    : '<div style="text-align:center;padding:24px;color:var(--text2);font-size:.85em">対象ユニットが見つかりませんでした</div>';
  overlay.innerHTML = `<div class="target-units-popup">

// === UNIT DETAIL (with transform toggle) ===
function showUnitDetail(id) {
  const u = allUnits.find(x => x.id === id);
  if (!u) return;
  window._currentDetailUnit = u;
  window._currentDetailForm = 'base';
  renderUnitDetail(u, 'base');
  openModal();
}

function findCharaByName(name) {
  return allCharas.find(c => c.name === name);
}
function charaTagHTML(tag) {
  const c = findCharaByName(tag);
  if (c) return `<span class="tag clickable-tag chara-link-tag" onclick="event.stopPropagation();showCharaDetail(${c.id})" title="キャラ詳細を表示">👤 ${tag}</span>`;
  return `<span class="tag clickable-tag" onclick="event.stopPropagation();filterByTag('${tag.replace(/'/g,"\\'")}');closeModal()">${tag}</span>`;
}
function rankBadge(ranks, id, key) {
  const r = ranks?.[key]?.[id];
  if (!r) return '';
  const cls = r <= 3 ? 'rank-badge top3' : 'rank-badge';
  return `<span class="${cls}">👑${r}位</span>`;
}
function renderUnitDetail(u, form) {
  const isTransform = form === 'transform' && u.transformed;
  const formData = isTransform ? u.transformed : (u.normal || {});
  const s = formData.stats || {};
  const t = formData.terrain || {};
  const weapons = isTransform ? (u.transformed_weapons || []) : (u.normal_weapons || []);

  let transformToggle = '';
  if (u.transformed) {
    transformToggle = `<div class="transform-toggle">
      <button class="transform-btn ${form==='base'?'active':''}" onclick="switchForm('base')">通常形態</button>
      <button class="transform-btn ${form==='transform'?'active':''}" onclick="switchForm('transform')">変形後</button>
    </div>`;
  }

  const weaponsHTML = weapons.map(w => {
    const isMap = w.range === 'MAP';
    const isEx = w.name.includes('EX');
    return `
    <div class="weapon-detail">
      <div class="weapon-name">${isMap?`<span class="map-badge"><img src="${MAP_WEAPON_ICON}" class="map-icon" alt="MAP">MAP兵器</span>`:''}${w.name}${isEx?'<span class="ex-badge">EX</span>':''}</div>
      <div class="weapon-info">
        <div><span>属性:</span> <strong>${w.attribute||'-'}</strong></div>
        <div><span>射程:</span> <strong>${rangeDisplay(w)}</strong></div>
        <div><span>威力:</span> <strong>${w.power||'-'}</strong></div>
        <div><span>EN:</span> <strong>${w.en||'-'}</strong></div>
        <div><span>命中:</span> <strong>${w.hit||'-'}</strong></div>
        <div><span>クリ:</span> <strong>${w.critical||'-'}</strong></div>
        ${isMap ? `<div><span>使用回数:</span> <strong>${w.ammo && w.ammo !== '-' ? w.ammo + '回' : '-'}</strong></div>` : ''}
      </div>
      ${w.weapon_type ? `<div class="weapon-effect">タイプ: ${w.weapon_type}</div>` : ''}
      ${(() => { let eff = w.effect || ''; eff = eff.replace(/\s*\[添付\]/g, '').trim(); return eff && eff !== 'なし' ? `<div class="weapon-effect">効果: ${eff}</div>` : ''; })()}
      ${w.restriction && w.restriction !== 'なし' ? `<div class="weapon-effect">制限: ${w.restriction}</div>` : ''}
    </div>
  `}).join('');

  const allAbilities = formData.abilities||[];
  let mechText = formData.mechanism || '';

  // If mechanism is empty, try to use シールド防御 ability as mechanism
  if (!mechText) {
    const shieldAbility = allAbilities.find(a => a.name === 'シールド防御');
    if (shieldAbility) mechText = shieldAbility.desc || '';
  }

  // Filter: remove 強い点/弱い点, weapons (desc starts with digit = range data), character data (name contains 戦闘力), スキル, シールド防御
  const pureAbilities = allAbilities.filter(a => {
    if (a.name === '強い点' || a.name === '弱い点') return false;
    if (a.name === 'スキル') return false;
    if (a.name === 'シールド防御') return false;
    if (/戦闘力/.test(a.name)) return false;
    if (/^\d/.test(a.desc||'')) return false;
    return true;
  });

  // Extract skill entry and parse concatenated skills
  const skillEntry = allAbilities.find(a => a.name === 'スキル');
  let skillsHTML = '';
  if (skillEntry && skillEntry.desc) {
    const skillRegex = /([\u3000-\u9fff\u30a0-\u30ff\uff00-\uffefA-Za-z\u30fb\-\u30fc\uff08\uff09]+Lv\d+)\(SP:(\d+)\)/g;
    const anchors = [];
    let m;
    while ((m = skillRegex.exec(skillEntry.desc)) !== null) {
      anchors.push({name: m[1], sp: m[2], start: m.index, end: m.index + m[0].length});
    }
    if (anchors.length) {
      skillsHTML = anchors.map((a, i) => {
        const descEnd = i + 1 < anchors.length ? anchors[i+1].start : skillEntry.desc.length;
        const desc = skillEntry.desc.slice(a.end, descEnd);
        return `<div class="ability-item"><span class="ability-name">${a.name} (SP:${a.sp})</span><br><span class="ability-effect">${desc}</span></div>`;
      }).join('');
    } else {
      skillsHTML = `<div class="ability-item"><span class="ability-effect">${skillEntry.desc}</span></div>`;
    }
  }

  const abHTML = pureAbilities.map(a => `
    <div class="ability-item"><span class="ability-name">${a.name}</span><br><span class="ability-effect">${a.desc||''}</span></div>
  `).join('');

  const modalIconHTML = u.image ? `<img class="modal-icon" src="${u.image}" alt="${u.name}の詳細画像" onerror="this.style.display='none'">` : '';

  document.getElementById('modalContent').innerHTML = `
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-header-row">
      ${modalIconHTML}
      <div>
        <h2>${u.name}</h2>
        <div class="detail-badges">
          <span class="badge ${rarityClass(u.rarity)}">${u.rarity||'?'}</span>
          ${typeBadgeHTML(u.type)}
          <span class="badge badge-type">${(u.obtain||'').replace(/ピックアップガ[シチ]ャ/g,'ガシャ')}</span>
        </div>
      </div>
    </div>
    ${transformToggle}
    <div class="detail-section">
      <div style="font-size:.8em;color:var(--card-text2);margin-bottom:4px">${(u.series||[]).join(' / ')}</div>
      <div class="card-tags">${(u.tags||[]).map(t=>charaTagHTML(t)).join('')}</div>
    </div>
    <div class="detail-section">
      <h3>ステータス${isTransform ? ' (変形後)' : ''}${!isTransform && u.rarity==='UR' ? ' <span class="rarity-note">※最大強化時のステータス</span>' : !isTransform && u.rarity==='SSR' ? ' <span class="rarity-note">※SSP化時のステータス</span>' : ''}</h3>
      ${formData.combat_power ? `<div class="combat-power-display">戦闘力: <span style="color:var(--gold);font-weight:bold">${formData.combat_power.toLocaleString()}</span></div>` : ''}
      <div class="stats-grid">
        <div class="stat-box"><div class="label">HP</div><div class="val">${(parseInt(s.hp)||0).toLocaleString()}${rankBadge(_unitRanks,u.id,'hp')}</div></div>
        <div class="stat-box"><div class="label">EN</div><div class="val">${s.en||'-'}${rankBadge(_unitRanks,u.id,'en')}</div></div>
        <div class="stat-box"><div class="label">攻撃力</div><div class="val">${(parseInt(s.attack)||0).toLocaleString()}${rankBadge(_unitRanks,u.id,'attack')}</div></div>
        <div class="stat-box"><div class="label">防御力</div><div class="val">${(parseInt(s.defense)||0).toLocaleString()}${rankBadge(_unitRanks,u.id,'defense')}</div></div>
        <div class="stat-box"><div class="label">機動力</div><div class="val">${(parseInt(s.agility)||0).toLocaleString()}${rankBadge(_unitRanks,u.id,'agility')}</div></div>
        <div class="stat-box"><div class="label">移動力</div><div class="val">${s.mobility||'-'}${rankBadge(_unitRanks,u.id,'mobility')}</div></div>
      </div>
      ${u.stats_by_star && u.stats_by_star.length > 1 ? `
      <div style="margin-top:10px">
        <details class="limit-break-details" open>
          <summary style="cursor:pointer;color:var(--accent);font-size:.85em;user-select:none">${u.rarity==='SSR'?'★限界突破 / SP化 / SSP化 ステータス一覧':'★限界突破ステータス一覧'}</summary>
          <table class="lb-table">
            <thead><tr><th>★</th><th>LV</th><th>HP</th><th>EN</th><th>攻撃</th><th>防御</th><th>機動</th><th>移動</th></tr></thead>
            <tbody>${u.stats_by_star.map(st => `<tr${st.star >= 4 ? ' class="lb-sp"' : st.star === u.stats_by_star.filter(s=>s.star<=3).length - 1 && st.star <= 3 ? ' class="lb-max"' : ''}>
              <td>${st.star === 0 ? '無' : st.star === 4 ? '<span class="sp-label">★★★<br>SP化</span>' : st.star === 5 ? '<span class="ssp-label">★★★<br>SSP化</span>' : '★'.repeat(st.star)}</td>
              <td>${st.lv||'-'}</td>
              <td>${(st.hp||0).toLocaleString()}</td>
              <td>${st.en||'-'}</td>
              <td>${(st.attack||0).toLocaleString()}</td>
              <td>${(st.defense||0).toLocaleString()}</td>
              <td>${(st.agility||0).toLocaleString()}</td>
              <td>${st.mobility||'-'}</td>
            </tr>`).join('')}</tbody>
          </table>
        </details>
      </div>` : ''}
    </div>
    <div class="detail-section">
      <h3>地形適性</h3>
      <div class="terrain-grid">
        <span>宇宙${terrainIcon(t['宇宙'])}</span>
        <span>空中${terrainIcon(t['空中'])}</span>
        <span>地上${terrainIcon(t['地上'])}</span>
        <span>水上${terrainIcon(t['水上'])}</span>
        <span>水中${terrainIcon(t['水中'])}</span>
      </div>
    </div>
    <div class="detail-section">
      <h3>武装 (${weapons.length})</h3>
      ${weaponsHTML}
    </div>
    ${pureAbilities.length ? `<div class="detail-section"><h3>アビリティ (${pureAbilities.length})</h3>${abHTML}</div>` : ''}
    ${mechText ? `<div class="detail-section"><h3>機構</h3><div class="mechanism-item"><span class="mechanism-effect">${mechText}</span></div></div>` : ''}
  `;
}

}

  document.getElementById('modalContent').innerHTML = `

function filterByTag(tagName) {
  // If in tag lookup, activate that tag
  if (currentTab === 'taglookup') {
    activeTagLookup = tagName;
    renderTagLookup();
    return;
  }
  // Check if the tag exists in current tab's data
  const currentData = getData();
  const tagInCurrentTab = currentData.some(item => {
    if (currentTab === 'unit') return (item.tags||[]).includes(tagName);
    if (currentTab === 'chara') return (item.tags||[]).includes(tagName);
    return false;
  });
  // If tag doesn't exist in current tab, switch to the one that has it, or go to tag lookup
  if (!tagInCurrentTab) {
    // Check if tag exists in units
    const inUnits = allUnits.some(u => (u.tags||[]).includes(tagName));
    const inCharas = allCharas.some(c => (c.tags||[]).includes(tagName));
    if (inUnits && inCharas) {
      // Both have it — go to tag lookup for cross-category view
      activeTagLookup = tagName;
      document.querySelector('.tab-btn[data-tab="taglookup"]').click();
      return;
    } else if (inUnits) {
      document.querySelector('.tab-btn[data-tab="unit"]').click();
    } else if (inCharas) {
      document.querySelector('.tab-btn[data-tab="chara"]').click();
    }
  }
  const sel = document.getElementById('filterTag');
  for (let i = 0; i < sel.options.length; i++) {
    if (sel.options[i].value === tagName) { sel.value = tagName; render(); return; }
  }
  const opt = document.createElement('option');
  opt.value = tagName; opt.textContent = tagName;
  sel.appendChild(opt);
  sel.value = tagName;
  render();
}

// === TAG LOOKUP SYSTEM ===
function buildTagData() {
  allTagData = {};
  // Collect tags from units
  allUnits.forEach(u => {
    (u.tags||[]).forEach(t => {
      if (!allTagData[t]) allTagData[t] = {units:[], charas:[], total:0};
      allTagData[t].units.push(u);
    });
    // Also index series as tags
    (u.series||[]).forEach(s => {
      const key = '📺 ' + s;
      if (!allTagData[key]) allTagData[key] = {units:[], charas:[], total:0};
      allTagData[key].units.push(u);
    });
  });
  // Collect tags from characters
  allCharas.forEach(c => {
    (c.tags||[]).forEach(t => {
      if (!allTagData[t]) allTagData[t] = {units:[], charas:[], total:0};
      allTagData[t].charas.push(c);
    });
    (c.seriesArr||[]).forEach(s => {
      const key = '📺 ' + s;
      if (!allTagData[key]) allTagData[key] = {units:[], charas:[], total:0};
      allTagData[key].charas.push(c);
    });
  });
  Object.values(allTagData).forEach(v => v.total = v.units.length + v.charas.length);
}

function renderTagLookup() {
  const searchQ = (document.getElementById('tagSearchInput')?.value || '').toLowerCase();
  const container = document.getElementById('tagSections');
  const resultsDiv = document.getElementById('tagResults');

  // Group tags into categories
  const seriesTags = [], factionTags = [], roleTags = [], otherTags = [];
  const factionKeywords = ['軍','ジオン','連邦','エゥーゴ','ティターンズ','ザフト','オーブ','連合','ネオ','アクシズ','マフティー','三隻同盟','学園','SDガンダム'];
  const roleKeywords = ['主人公','ライバル','リーダー','ルーキー','ベテラン','ニュータイプ','パイロット','民間人','軍人','マスク','身体強化','コーディネイター'];

  Object.keys(allTagData).forEach(tag => {
    if (searchQ && !tag.toLowerCase().includes(searchQ)) return;
    const d = allTagData[tag];
    if (d.total === 0) return;
    if (tag.startsWith('📺 ')) { seriesTags.push(tag); return; }
    if (factionKeywords.some(k => tag.includes(k))) { factionTags.push(tag); return; }
    if (roleKeywords.some(k => tag.includes(k))) { roleTags.push(tag); return; }
    otherTags.push(tag);
  });

  const sortByTotal = (a,b) => allTagData[b].total - allTagData[a].total;
  seriesTags.sort(sortByTotal); factionTags.sort(sortByTotal); roleTags.sort(sortByTotal); otherTags.sort(sortByTotal);

  function chipHTML(tag) {
    const d = allTagData[tag];
    const active = activeTagLookup === tag ? ' active' : '';
    const label = tag.startsWith('📺 ') ? tag.slice(3) : tag;
    const counts = [];
    if (d.units.length) counts.push(`${currentLang==='en'?'Units':'MS'}:${d.units.length}`);
    if (d.charas.length) counts.push(`${currentLang==='en'?'Chars':'キャラ'}:${d.charas.length}`);
    return `<span class="tag-chip${active}" onclick="selectTagLookup('${tag.replace(/'/g,"\\'")}')">${label} <span class="tag-count">${counts.join(' / ')}</span></span>`;
  }

  function sectionHTML(title, tags) {
    if (!tags.length) return '';
    return `<div class="tag-section"><div class="tag-section-title">${title} (${tags.length})</div><div class="tag-cloud">${tags.map(chipHTML).join('')}</div></div>`;
  }

  container.innerHTML =
    sectionHTML(currentLang==='en'?'Series':'シリーズ', seriesTags) +
    sectionHTML(currentLang==='en'?'Factions':'所属・勢力', factionTags) +
    sectionHTML(currentLang==='en'?'Roles & Traits':'役割・特性', roleTags) +
    sectionHTML(currentLang==='en'?'Other':'その他', otherTags);

  // Render results if a tag is selected
  if (activeTagLookup && allTagData[activeTagLookup]) {
    const d = allTagData[activeTagLookup];
    const label = activeTagLookup.startsWith('📺 ') ? activeTagLookup.slice(3) : activeTagLookup;
    let html = `<div class="tag-results-header"><span class="tag-results-label">${label}</span> ${currentLang==='en'?`Units: ${d.units.length} / Chars: ${d.charas.length}`:`該当: ユニット${d.units.length}件 / キャラ${d.charas.length}件`}</div>`;
    if (d.units.length) {
      html += `<div class="tag-results-category">${currentLang==='en'?'Units':'ユニット'} (${d.units.length})</div>`;
      html += '<div class="grid" role="list">' + d.units.map(u => unitCardHTML(u)).join('') + '</div>';
    }
    if (d.charas.length) {
      html += `<div class="tag-results-category">${currentLang==='en'?'Characters':'キャラクター'} (${d.charas.length})</div>`;
      html += '<div class="grid" role="list">' + d.charas.map(c => charaCardHTML(c)).join('') + '</div>';
    }
    resultsDiv.innerHTML = html;
  } else {
    resultsDiv.innerHTML = `<div style="text-align:center;color:var(--text2);padding:40px 0;font-size:.9em">${currentLang==="en"?"Select a tag to see matching units and characters":"タグを選択すると、該当するユニットとキャラクターが一覧表示されます"}</div>`;
  }
}

function selectTagLookup(tag) {
  activeTagLookup = activeTagLookup === tag ? '' : tag;
  renderTagLookup();
  syncURL();
  // Scroll to results
  if (activeTagLookup) {
    const el = document.getElementById('tagResults');
    if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
  }
}

// === LEADER SKILL MATCH CHECK ===
function checkLeaderSkillMatch(unit) {
  if (!teamSupporterId) return null;
  const sup = allSupporters.find(s => s.id === teamSupporterId);
  if (!sup) return null;
  const uSeries = unit.seriesArr || unit.series || [];
  const uTags = unit.tags || [];
  const allUnitTags = [...uSeries, ...uTags];

  // Check tier2 first (stricter condition, higher buff)
  if (sup.leader2_target) {
    const parts = sup.leader2_target.split(/ and /i).map(p => p.trim()).filter(Boolean);
    const allMatch = parts.every(part => {
      return allUnitTags.some(t => t.includes(part) || part.includes(t));
    });
    if (allMatch) {
      const val = sup.leader2_3 || sup.leader2_2 || sup.leader2_1 || sup.leader2_0 || '';
      return { tier: 2, buff: val };
    }
  }

  // Check tier1 (or-based matching)
  const target = sup.target_series || teamLeaderTag;
  if (!target || target === '-') return null;
  const seriesList = target.split(/(?<![a-zA-Z])or(?![a-zA-Z])/i).map(s => s.trim()).filter(Boolean);
  const match = seriesList.some(ts => allUnitTags.some(ut => ut.includes(ts) || ts.includes(ut)));
  if (match) {
    const val = sup.leader_3 || sup.leader_2 || sup.leader_1 || sup.leader_0 || '';
    return { tier: 1, buff: val };
  }
  return null;
}
