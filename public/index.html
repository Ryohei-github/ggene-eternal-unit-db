<script>
let allUnits = [], allCharas = [], allSupporters = [];
let currentTab = 'unit';
let currentSort = 'atk';
let currentDir = -1;
let currentView = 'card';
let activeTagLookup = '';  // currently selected tag in tag lookup
let allTagData = {};       // {tagName: {units:[], charas:[], total:N}}

// === TEAM SIMULATOR STATE ===
let teamSlots = [
  { unitId: null, charaId: null },
  { unitId: null, charaId: null },
  { unitId: null, charaId: null },
  { unitId: null, charaId: null },
  { unitId: null, charaId: null }
];
let teamSupporterId = null;
let teamLeaderTag = '';
let teamLeaderEffect = '';
let pickerMode = null;  // 'unit' | 'chara' | 'supporter'
let pickerSlotIndex = -1;

async function init() {
  const uResp = await fetch('/units.json');
  const allData = await uResp.json();
  // ユニット: キャラタグを持たないエントリ（MSなど）
  allUnits = allData.filter(u => {
    const tags = u.tags || [];
    if (tags.includes('キャラ')) return false;
    const s = u.normal?.stats;
    return s && (s.hp > 0 || s.attack > 0 || s.defense > 0 || s.en > 0);
  });
  // キャラデータ: タグに「キャラ」を持つエントリ
  allCharas = allData.filter(u => (u.tags || []).includes('キャラ')).map(u => {
    const n = u.normal || {};
    const stats = n.stats || {};
    // スキル: skills配列から取得（SP付き）
    const skills = (n.skills || []).map(sk => ({
      name: sk.name,
      effect: sk.effect || sk.desc || '',
      sp_cost: sk.sp_cost || 0
    }));
    // アビリティ: abilities配列から取得
    const charaAbilities = (n.abilities || []).map(a => ({
      name: a.name, desc: a.desc || a.effect || '', condition: a.condition || ''
    }));
    return {
      id: u.id,
      name: u.name,
      image: u.image,
      rarity: u.rarity,
      chara_type: u.type,
      obtain_method: u.obtain || '',
      series: (u.series || []).join(' / '),
      seriesArr: u.series || [],
      tags: (u.tags || []).filter(t => t !== 'キャラ'),
      stats: {
        combat_power: n.combat_power || 0,
        shooting: stats.shooting || 0,
        melee: stats.melee || 0,
        awakening: stats.awakening || 0,
        defense: stats.defense || 0,
        reaction: stats.reaction || 0,
        sp: stats.sp || 0
      },
      skills: skills,
      abilities: charaAbilities
    };
  });
  allSupporters = [];

  document.getElementById('unitTabCount').textContent = `(${allUnits.length})`;
  document.getElementById('charaTabCount').textContent = `(${allCharas.length})`;

  buildTagData();
  setupTabs();
  setupViewToggle();
  buildFilters();

  // Restore state from URL params (if any)
  if (!restoreFromURL()) {
    render();
  }

  // Check for team data in URL params
  if (loadTeamFromURL()) {
    document.querySelector('.tab-btn[data-tab="team"]').click();
  }
}

function setupTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentTab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const isTagLookup = currentTab === 'taglookup';
      const isTeam = currentTab === 'team';
      const isSpecial = isTagLookup || isTeam;
      document.querySelector('.controls').style.display = isSpecial ? 'none' : '';
      document.getElementById('mainGrid').style.display = isSpecial ? 'none' : '';
      document.getElementById('tableWrap').style.display = isSpecial ? 'none' : (currentView === 'table' ? '' : 'none');
      document.getElementById('tagLookupContainer').style.display = isTagLookup ? '' : 'none';
      document.getElementById('teamSimContainer').style.display = isTeam ? '' : 'none';
      if (isTagLookup) {
        renderTagLookup();
      } else if (isTeam) {
        renderTeamSim();
      } else {
        resetFilters();
        buildFilters();
        updateUI();
        render();
      }
      syncURL();
    });
  });
}

function setupViewToggle() {
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentView = btn.dataset.view;
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
      syncURL();
    });
  });
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterTypeButtons').innerHTML = '';
  document.getElementById('filterSeries').innerHTML = '<option value="">すべて</option>';
  document.getElementById('filterTag').innerHTML = '<option value="">すべて</option>';
  document.getElementById('filterTerrain').value = '';
  document.getElementById('filterRarityButtons').innerHTML = '';
  document.getElementById('filterCharaType').innerHTML = '<option value="">すべて</option>';
  document.getElementById('filterTarget').innerHTML = '<option value="">すべて</option>';
  activeDebuffKey = '';
  activeSpecialKey = '';
  debuffMinRate = 0;
  document.getElementById('debuffRateWrap').style.display = 'none';
  document.getElementById('debuffMinRate').innerHTML = '<option value="">すべて</option>';
  document.querySelectorAll('#debuffCategoryButtons .filter-btn, #specialEffectButtons .filter-btn').forEach(b => b.classList.remove('active'));
}

function updateUI() {
  const isUnit = currentTab === 'unit';
  if (currentTab === 'taglookup' || currentTab === 'team') return;
  const isChara = currentTab === 'chara';
  const isSupporter = currentTab === 'supporter';

  const placeholders = {
    unit: 'ユニット名・武装名・武装効果で検索...',
    chara: 'キャラ名・スキル名・アビリティで検索...',
    supporter: 'サポーター名で検索...（例: ブライト、ホワイトベース）'
  };
  document.getElementById('searchInput').placeholder = placeholders[currentTab];

  document.getElementById('filterTypeGroup').style.display = isUnit ? '' : 'none';
  document.getElementById('filterSeriesGroup').style.display = isUnit || isChara ? '' : 'none';
  document.getElementById('filterTagGroup').style.display = (isUnit || isChara) ? '' : 'none';
  document.getElementById('filterTerrainGroup').style.display = isUnit ? '' : 'none';
  document.getElementById('filterDebuffGroup').style.display = isUnit ? '' : 'none';
  document.getElementById('filterRarityGroup').style.display = '';
  document.getElementById('filterCharaTypeGroup').style.display = isChara ? '' : 'none';
  document.getElementById('filterTargetGroup').style.display = isSupporter ? '' : 'none';

  const sortContainer = document.getElementById('sortBtns');
  if (isUnit) {
    sortContainer.innerHTML = `
      <button class="sort-btn active" data-sort="cp">戦闘力順</button>
      <button class="sort-btn" data-sort="atk">攻撃力順</button>
      <button class="sort-btn" data-sort="hp">HP順</button>
      <button class="sort-btn" data-sort="def">防御力順</button>
      <button class="sort-btn" data-sort="en">EN順</button>
      <button class="sort-btn" data-sort="agi">機動力順</button>
      <button class="sort-btn" data-sort="name">名前順</button>`;
    currentSort = 'cp'; currentDir = -1;
  } else if (isChara) {
    sortContainer.innerHTML = `
      <button class="sort-btn active" data-sort="cp">戦闘力順</button>
      <button class="sort-btn" data-sort="shoot">射撃値順</button>
      <button class="sort-btn" data-sort="melee">格闘値順</button>
      <button class="sort-btn" data-sort="awaken">覚醒値順</button>
      <button class="sort-btn" data-sort="react">反応値順</button>
      <button class="sort-btn" data-sort="name">名前順</button>`;
    currentSort = 'cp'; currentDir = -1;
  } else {
    sortContainer.innerHTML = `
      <button class="sort-btn active" data-sort="hp">HP順</button>
      <button class="sort-btn" data-sort="atk">攻撃力順</button>
      <button class="sort-btn" data-sort="name">名前順</button>`;
    currentSort = 'hp'; currentDir = -1;
  }
  bindSortButtons();
}

function bindSortButtons() {
  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const sort = btn.dataset.sort;
      if (currentSort === sort) currentDir *= -1;
      else { currentSort = sort; currentDir = sort === 'name' ? 1 : -1; }
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });
}

function buildFilters() {
  if (currentTab === 'unit') {
    const types = new Set(), series = new Set(), tags = new Set(), rarities = new Set();
    allUnits.forEach(u => {
      if (u.type) types.add(u.type);
      if (u.rarity) rarities.add(u.rarity);
      (u.series||[]).forEach(s => series.add(s));
      (u.tags||[]).forEach(t => tags.add(t));
    });
    // Type buttons
    const typeOrder = ['攻撃','耐久','支援','射撃','格闘','覚醒'];
    const typeBtns = typeOrder.filter(t => types.has(t)).map(t => {
      const icon = TYPE_ICON_MAP[t] ? `<img src="${TYPE_ICON_MAP[t]}" alt="${t}">` : '';
      return `<button class="filter-btn" data-value="${t}">${icon}${t}</button>`;
    }).join('');
    document.getElementById('filterTypeButtons').innerHTML = typeBtns;
    document.querySelectorAll('#filterTypeButtons .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => { btn.classList.toggle('active'); render(); });
    });
    // Rarity buttons
    const rarityOrder = ['UR','ULT','SSR','SR','R','N'];
    const rarBtns = rarityOrder.filter(r => rarities.has(r)).map(r =>
      `<button class="filter-btn filter-btn-${r.toLowerCase()}" data-value="${r}">${r}</button>`
    ).join('');
    document.getElementById('filterRarityButtons').innerHTML = rarBtns;
    document.querySelectorAll('#filterRarityButtons .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => { btn.classList.toggle('active'); render(); });
    });
    fillSelect('filterSeries', [...series].sort());
    fillSelect('filterTag', [...tags].sort());
    // Debuff category buttons
    const debuffBtns = DEBUFF_CATEGORIES.map(d =>
      `<button class="filter-btn" data-debuff="${d.key}">${d.label}</button>`
    ).join('');
    document.getElementById('debuffCategoryButtons').innerHTML = debuffBtns;
    document.querySelectorAll('#debuffCategoryButtons .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.debuff;
        if (activeDebuffKey === key) {
          activeDebuffKey = ''; btn.classList.remove('active');
          document.getElementById('debuffRateWrap').style.display = 'none';
          debuffMinRate = 0;
        } else {
          activeDebuffKey = key; activeSpecialKey = '';
          document.querySelectorAll('#debuffCategoryButtons .filter-btn, #specialEffectButtons .filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const cat = DEBUFF_CATEGORIES.find(d => d.key === key);
          const rateSel = document.getElementById('debuffMinRate');
          rateSel.innerHTML = '<option value="">すべて</option>';
          (cat.rates||[]).forEach(r => { const op = document.createElement('option'); op.value = r; op.textContent = r + '%以上'; rateSel.appendChild(op); });
          document.getElementById('debuffRateWrap').style.display = '';
          debuffMinRate = 0;
        }
        render();
      });
    });
    // Special effect buttons
    const specBtns = SPECIAL_EFFECTS.map(s =>
      `<button class="filter-btn" data-special="${s.key}">${s.label}</button>`
    ).join('');
    document.getElementById('specialEffectButtons').innerHTML = specBtns;
    document.querySelectorAll('#specialEffectButtons .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.special;
        if (activeSpecialKey === key) {
          activeSpecialKey = ''; btn.classList.remove('active');
        } else {
          activeSpecialKey = key; activeDebuffKey = ''; debuffMinRate = 0;
          document.querySelectorAll('#debuffCategoryButtons .filter-btn, #specialEffectButtons .filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('debuffRateWrap').style.display = 'none';
        }
        render();
      });
    });
    document.getElementById('debuffMinRate').addEventListener('change', (e) => {
      debuffMinRate = parseInt(e.target.value) || 0;
      render();
    });
  } else if (currentTab === 'chara') {
    const rarities = new Set(), types = new Set(), series = new Set(), tags = new Set();
    allCharas.forEach(c => {
      if (c.rarity) rarities.add(c.rarity);
      if (c.chara_type) types.add(c.chara_type);
      if (c.series) series.add(c.series);
      (c.tags||[]).forEach(t => tags.add(t));
    });
    // Type buttons for chara
    const charaTypeOrder = ['攻撃','支援','耐久'];
    const ctBtns = charaTypeOrder.filter(t => types.has(t)).map(t => {
      const icon = TYPE_ICON_MAP[t] ? `<img src="${TYPE_ICON_MAP[t]}" alt="${t}">` : '';
      return `<button class="filter-btn" data-value="${t}">${icon}${t}</button>`;
    }).join('');
    document.getElementById('filterCharaType').parentElement.innerHTML = '<label>タイプ</label><div class="filter-btn-group" id="charaTypeButtons">' + ctBtns + '</div>';
    document.querySelectorAll('#charaTypeButtons .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => { btn.classList.toggle('active'); render(); });
    });
    const rarityOrder = ['UR','ULT','SSR','SR','R','N'];
    const rarBtns = rarityOrder.filter(r => rarities.has(r)).map(r =>
      `<button class="filter-btn filter-btn-${r.toLowerCase()}" data-value="${r}">${r}</button>`
    ).join('');
    document.getElementById('filterRarityButtons').innerHTML = rarBtns;
    document.querySelectorAll('#filterRarityButtons .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => { btn.classList.toggle('active'); render(); });
    });
    fillSelect('filterSeries', [...series].sort());
    // Show tag filter for chara too
    document.getElementById('filterTagGroup').style.display = '';
    fillSelect('filterTag', [...tags].sort());
  } else {
    const rarities = new Set(), targets = new Set();
    allSupporters.forEach(s => {
      if (s.rarity) rarities.add(s.rarity);
      if (s.target_series) targets.add(s.target_series);
    });
    const rarityOrder = ['UR','ULT','SSR','SR','R','N'];
    const rarBtns = rarityOrder.filter(r => rarities.has(r)).map(r =>
      `<button class="filter-btn filter-btn-${r.toLowerCase()}" data-value="${r}">${r}</button>`
    ).join('');
    document.getElementById('filterRarityButtons').innerHTML = rarBtns;
    document.querySelectorAll('#filterRarityButtons .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => { btn.classList.toggle('active'); render(); });
    });
    fillSelect('filterTarget', [...targets].sort());
  }
}

function fillSelect(id, opts) {
  const sel = document.getElementById(id);
  opts.forEach(o => { const op = document.createElement('option'); op.value = o; op.textContent = o; sel.appendChild(op); });
}

function getData() {
  if (currentTab === 'unit') return allUnits;
  if (currentTab === 'chara') return allCharas;
  return allSupporters;
}

function getActiveTypes() {
  return [...document.querySelectorAll('#filterTypeButtons .filter-btn.active')].map(b => b.dataset.value);
}
function getActiveRarities() {
  return [...document.querySelectorAll('#filterRarityButtons .filter-btn.active')].map(b => b.dataset.value);
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const data = getData();
  const activeRarities = getActiveRarities();

  if (currentTab === 'unit') {
    const activeTypes = getActiveTypes();
    const series = document.getElementById('filterSeries').value;
    const tag = document.getElementById('filterTag').value;
    const terrain = document.getElementById('filterTerrain').value;
    return data.filter(u => {
      if (q) {
        const nameMatch = u.name.toLowerCase().includes(q);
        const weaponMatch = (u.normal_weapons||[]).concat(u.transformed_weapons||[]).some(w =>
          (w.name||'').toLowerCase().includes(q) || (w.effect||'').toLowerCase().includes(q)
        );
        if (!nameMatch && !weaponMatch) return false;
      }
      if (activeTypes.length > 0 && !activeTypes.includes(u.type)) return false;
      if (activeRarities.length > 0 && !activeRarities.includes(u.rarity)) return false;
      if (series && !(u.series||[]).includes(series)) return false;
      if (tag && !(u.tags||[]).includes(tag)) return false;
      if (terrain && (!u.normal?.terrain || u.normal.terrain[terrain] !== '◯')) return false;
      // Debuff category filter with min rate
      if (activeDebuffKey) {
        const cat = DEBUFF_CATEGORIES.find(d => d.key === activeDebuffKey);
        if (cat) {
          const allWeapons = (u.normal_weapons||[]).concat(u.transformed_weapons||[]);
          const hasDebuff = allWeapons.some(w => {
            const eff = w.effect || '';
            if (!cat.pattern.test(eff)) return false;
            if (debuffMinRate > 0) {
              const maxRate = getMaxDebuffRate(eff, cat.pattern);
              return maxRate >= debuffMinRate;
            }
            return true;
          });
          if (!hasDebuff) return false;
        }
      }
      // Special effect filter
      if (activeSpecialKey) {
        const spec = SPECIAL_EFFECTS.find(s => s.key === activeSpecialKey);
        if (spec) {
          const allWeapons = (u.normal_weapons||[]).concat(u.transformed_weapons||[]);
          const hasEffect = allWeapons.some(w => spec.pattern.test(w.effect||''));
          if (!hasEffect) return false;
        }
      }
      return true;
    });
  } else if (currentTab === 'chara') {
    const activeCharaTypes = [...document.querySelectorAll('#charaTypeButtons .filter-btn.active')].map(b => b.dataset.value);
    const series = document.getElementById('filterSeries').value;
    const tag = document.getElementById('filterTag').value;
    return data.filter(c => {
      if (q) {
        const nameMatch = c.name.toLowerCase().includes(q);
        const skillMatch = (c.skills||[]).some(sk => (sk.name||'').toLowerCase().includes(q) || (sk.effect||'').toLowerCase().includes(q));
        const abilMatch = (c.abilities||[]).some(a => (a.name||'').toLowerCase().includes(q) || (a.desc||'').toLowerCase().includes(q));
        if (!nameMatch && !skillMatch && !abilMatch) return false;
      }
      if (activeRarities.length > 0 && !activeRarities.includes(c.rarity)) return false;
      if (activeCharaTypes.length > 0 && !activeCharaTypes.includes(c.chara_type)) return false;
      if (series && c.series !== series) return false;
      if (tag && !(c.tags||[]).includes(tag)) return false;
      return true;
    });
  } else {
    const target = document.getElementById('filterTarget').value;
    return data.filter(s => {
      if (q && !s.name.toLowerCase().includes(q)) return false;
      if (activeRarities.length > 0 && !activeRarities.includes(s.rarity)) return false;
      if (target && s.target_series !== target) return false;
      return true;
    });
  }
}

function sortItems(items) {
  const dir = currentDir;
  const isChara = currentTab === 'chara';
  return [...items].sort((a, b) => {
    let va, vb;
    switch(currentSort) {
      case 'cp':
        if (isChara) { va = parseInt(a.stats?.combat_power)||0; vb = parseInt(b.stats?.combat_power)||0; }
        else { va = parseInt(a.normal?.combat_power)||0; vb = parseInt(b.normal?.combat_power)||0; }
        break;
      case 'atk':
        if (isChara) { va = parseInt(a.stats?.shooting)||0; vb = parseInt(b.stats?.shooting)||0; }
        else { va = parseInt(a.normal?.stats?.attack)||0; vb = parseInt(b.normal?.stats?.attack)||0; }
        break;
      case 'hp':
        if (isChara) { va = parseInt(a.stats?.defense)||0; vb = parseInt(b.stats?.defense)||0; }
        else { va = parseInt(a.normal?.stats?.hp)||0; vb = parseInt(b.normal?.stats?.hp)||0; }
        break;
      case 'def':
        va = parseInt(a.normal?.stats?.defense)||0; vb = parseInt(b.normal?.stats?.defense)||0; break;
      case 'en':
        va = parseInt(a.normal?.stats?.en)||0; vb = parseInt(b.normal?.stats?.en)||0; break;
      case 'agi':
        va = parseInt(a.normal?.stats?.agility)||0; vb = parseInt(b.normal?.stats?.agility)||0; break;
      case 'shoot':
        va = parseInt(a.stats?.shooting)||0; vb = parseInt(b.stats?.shooting)||0; break;
      case 'react':
        va = parseInt(a.stats?.reaction)||0; vb = parseInt(b.stats?.reaction)||0; break;
      case 'melee':
        va = parseInt(a.stats?.melee)||0; vb = parseInt(b.stats?.melee)||0; break;
      case 'awaken':
        va = parseInt(a.stats?.awakening)||0; vb = parseInt(b.stats?.awakening)||0; break;
      case 'name': return dir * a.name.localeCompare(b.name, 'ja');
    }
    return dir * (va - vb);
  });
}

function render() {
  const filtered = sortItems(getFiltered());
  const data = getData();
  const labels = { unit: 'ユニット', chara: 'キャラ', supporter: 'サポーター' };
  document.getElementById('resultCount').textContent = `${filtered.length} / ${data.length} ${labels[currentTab]}`;
  const grid = document.getElementById('mainGrid');
  const tableWrap = document.getElementById('tableWrap');

  if (currentView === 'card') {
    grid.style.display = '';
    tableWrap.style.display = 'none';
    if (currentTab === 'unit') {
      grid.innerHTML = filtered.map(u => unitCardHTML(u)).join('');
    } else if (currentTab === 'chara') {
      grid.innerHTML = filtered.map(c => charaCardHTML(c)).join('');
    } else {
      grid.innerHTML = filtered.map(s => supporterCardHTML(s)).join('');
    }
  } else {
    grid.style.display = 'none';
    tableWrap.style.display = '';
    if (currentTab === 'unit') {

    } else if (currentTab === 'chara') {

    } else {

    }
  }
  syncURL();
  updateClearButton();
}

function getMaxDebuffRate(effectText, pattern) {
  const m = effectText.match(pattern);
  if (!m) return 0;
  const base = parseInt(m[2] || m[1]) || 0;
  const bonusMatch = effectText.match(/さらに[^\d]*(\d+)%/);
  return base + (bonusMatch ? parseInt(bonusMatch[1]) : 0);
}

// === UNIT DETAIL (with transform toggle) ===
function showUnitDetail(id) {
  const u = allUnits.find(x => x.id === id);
  if (!u) return;
  window._currentDetailUnit = u;
  window._currentDetailForm = 'base';
  renderUnitDetail(u, 'base');
  openModal();
}

function renderUnitDetail(u, form) {
  const isTransform = form === 'transform' && u.transformed;
  const formData = isTransform ? u.transformed : (u.normal || {});
  const s = formData.stats || {};
  const t = formData.terrain || {};
  const weapons = isTransform ? (u.transformed_weapons || []) : (u.normal_weapons || []);

  let transformToggle = '';
  if (u.transformed) {
    transformToggle = `<div class="transform-toggle">
      <button class="transform-btn ${form==='base'?'active':''}" onclick="switchForm('base')">通常形態</button>
      <button class="transform-btn ${form==='transform'?'active':''}" onclick="switchForm('transform')">変形後</button>
    </div>`;
  }

  const weaponsHTML = weapons.map(w => {
    const isMap = w.range === 'MAP';
    const isEx = w.name.includes('EX');
    return `
    <div class="weapon-detail">
      <div class="weapon-name">${isMap?`<span class="map-badge"><img src="${MAP_WEAPON_ICON}" class="map-icon" alt="MAP">MAP兵器</span>`:''}${w.name}${isEx?'<span class="ex-badge">EX</span>':''}</div>
      <div class="weapon-info">
        <div><span>属性:</span> <strong>${w.attribute||'-'}</strong></div>
        <div><span>射程:</span> <strong>${rangeDisplay(w)}</strong></div>
        <div><span>威力:</span> <strong>${w.power||'-'}</strong></div>
        <div><span>EN:</span> <strong>${w.en||'-'}</strong></div>
        <div><span>命中:</span> <strong>${w.hit||'-'}</strong></div>
        <div><span>クリ:</span> <strong>${w.critical||'-'}</strong></div>
        ${isMap ? `<div><span>使用回数:</span> <strong>${w.ammo && w.ammo !== '-' ? w.ammo + '回' : '-'}</strong></div>` : ''}
      </div>
      ${w.weapon_type ? `<div class="weapon-effect">タイプ: ${w.weapon_type}</div>` : ''}
      ${(() => { let eff = w.effect || ''; eff = eff.replace(/\s*\[添付\]/g, '').trim(); return eff && eff !== 'なし' ? `<div class="weapon-effect">効果: ${eff}</div>` : ''; })()}
      ${w.restriction && w.restriction !== 'なし' ? `<div class="weapon-effect">制限: ${w.restriction}</div>` : ''}
    </div>
  `}).join('');

  const allAbilities = formData.abilities||[];
  let mechText = formData.mechanism || '';

  // If mechanism is empty, try to use シールド防御 ability as mechanism
  if (!mechText) {
    const shieldAbility = allAbilities.find(a => a.name === 'シールド防御');
    if (shieldAbility) mechText = shieldAbility.desc || '';
  }

  // Filter: remove 強い点/弱い点, weapons (desc starts with digit = range data), character data (name contains 戦闘力), スキル, シールド防御
  const pureAbilities = allAbilities.filter(a => {
    if (a.name === '強い点' || a.name === '弱い点') return false;
    if (a.name === 'スキル') return false;
    if (a.name === 'シールド防御') return false;
    if (/戦闘力/.test(a.name)) return false;
    if (/^\d/.test(a.desc||'')) return false;
    return true;
  });

  // Extract skill entry and parse concatenated skills
  const skillEntry = allAbilities.find(a => a.name === 'スキル');
  let skillsHTML = '';
  if (skillEntry && skillEntry.desc) {
    const skillRegex = /([\u3000-\u9fff\u30a0-\u30ff\uff00-\uffefA-Za-z\u30fb\-\u30fc\uff08\uff09]+Lv\d+)\(SP:(\d+)\)/g;
    const anchors = [];
    let m;
    while ((m = skillRegex.exec(skillEntry.desc)) !== null) {
      anchors.push({name: m[1], sp: m[2], start: m.index, end: m.index + m[0].length});

function filterByTag(tagName) {
  // If in tag lookup, activate that tag
  if (currentTab === 'taglookup') {
    activeTagLookup = tagName;
    renderTagLookup();
    return;
  }
  // Check if the tag exists in current tab's data
  const currentData = getData();
  const tagInCurrentTab = currentData.some(item => {
    if (currentTab === 'unit') return (item.tags||[]).includes(tagName);
    if (currentTab === 'chara') return (item.tags||[]).includes(tagName);
    return false;
  });
  // If tag doesn't exist in current tab, switch to the one that has it, or go to tag lookup
  if (!tagInCurrentTab) {
    // Check if tag exists in units
    const inUnits = allUnits.some(u => (u.tags||[]).includes(tagName));
    const inCharas = allCharas.some(c => (c.tags||[]).includes(tagName));
    if (inUnits && inCharas) {
      // Both have it — go to tag lookup for cross-category view
      activeTagLookup = tagName;
      document.querySelector('.tab-btn[data-tab="taglookup"]').click();
      return;
    } else if (inUnits) {
      document.querySelector('.tab-btn[data-tab="unit"]').click();
    } else if (inCharas) {
      document.querySelector('.tab-btn[data-tab="chara"]').click();
    }
  }
  const sel = document.getElementById('filterTag');
  for (let i = 0; i < sel.options.length; i++) {
    if (sel.options[i].value === tagName) { sel.value = tagName; render(); return; }
  }
  const opt = document.createElement('option');
  opt.value = tagName; opt.textContent = tagName;
  sel.appendChild(opt);
  sel.value = tagName;
  render();
}

// === TAG LOOKUP SYSTEM ===
function buildTagData() {
  allTagData = {};
  // Collect tags from units
  allUnits.forEach(u => {
    (u.tags||[]).forEach(t => {
      if (!allTagData[t]) allTagData[t] = {units:[], charas:[], total:0};
      allTagData[t].units.push(u);
    });
    // Also index series as tags
    (u.series||[]).forEach(s => {
      const key = '📺 ' + s;
      if (!allTagData[key]) allTagData[key] = {units:[], charas:[], total:0};
      allTagData[key].units.push(u);
    });
  });
  // Collect tags from characters
  allCharas.forEach(c => {
    (c.tags||[]).forEach(t => {
      if (!allTagData[t]) allTagData[t] = {units:[], charas:[], total:0};
      allTagData[t].charas.push(c);
    });
    (c.seriesArr||[]).forEach(s => {
      const key = '📺 ' + s;
      if (!allTagData[key]) allTagData[key] = {units:[], charas:[], total:0};
      allTagData[key].charas.push(c);
    });
  });
  Object.values(allTagData).forEach(v => v.total = v.units.length + v.charas.length);
}

function renderTagLookup() {
  const searchQ = (document.getElementById('tagSearchInput')?.value || '').toLowerCase();
  const container = document.getElementById('tagSections');
  const resultsDiv = document.getElementById('tagResults');

  // Group tags into categories
  const seriesTags = [], factionTags = [], roleTags = [], otherTags = [];
  const factionKeywords = ['軍','ジオン','連邦','エゥーゴ','ティターンズ','ザフト','オーブ','連合','ネオ','アクシズ','マフティー','三隻同盟','学園','SDガンダム'];
  const roleKeywords = ['主人公','ライバル','リーダー','ルーキー','ベテラン','ニュータイプ','パイロット','民間人','軍人','マスク','身体強化','コーディネイター'];

  Object.keys(allTagData).forEach(tag => {
    if (searchQ && !tag.toLowerCase().includes(searchQ)) return;
    const d = allTagData[tag];
    if (d.total === 0) return;
    if (tag.startsWith('📺 ')) { seriesTags.push(tag); return; }
    if (factionKeywords.some(k => tag.includes(k))) { factionTags.push(tag); return; }
    if (roleKeywords.some(k => tag.includes(k))) { roleTags.push(tag); return; }
    otherTags.push(tag);
  });

  const sortByTotal = (a,b) => allTagData[b].total - allTagData[a].total;
  seriesTags.sort(sortByTotal); factionTags.sort(sortByTotal); roleTags.sort(sortByTotal); otherTags.sort(sortByTotal);

  function chipHTML(tag) {
    const d = allTagData[tag];
    const active = activeTagLookup === tag ? ' active' : '';
    const label = tag.startsWith('📺 ') ? tag.slice(3) : tag;
    const counts = [];
    if (d.units.length) counts.push(`MS:${d.units.length}`);
    if (d.charas.length) counts.push(`キャラ:${d.charas.length}`);
    return `<span class="tag-chip${active}" onclick="selectTagLookup('${tag.replace(/'/g,"\\'")}')">${label} <span class="tag-count">${counts.join(' / ')}</span></span>`;
  }

  function sectionHTML(title, tags) {
    if (!tags.length) return '';
    return `<div class="tag-section"><div class="tag-section-title">${title} (${tags.length})</div><div class="tag-cloud">${tags.map(chipHTML).join('')}</div></div>`;
  }

  container.innerHTML =
    sectionHTML('シリーズ', seriesTags) +
    sectionHTML('所属・勢力', factionTags) +
    sectionHTML('役割・特性', roleTags) +
    sectionHTML('その他', otherTags);

  // Render results if a tag is selected
  if (activeTagLookup && allTagData[activeTagLookup]) {
    const d = allTagData[activeTagLookup];
    const label = activeTagLookup.startsWith('📺 ') ? activeTagLookup.slice(3) : activeTagLookup;
    let html = `<div class="tag-results-header"><span class="tag-results-label">${label}</span> 該当: ユニット${d.units.length}件 / キャラ${d.charas.length}件</div>`;
    if (d.units.length) {
      html += `<div class="tag-results-category">ユニット (${d.units.length})</div>`;
      html += '<div class="grid" role="list">' + d.units.map(u => unitCardHTML(u)).join('') + '</div>';
    }
    if (d.charas.length) {
      html += `<div class="tag-results-category">キャラクター (${d.charas.length})</div>`;
      html += '<div class="grid" role="list">' + d.charas.map(c => charaCardHTML(c)).join('') + '</div>';
    }
    resultsDiv.innerHTML = html;
  } else {
    resultsDiv.innerHTML = '<div style="text-align:center;color:var(--text2);padding:40px 0;font-size:.9em">タグを選択すると、該当するユニットとキャラクターが一覧表示されます</div>';
  }
}

function selectTagLookup(tag) {
  activeTagLookup = activeTagLookup === tag ? '' : tag;
  renderTagLookup();
  syncURL();
  // Scroll to results
  if (activeTagLookup) {
    const el = document.getElementById('tagResults');
    if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
  }
}

    return `<span class="skill-tag" style="font-size:.62em">${short} SP:${sk.sp_cost||'?'}</span>`;
  }).join('');
  const abilHTML = (c.abilities||[]).filter(a => {
    const garbage = ['リセマラ評価','キャラ一覧の関連記事','解放キャラ','スキル','UR','対象ユニット','サポーターの一覧記事','レア度','2×2','SD','支援','攻撃'];
    return !garbage.includes(a.name) && !/^戦闘力[\(（]/.test(a.name) && !/[\(（]SP:\d+[\)）]/.test(a.name);
  }).slice(0, 4).map(a => `<span class="abil-name">${a.name}</span>: ${(a.desc||a.effect||'').substring(0,40)}${(a.desc||a.effect||'').length>40?'...':''}`).join('<br>');

  return `<div class="slot-filled">
    <button class="slot-remove-btn" onclick="removeSlot(${slotIdx},'chara')">✕</button>
    <button class="slot-change-btn" onclick="openTeamPicker('chara',${slotIdx})">変更</button>
    <div class="slot-top-row">
      ${iconHTML}
      <div class="slot-info">
        <div class="slot-name">${c.name}</div>
        <div class="slot-badges">
          <span class="badge ${rarityClass(c.rarity)}" style="font-size:.6em">${c.rarity||'?'}</span>
          ${typeBadgeHTML(c.chara_type)}
        </div>
      </div>
    </div>
    <div class="slot-filled slot-stats">
      <div class="slot-stat"><div class="ss-label">射撃</div><div class="ss-val">${s.shooting||'-'}</div></div>
      <div class="slot-stat"><div class="ss-label">格闘</div><div class="ss-val">${s.melee||'-'}</div></div>
      <div class="slot-stat"><div class="ss-label">覚醒</div><div class="ss-val">${s.awakening||'-'}</div></div>
      <div class="slot-stat"><div class="ss-label">守備</div><div class="ss-val">${s.defense||'-'}</div></div>
      <div class="slot-stat"><div class="ss-label">反応</div><div class="ss-val">${s.reaction||'-'}</div></div>
      <div class="slot-stat"><div class="ss-label">SP</div><div class="ss-val">${s.sp||'-'}</div></div>
    </div>
    ${skillTags ? `<div class="slot-skills">${skillTags}</div>` : ''}
    ${abilHTML ? `<div class="slot-abilities">${abilHTML}</div>` : ''}
  </div>`;
}

function renderTeamSupporter() {

  let pickHTML = '';
  if (chara) {
    const iconHTML = chara.image ? `<img style="width:48px;height:48px;border-radius:6px;border:1px solid var(--border);object-fit:cover" src="${chara.image}" alt="${chara.name}" onerror="this.style.display='none'">` : '';
    pickHTML = `<div style="text-align:center">

        <button class="slot-change-btn" style="position:static" onclick="openTeamPicker('supporter',0)">変更</button>
        <button class="slot-remove-btn" style="position:static" onclick="teamSupporterId=null;renderTeamSim()">✕</button>
      </div>
    </div>`;
  } else {
    pickHTML = `<div class="slot-empty" style="min-height:80px;min-width:120px" onclick="openTeamPicker('supporter',0)">+ サポーター選択</div>`;
  }

    });

        <div style="font-size:.7em;color:var(--text2);margin-bottom:4px">リーダースキル設定 (手動入力)</div>

        </div>
      </div>
      ${matchInfo}
    </div>
  `;

function renderTeamStats() {
  const container = document.getElementById('teamStatsSummary');
  let totalCP = 0, totalHP = 0, totalATK = 0, totalDEF = 0, totalEN = 0, totalAGI = 0;
  const typeCounts = {};
  let filledCount = 0;

  teamSlots.forEach(slot => {
    if (slot.unitId) {
      const u = allUnits.find(x => x.id === slot.unitId);
      if (u) {
        filledCount++;
        const s = u.normal?.stats || {};
        totalCP += parseInt(u.normal?.combat_power) || 0;
        totalHP += parseInt(s.hp) || 0;
        totalATK += parseInt(s.attack) || 0;
        totalDEF += parseInt(s.defense) || 0;
        totalEN += parseInt(s.en) || 0;
        totalAGI += parseInt(s.agility) || 0;
        const t = u.type || '不明';
        typeCounts[t] = (typeCounts[t] || 0) + 1;
      }
    }
  });

  document.getElementById('teamTotalCP').textContent = totalCP.toLocaleString();

  const typeChips = Object.entries(typeCounts).map(([t, count]) => {
    const icon = TYPE_ICON_MAP[t] ? `<img src="${TYPE_ICON_MAP[t]}" alt="${t}">` : '';
    return `<div class="team-type-chip">${icon}${t} x${count}</div>`;
  }).join('');

  container.innerHTML = `
    <h3>部隊ステータス合計 (${filledCount}/5機)</h3>
    <div class="team-stats-grid">
      <div class="team-stat-box"><div class="ts-label">合計戦闘力</div><div class="ts-val" style="color:var(--gold)">${totalCP.toLocaleString()}</div></div>
      <div class="team-stat-box"><div class="ts-label">HP合計</div><div class="ts-val">${totalHP.toLocaleString()}</div></div>
      <div class="team-stat-box"><div class="ts-label">攻撃力合計</div><div class="ts-val">${totalATK.toLocaleString()}</div></div>
      <div class="team-stat-box"><div class="ts-label">防御力合計</div><div class="ts-val">${totalDEF.toLocaleString()}</div></div>
      <div class="team-stat-box"><div class="ts-label">EN合計</div><div class="ts-val">${totalEN.toLocaleString()}</div></div>
      <div class="team-stat-box"><div class="ts-label">機動力合計</div><div class="ts-val">${totalAGI.toLocaleString()}</div></div>
    </div>
    <div style="font-size:.8em;color:var(--text2);margin-bottom:6px">タイプバランス</div>
    <div class="team-type-balance">${typeChips || '<span style="color:var(--text2);font-size:.8em">ユニット未選択</span>'}</div>
  `;
}

function renderSavedTeams() {
  const container = document.getElementById('teamSavedList');

// === PICKER ===
function openTeamPicker(mode, slotIdx) {
  pickerMode = mode;
  pickerSlotIndex = slotIdx;
  const overlay = document.getElementById('teamPickerOverlay');
  const title = document.getElementById('pickerTitle');
  const searchInput = document.getElementById('pickerSearch');
  const filtersDiv = document.getElementById('pickerFilters');
  searchInput.value = '';

  if (mode === 'unit') {
    title.textContent = `ユニット選択 (スロット${slotIdx+1})`;
    const types = ['攻撃','耐久','支援','射撃','格闘','覚醒'];
    filtersDiv.innerHTML = types.map(t => {
      const icon = TYPE_ICON_MAP[t] ? `<img src="${TYPE_ICON_MAP[t]}" style="width:14px;height:14px;vertical-align:middle"> ` : '';
      return `<button class="filter-btn picker-type-btn" data-value="${t}" onclick="this.classList.toggle('active');renderPickerList()">${icon}${t}</button>`;
    }).join('');
  } else if (mode === 'chara') {
    title.textContent = `キャラ選択 (スロット${slotIdx+1})`;
    const types = ['攻撃','支援','耐久'];
    filtersDiv.innerHTML = types.map(t => {
      const icon = TYPE_ICON_MAP[t] ? `<img src="${TYPE_ICON_MAP[t]}" style="width:14px;height:14px;vertical-align:middle"> ` : '';
      return `<button class="filter-btn picker-type-btn" data-value="${t}" onclick="this.classList.toggle('active');renderPickerList()">${icon}${t}</button>`;
    }).join('');
  } else {
    title.textContent = 'サポーター選択';
    filtersDiv.innerHTML = '';
  }

  overlay.classList.add('open');
  renderPickerList();
  searchInput.focus();
  searchInput.addEventListener('input', renderPickerList);
}

function closeTeamPicker() {
  document.getElementById('teamPickerOverlay').classList.remove('open');
}

function renderPickerList() {
  const list = document.getElementById('pickerList');
  const q = (document.getElementById('pickerSearch').value || '').toLowerCase();
  const activeTypes = [...document.querySelectorAll('.picker-type-btn.active')].map(b => b.dataset.value);

  let items = [];
  if (pickerMode === 'unit') {
    items = allUnits.filter(u => {
      if (q && !u.name.toLowerCase().includes(q)) return false;
      if (activeTypes.length && !activeTypes.includes(u.type)) return false;
      return true;
    });
    items.sort((a,b) => (parseInt(b.normal?.combat_power)||0) - (parseInt(a.normal?.combat_power)||0));
    list.innerHTML = items.slice(0, 100).map(u => {
      const s = u.normal?.stats || {};
      const img = u.image ? `<img src="${u.image}" alt="${u.name}" onerror="this.style.display='none'">` : '';
      return `<div class="picker-item" onclick="selectPickerUnit(${u.id})">
        ${img}
        <div class="picker-item-info">
          <div class="picker-item-name">${u.name}</div>
          <div class="picker-item-sub"><span class="badge ${rarityClass(u.rarity)}" style="font-size:.6em;padding:1px 4px">${u.rarity}</span> ${typeBadgeHTML(u.type)} CP:${(u.normal?.combat_power||0).toLocaleString()} ATK:${(parseInt(s.attack)||0).toLocaleString()}</div>
        </div>
      </div>`;
    }).join('');
  } else if (pickerMode === 'chara') {
    items = allCharas.filter(c => {
      if (q && !c.name.toLowerCase().includes(q)) return false;
      if (activeTypes.length && !activeTypes.includes(c.chara_type)) return false;
      return true;
    });
    items.sort((a,b) => (parseInt(b.stats?.combat_power)||0) - (parseInt(a.stats?.combat_power)||0));
    list.innerHTML = items.slice(0, 100).map(c => {
      const s = c.stats || {};
      const img = c.image ? `<img src="${c.image}" alt="${c.name}" onerror="this.style.display='none'">` : '';
      return `<div class="picker-item" onclick="selectPickerChara(${c.id})">
        ${img}
        <div class="picker-item-info">
          <div class="picker-item-name">${c.name}</div>
          <div class="picker-item-sub"><span class="badge ${rarityClass(c.rarity)}" style="font-size:.6em;padding:1px 4px">${c.rarity}</span> ${typeBadgeHTML(c.chara_type)} 射:${s.shooting||'-'} 格:${s.melee||'-'} 覚:${s.awakening||'-'}</div>
        </div>
      </div>`;
    }).join('');
  } else {
    items = allCharas.filter(c => {
      if (q && !c.name.toLowerCase().includes(q)) return false;
      return true;
    });
    items.sort((a,b) => (parseInt(b.stats?.combat_power)||0) - (parseInt(a.stats?.combat_power)||0));
    list.innerHTML = items.slice(0, 100).map(c => {
      const img = c.image ? `<img src="${c.image}" alt="${c.name}" onerror="this.style.display='none'">` : '';
      return `<div class="picker-item" onclick="selectPickerSupporter(${c.id})">
        ${img}
        <div class="picker-item-info">
          <div class="picker-item-name">${c.name}</div>
          <div class="picker-item-sub"><span class="badge ${rarityClass(c.rarity)}" style="font-size:.6em;padding:1px 4px">${c.rarity}</span> ${c.series||''}</div>
        </div>
      </div>`;
    }).join('');
  }

  if (!list.innerHTML) list.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text2)">該当なし</div>';
}

function selectPickerUnit(id) {
  teamSlots[pickerSlotIndex].unitId = id;
  closeTeamPicker();
  renderTeamSim();
}
function selectPickerChara(id) {
  teamSlots[pickerSlotIndex].charaId = id;
  closeTeamPicker();
  renderTeamSim();
}
function selectPickerSupporter(id) {
  teamSupporterId = id;
  closeTeamPicker();
  renderTeamSim();
}

function removeSlot(idx, type) {
  if (type === 'unit') teamSlots[idx].unitId = null;
  else teamSlots[idx].charaId = null;
  renderTeamSim();
}

function clearTeam() {
  teamSlots = teamSlots.map(() => ({ unitId: null, charaId: null }));
  teamSupporterId = null;
  teamLeaderTag = '';
  teamLeaderEffect = '';
  document.getElementById('teamNameInput').value = 'My Team';
  renderTeamSim();
}

// === SAVE / LOAD / SHARE ===
function saveTeam() {
  const name = document.getElementById('teamNameInput').value || 'My Team';
  let totalCP = 0;
  teamSlots.forEach(slot => {
    if (slot.unitId) {
      const u = allUnits.find(x => x.id === slot.unitId);
      if (u) totalCP += parseInt(u.normal?.combat_power) || 0;
    }
  });
  const data = {
    name, totalCP,
    slots: teamSlots.map(s => ({ u: s.unitId, c: s.charaId })),
    supporter: teamSupporterId,
    leaderTag: teamLeaderTag,
    leaderEffect: teamLeaderEffect
  };
  let saved = [];
  try { saved = JSON.parse(localStorage.getItem('ggene_saved_teams') || '[]'); } catch(e) {}
  saved.push(data);
  localStorage.setItem('ggene_saved_teams', JSON.stringify(saved));
  renderSavedTeams();
  showToast('編成を保存しました');
}

function loadSavedTeam(idx) {
  let saved = [];
  try { saved = JSON.parse(localStorage.getItem('ggene_saved_teams') || '[]'); } catch(e) {}
  const data = saved[idx];
  if (!data) return;
  document.getElementById('teamNameInput').value = data.name || 'My Team';
  teamSlots = (data.slots || []).map(s => ({ unitId: s.u || null, charaId: s.c || null }));
  while (teamSlots.length < 5) teamSlots.push({ unitId: null, charaId: null });
  teamSupporterId = data.supporter || null;
  teamLeaderTag = data.leaderTag || '';
  teamLeaderEffect = data.leaderEffect || '';
  renderTeamSim();
  showToast(`「${data.name}」を読み込みました`);
}

function deleteSavedTeam(idx) {
  let saved = [];
  try { saved = JSON.parse(localStorage.getItem('ggene_saved_teams') || '[]'); } catch(e) {}
  saved.splice(idx, 1);
  localStorage.setItem('ggene_saved_teams', JSON.stringify(saved));
  renderSavedTeams();
}

function shareTeamURL() {
  const name = document.getElementById('teamNameInput').value || '';
  const parts = teamSlots.map(s => `${s.unitId||0},${s.charaId||0}`);
  const params = new URLSearchParams();
  params.set('team', parts.join('|'));
  if (teamSupporterId) params.set('sup', teamSupporterId);
  if (name) params.set('tn', name);
  if (teamLeaderTag) params.set('lt', teamLeaderTag);
  if (teamLeaderEffect) params.set('le', teamLeaderEffect);
  const url = window.location.origin + window.location.pathname + '?' + params.toString();
  navigator.clipboard.writeText(url).then(() => {
    showToast('URLをコピーしました');
  }).catch(() => {
    prompt('以下のURLをコピーしてください:', url);
  });
}

function loadTeamFromURL() {
  const params = new URLSearchParams(window.location.search);
  const teamStr = params.get('team');
  if (!teamStr) return false;
  const parts = teamStr.split('|');
  teamSlots = parts.map(p => {
    const [u, c] = p.split(',').map(Number);
    return { unitId: u || null, charaId: c || null };
  });
  while (teamSlots.length < 5) teamSlots.push({ unitId: null, charaId: null });
  teamSupporterId = parseInt(params.get('sup')) || null;
  document.getElementById('teamNameInput').value = params.get('tn') || 'Shared Team';
  teamLeaderTag = params.get('lt') || '';
  teamLeaderEffect = params.get('le') || '';
  return true;
}

function showToast(msg) {
  const toast = document.getElementById('teamToast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// === URL STATE SYNC ===
function syncURL() {
  const params = new URLSearchParams();

  // Tab
  if (currentTab !== 'unit') params.set('tab', currentTab);

  // Team tab has its own params — don't mix
  if (currentTab === 'team') {
    // Keep existing team params if any
    const existing = new URLSearchParams(window.location.search);
    ['team','sup','tn','lt','le'].forEach(k => { if (existing.get(k)) params.set(k, existing.get(k)); });
    history.replaceState(null, '', params.toString() ? '?' + params.toString() : window.location.pathname);
    return;
  }

  // Tag lookup — always early-return (don't read filter DOM)
  if (currentTab === 'taglookup') {
    if (activeTagLookup) params.set('ltag', activeTagLookup);
    const tagQ = document.getElementById('tagSearchInput')?.value || '';
    if (tagQ) params.set('tq', tagQ);
    history.replaceState(null, '', params.toString() ? '?' + params.toString() : window.location.pathname);
    return;
  }

  // Search
  const q = document.getElementById('searchInput')?.value || '';
  if (q) params.set('q', q);

  // View mode
  if (currentView !== 'card') params.set('view', currentView);

  // Sort
  if (currentSort !== 'atk') params.set('sort', currentSort);
  if (currentDir !== -1) params.set('dir', currentDir > 0 ? 'asc' : 'desc');

  // Rarity filter
  const activeRarities = [...document.querySelectorAll('#filterRarityButtons .filter-btn.active')].map(b => b.dataset.value);
  if (activeRarities.length) params.set('rarity', activeRarities.join(','));

  if (currentTab === 'unit') {
    const activeTypes = [...document.querySelectorAll('#filterTypeButtons .filter-btn.active')].map(b => b.dataset.value);
    if (activeTypes.length) params.set('type', activeTypes.join(','));
    const series = document.getElementById('filterSeries')?.value || '';
    if (series) params.set('series', series);
    const tag = document.getElementById('filterTag')?.value || '';
    if (tag) params.set('tag', tag);
    const terrain = document.getElementById('filterTerrain')?.value || '';
    if (terrain) params.set('terrain', terrain);
    if (activeDebuffKey) params.set('debuff', activeDebuffKey);
    if (debuffMinRate > 0) params.set('drate', debuffMinRate);
    if (activeSpecialKey) params.set('special', activeSpecialKey);
  } else if (currentTab === 'chara') {
    const activeCharaTypes = [...document.querySelectorAll('#charaTypeButtons .filter-btn.active')].map(b => b.dataset.value);
    if (activeCharaTypes.length) params.set('ctype', activeCharaTypes.join(','));
    const series = document.getElementById('filterSeries')?.value || '';
    if (series) params.set('series', series);
    const tag = document.getElementById('filterTag')?.value || '';
    if (tag) params.set('tag', tag);
  }

  const url = params.toString() ? '?' + params.toString() : window.location.pathname;
  history.replaceState(null, '', url);
}

function restoreFromURL() {
  const params = new URLSearchParams(window.location.search);
  if (!params.toString()) return false;

  // Team tab handled separately
  if (params.get('team')) return false; // let loadTeamFromURL handle it

  const tab = params.get('tab') || 'unit';
  const q = params.get('q') || '';
  const view = params.get('view') || 'card';
  const sort = params.get('sort') || 'atk';
  const dir = params.get('dir') === 'asc' ? 1 : -1;
  const rarities = (params.get('rarity') || '').split(',').filter(Boolean);
  const types = (params.get('type') || '').split(',').filter(Boolean);
  const series = params.get('series') || '';
  const tag = params.get('tag') || '';
  const terrain = params.get('terrain') || '';
  const debuff = params.get('debuff') || '';
  const drate = parseInt(params.get('drate')) || 0;
  const special = params.get('special') || '';
  const charaTypes = (params.get('ctype') || '').split(',').filter(Boolean);
  const lookupTag = params.get('ltag') || '';
  const tagQ = params.get('tq') || '';

  // Set global state
  currentTab = tab;
  currentSort = sort;
  currentDir = dir;
  currentView = view;

  // Activate correct tab button
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const tabBtn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
  if (tabBtn) tabBtn.classList.add('active');

  // View mode
  document.querySelectorAll('.view-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === currentView);
  });

  // Show/hide sections
  const isTagLookup = tab === 'taglookup';
  const isTeam = tab === 'team';
  const isSpecial = isTagLookup || isTeam;
  document.querySelector('.controls').style.display = isSpecial ? 'none' : '';
  document.getElementById('mainGrid').style.display = isSpecial ? 'none' : '';
  document.getElementById('tableWrap').style.display = isSpecial ? 'none' : (currentView === 'table' ? '' : 'none');
  document.getElementById('tagLookupContainer').style.display = isTagLookup ? '' : 'none';
  document.getElementById('teamSimContainer').style.display = isTeam ? '' : 'none';

  if (isTagLookup) {
    if (tagQ) document.getElementById('tagSearchInput').value = tagQ;
    activeTagLookup = lookupTag;
    renderTagLookup();
    return true;
  }

  if (isTeam) {
    renderTeamSim();
    return true;
  }

  // Build filters first so DOM elements exist
  buildFilters();
  updateUI();

  // Set search
  document.getElementById('searchInput').value = q;

  // Set rarity buttons
  if (rarities.length) {
    document.querySelectorAll('#filterRarityButtons .filter-btn').forEach(b => {
      if (rarities.includes(b.dataset.value)) b.classList.add('active');
    });
  }

  if (tab === 'unit') {
    // Type buttons
    if (types.length) {
      document.querySelectorAll('#filterTypeButtons .filter-btn').forEach(b => {
        if (types.includes(b.dataset.value)) b.classList.add('active');
      });
    }
    if (series) document.getElementById('filterSeries').value = series;
    if (tag) document.getElementById('filterTag').value = tag;
    if (terrain) document.getElementById('filterTerrain').value = terrain;
    if (debuff) {
      activeDebuffKey = debuff;
      document.querySelectorAll('#debuffCategoryButtons .filter-btn').forEach(b => {
        if (b.dataset.key === debuff) b.classList.add('active');
      });
      // Trigger rate dropdown build
      const cat = DEBUFF_CATEGORIES.find(d => d.key === debuff);
      if (cat) {
        document.getElementById('debuffRateWrap').style.display = '';
        const rates = new Set();
        allUnits.forEach(u => {
          (u.normal_weapons||[]).concat(u.transformed_weapons||[]).forEach(w => {
            const m = (w.effect||'').match(cat.pattern);
            if (m) rates.add(parseInt(m[1]));
          });
        });
        const sortedRates = [...rates].sort((a,b)=>a-b);
        const rateSel = document.getElementById('debuffMinRate');
        rateSel.innerHTML = '<option value="">すべて</option>' + sortedRates.map(r => `<option value="${r}">${r}%以上</option>`).join('');
        if (drate) { rateSel.value = drate; debuffMinRate = drate; }
      }
    }
    if (special) {
      activeSpecialKey = special;
      document.querySelectorAll('#specialEffectButtons .filter-btn').forEach(b => {
        if (b.dataset.key === special) b.classList.add('active');
      });
    }
  } else if (tab === 'chara') {
    if (charaTypes.length) {
      document.querySelectorAll('#charaTypeButtons .filter-btn').forEach(b => {
        if (charaTypes.includes(b.dataset.value)) b.classList.add('active');
      });
    }
    if (series) document.getElementById('filterSeries').value = series;
    if (tag) document.getElementById('filterTag').value = tag;
  }

  // Set sort button active
  document.querySelectorAll('.sort-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.sort === currentSort);
  });

  render();
  return true;
}

function clearAllFilters() {
  resetFilters();
  buildFilters();
  updateUI();
  render();
  syncURL();
}

function updateClearButton() {
  const q = document.getElementById('searchInput')?.value || '';
  const activeRarities = [...document.querySelectorAll('#filterRarityButtons .filter-btn.active')].length;
  let hasFilter = q || activeRarities > 0 || activeDebuffKey || activeSpecialKey;
  if (!hasFilter && currentTab === 'unit') {
    const activeTypes = [...document.querySelectorAll('#filterTypeButtons .filter-btn.active')].length;
    const series = document.getElementById('filterSeries')?.value || '';
    const tag = document.getElementById('filterTag')?.value || '';
    const terrain = document.getElementById('filterTerrain')?.value || '';
    hasFilter = activeTypes > 0 || series || tag || terrain;
  }
  if (!hasFilter && currentTab === 'chara') {
    const activeCharaTypes = [...document.querySelectorAll('#charaTypeButtons .filter-btn.active')].length;
    const series = document.getElementById('filterSeries')?.value || '';
    const tag = document.getElementById('filterTag')?.value || '';
    hasFilter = activeCharaTypes > 0 || series || tag;
  }
  document.getElementById('clearFiltersBtn')?.classList.toggle('visible', !!hasFilter);
}

// Event listeners
document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('filterSeries').addEventListener('change', render);
document.getElementById('filterTag').addEventListener('change', render);
document.getElementById('filterTerrain').addEventListener('change', render);
document.getElementById('filterCharaType')?.addEventListener('change', render);
document.getElementById('filterTarget').addEventListener('change', render);
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeTeamPicker(); } });
document.getElementById('teamPickerOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeTeamPicker(); });
document.getElementById('tagSearchInput')?.addEventListener('input', () => { renderTagLookup(); syncURL(); });

bindSortButtons();
init();
</script>
