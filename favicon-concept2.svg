<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="infinityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2979ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c4dff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="12" ry="12" fill="url(#bgGrad)"/>

  <!-- Infinity symbol - beam saber style -->
  <path d="M16 32 C16 24, 24 20, 28 26 C30 29, 32 31, 32 32 C32 31, 34 29, 36 26 C40 20, 48 24, 48 32 C48 40, 40 44, 36 38 C34 35, 32 33, 32 32 C32 33, 30 35, 28 38 C24 44, 16 40, 16 32 Z"
        fill="none" stroke="url(#infinityGrad)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Glow effect on infinity -->
  <path d="M16 32 C16 24, 24 20, 28 26 C30 29, 32 31, 32 32 C32 31, 34 29, 36 26 C40 20, 48 24, 48 32 C48 40, 40 44, 36 38 C34 35, 32 33, 32 32 C32 33, 30 35, 28 38 C24 44, 16 40, 16 32 Z"
        fill="none" stroke="url(#infinityGrad)" stroke-width="6" stroke-linecap="round" opacity="0.25"/>

  <!-- M letter - left loop -->
  <text x="21" y="36" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-weight="900" font-size="12" fill="#ffffff" text-anchor="middle" opacity="0.95">M</text>

  <!-- H letter - right loop -->
  <text x="43" y="36" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-weight="900" font-size="12" fill="#ffffff" text-anchor="middle" opacity="0.95">H</text>

  <!-- Small "DB" label at bottom -->
  <text x="32" y="54" font-family="'Arial', sans-serif" font-weight="700" font-size="7" fill="#00e5ff" text-anchor="middle" letter-spacing="2" opacity="0.8">DB</text>
</svg>